<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Post</title>

<link rel="icon" href="logo.svg">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>

<body class="p-6">

<button onclick="history.back()" class="mb-4 bg-black text-white px-4 py-2 rounded">
⬅ Back
</button>

<h1 id="title"></h1>
<p id="content"></p>

<script>

const firebaseConfig = {
apiKey: "AIzaSyCUyQyMzEee1eO1RqmhTmIp_OjLT7guUAc",
authDomain:"factzone-a9ace.firebaseapp.com",
projectId:"factzone-a9ace"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const id = new URLSearchParams(window.location.search).get("id");

async function load(){
let doc = await db.collection("posts").doc(id).get();
let p = doc.data();

document.getElementById("title").innerText = p.title;
document.getElementById("content").innerText = p.content;
}

load();

</script>

</body>
</html>
