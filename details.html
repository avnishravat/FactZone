<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Post</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>

<body class="p-6">

<button onclick="history.back()" class="bg-black text-white px-4 py-2 mb-4">
⬅ Back
</button>

<h1 id="title"></h1>
<p id="content"></p>

<p id="views"></p>
<p id="likes"></p>

<script>

const firebaseConfig={
apiKey:"AIzaSyCUyQyMzEee1eO1RqmhTmIp_OjLT7guUAc",
authDomain:"factzone-a9ace.firebaseapp.com",
projectId:"factzone-a9ace"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

const id=new URLSearchParams(location.search).get("id");

async function load(){

let ref=db.collection("posts").doc(id);

// VIEW
if(!localStorage.getItem("view_"+id)){
await ref.update({
views:firebase.firestore.FieldValue.increment(1)
});
localStorage.setItem("view_"+id,"yes");
}

let doc=await ref.get();
let p=doc.data();

title.innerText=p.title;
content.innerText=p.content;
views.innerText="👁️ "+(p.views||0);
likes.innerText="❤️ "+(p.likes||0);

}

load();

</script>

</body>
</html>
