<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Post</title>

<link rel="icon" href="logo.svg">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>

<body class="p-6">

<button onclick="history.back()" class="mb-4 bg-black text-white px-4 py-2 rounded">
⬅ Back
</button>

<h1 id="t" class="text-2xl font-bold mb-2"></h1>
<img id="i" class="w-full mb-4">
<p id="c"></p>
<p id="v" class="mt-3 text-gray-500"></p>

<script>

const firebaseConfig = {
apiKey: "AIzaSyCUyQyMzEee1eO1RqmhTmIp_OjLT7guUAc",
authDomain:"factzone-a9ace.firebaseapp.com",
projectId:"factzone-a9ace"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

const id=new URLSearchParams(location.search).get("id");

function f(n){
if(n>=1e6)return(n/1e6).toFixed(1)+"M";
if(n>=1e3)return(n/1e3).toFixed(1)+"K";
return n||0;
}

async function load(){
let ref=db.collection("posts").doc(id);
let doc=await ref.get();
let p=doc.data();

t.innerText=p.title;
c.innerText=p.content;
if(p.image)i.src=p.image;

v.innerText="👁️ "+f(p.views)+" views";

if(!localStorage.getItem("view_"+id)){
await ref.update({
views:firebase.firestore.FieldValue.increment(1)
});
localStorage.setItem("view_"+id,true);
}
}

load();

</script>

</body>
</html>
