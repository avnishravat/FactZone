<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>FactZone | Amazing Facts & Knowledge</title>

<meta name="description"
content="Explore amazing facts, knowledge, technology, internet secrets and viral content on FactZone."/>

<meta name="keywords"
content="facts, amazing facts, technology facts, knowledge, FactZone"/>

<meta name="author" content="FactZone"/>

<meta name="google-site-verification"
content="dtL9Egu7NLpAEH3Gm3VniruledIKjz2S-e-F1wGXuMt4"/>

<link rel="icon" href="logo.svg" type="image/svg+xml"/>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>

body{
background:#f3f4f6;
}

.line-clamp{
display:-webkit-box;
-webkit-line-clamp:2;
-webkit-box-orient:vertical;
overflow:hidden;
}

</style>

</head>

<body>

<!-- HEADER -->

<header class="bg-black sticky top-0 z-50 shadow-lg">

<div class="max-w-7xl mx-auto flex items-center justify-between p-4 gap-3">

<div
onclick="openLogin()"
class="flex items-center gap-2 cursor-pointer select-none">

<img
src="logo.svg"
class="w-10 h-10 rounded-full bg-white p-1"/>

<h1 class="text-2xl font-bold text-white">
FactZone
</h1>

</div>

<input
type="text"
id="searchInput"
placeholder="🔍 Search..."
class="w-full max-w-xl px-5 py-3 rounded-full outline-none"/>

</div>

</header>

<!-- POSTS -->

<main
id="postsContainer"
class="max-w-7xl mx-auto p-4 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">

</main>

<!-- FLOAT BUTTON -->

<button
id="addBtn"
onclick="openAdmin()"
class="hidden fixed bottom-6 right-6 w-14 h-14 rounded-full bg-black text-white text-3xl shadow-xl">
+
</button>

<!-- LOGIN MODAL -->

<div
id="loginModal"
class="hidden fixed inset-0 bg-black/70 z-50 flex justify-center items-center">

<div class="bg-white w-[90%] max-w-sm rounded-2xl p-6">

<h2 class="text-2xl font-bold text-center mb-5">
Admin Login
</h2>

<input
type="email"
id="email"
placeholder="Email"
class="w-full border p-3 rounded-xl mb-3 outline-none"/>

<input
type="password"
id="password"
placeholder="Password"
class="w-full border p-3 rounded-xl mb-4 outline-none"/>

<button
onclick="login()"
class="w-full bg-black text-white py-3 rounded-xl font-bold">
Login
</button>

<button
onclick="closeLogin()"
class="w-full bg-gray-200 py-3 rounded-xl mt-2">
Close
</button>

</div>

</div>

<!-- ADMIN MODAL -->

<div
id="adminModal"
class="hidden fixed inset-0 bg-black/70 z-50 flex justify-center items-center overflow-auto">

<div class="bg-white w-[95%] max-w-2xl rounded-2xl p-5 my-10">

<h2 class="text-2xl font-bold mb-4">
Create Post
</h2>

<input
id="title"
placeholder="Post Title"
class="w-full border p-3 rounded-xl mb-3 outline-none"/>

<textarea
id="content"
placeholder="Post Content"
class="w-full border p-3 rounded-xl h-40 mb-3 outline-none"></textarea>

<input
type="file"
id="fileInput"
class="mb-4"/>

<img
id="preview"
class="hidden w-full h-72 object-cover rounded-xl mb-4"/>

<button
onclick="savePost()"
class="w-full bg-black text-white py-3 rounded-xl font-bold">
Save Post
</button>

<button
onclick="closeAdmin()"
class="w-full bg-gray-200 py-3 rounded-xl mt-3">
Close
</button>

</div>

</div>

<script>

const firebaseConfig = {

apiKey:"AIzaSyCUyQyMzEee1eO1RqmhTmIp_OjLT7guUAc",

authDomain:"factzone-a9ace.firebaseapp.com",

projectId:"factzone-a9ace"

};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();

const db = firebase.firestore();

let uploadedImage = "";
let editId = null;
let isAdmin = false;

function openLogin(){

document.getElementById("loginModal")
.classList.remove("hidden");

}

function closeLogin(){

document.getElementById("loginModal")
.classList.add("hidden");

}

async function login(){

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

try{

await auth.signInWithEmailAndPassword(
email,
password
);

isAdmin = true;

document.getElementById("addBtn")
.classList.remove("hidden");

closeLogin();

fetchPosts();

alert("Admin Login Success ✅");

}catch(err){

alert(err.message);

}

}

function openAdmin(){

editId = null;

document.getElementById("title").value = "";
document.getElementById("content").value = "";

uploadedImage = "";

document.getElementById("preview")
.classList.add("hidden");

document.getElementById("adminModal")
.classList.remove("hidden");

}

function closeAdmin(){

document.getElementById("adminModal")
.classList.add("hidden");

}

document.getElementById("fileInput")
.onchange = async (e)=>{

const file = e.target.files[0];

if(!file) return;

const formData = new FormData();

formData.append("image", file);

try{

document.getElementById("preview")
.classList.remove("hidden");

document.getElementById("preview").src =
"https://i.imgur.com/ZKZC5Qx.gif";

const res = await fetch(
"https://api.imgbb.com/1/upload?key=f1bdb9735d4cd84dd8a265b7d092d2eb",
{
method:"POST",
body:formData
}
);

const data = await res.json();

uploadedImage = data.data.url;

document.getElementById("preview").src =
uploadedImage;

alert("Image Uploaded ✅");

}catch(err){

alert("Upload Failed ❌");

}

};

async function fetchPosts(){

const container =
document.getElementById("postsContainer");

container.innerHTML =
"<h2>Loading...</h2>";

const snapshot =
await db.collection("posts")
.orderBy("createdAt","desc")
.get();

container.innerHTML = "";

snapshot.forEach(doc=>{

const p = doc.data();

const card = document.createElement("div");

card.className =
"bg-white rounded-2xl overflow-hidden shadow hover:shadow-2xl transition cursor-pointer";

card.innerHTML = `

<img
src="${p.image}"
class="w-full h-56 object-cover">

<div class="p-4">

<h2 class="font-bold text-xl mb-2 line-clamp">
${p.title}
</h2>

<p class="text-gray-600 text-sm mb-3 line-clamp">
${p.content}
</p>

<div class="flex justify-between items-center">

<button
class="likeBtn text-red-500 font-bold">
❤️ ${p.likes || 0}
</button>

<span class="text-gray-500 text-sm">
👁️ ${p.views || 0}
</span>

</div>

${isAdmin ? `

<div class="flex gap-2 mt-4">

<button
class="editBtn bg-blue-600 text-white px-4 py-2 rounded-lg text-sm">
Edit
</button>

<button
class="deleteBtn bg-red-600 text-white px-4 py-2 rounded-lg text-sm">
Delete
</button>

</div>

` : ""}

</div>
`;

card.onclick = ()=>{

location.href =
`detail.html?id=${doc.id}`;

};

card.querySelector(".likeBtn")
.onclick = async (e)=>{

e.stopPropagation();

await db.collection("posts")
.doc(doc.id)
.update({

likes: firebase.firestore
.FieldValue.increment(1)

});

fetchPosts();

};

if(isAdmin){

card.querySelector(".editBtn")
.onclick = (e)=>{

e.stopPropagation();

editId = doc.id;

document.getElementById("title").value =
p.title;

document.getElementById("content").value =
p.content;

uploadedImage = p.image;

document.getElementById("preview")
.src = p.image;

document.getElementById("preview")
.classList.remove("hidden");

openAdmin();

};

card.querySelector(".deleteBtn")
.onclick = async (e)=>{

e.stopPropagation();

if(confirm("Delete Post?")){

await db.collection("posts")
.doc(doc.id)
.delete();

fetchPosts();

}

};

}

container.appendChild(card);

});

}

async function savePost(){

const title =
document.getElementById("title")
.value.trim();

const content =
document.getElementById("content")
.value.trim();

if(!title || !content){

alert("Fill all fields");

return;

}

try{

if(editId){

await db.collection("posts")
.doc(editId)
.update({

title,
content,
image:uploadedImage

});

alert("Updated ✅");

}else{

await db.collection("posts")
.add({

title,
content,
image:uploadedImage,
likes:0,
views:0,
createdAt:new Date()

});

alert("Post Uploaded ✅");

}

closeAdmin();

fetchPosts();

}catch(err){

alert(err.message);

}

}

document.getElementById("searchInput")
.oninput = (e)=>{

const value =
e.target.value.toLowerCase();

document.querySelectorAll("#postsContainer > div")
.forEach(card=>{

const text =
card.innerText.toLowerCase();

card.style.display =
text.includes(value)
? "block"
: "none";

});

};

fetchPosts();

</script>

</body>
</html>
