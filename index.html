<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FactZone</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body {
  background: linear-gradient(135deg,#000,#1a1a1a,#000);
  color:white;
}
.glass {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
}
</style>
</head>

<body>

<!-- HEADER -->
<header class="flex justify-between items-center p-4 glass shadow-lg">

<h1 id="logo" class="text-2xl font-bold cursor-pointer">🔥 FactZone</h1>

<input id="search" placeholder="Search..."
class="px-4 py-2 rounded-full text-black w-1/2">

</header>

<!-- POSTS -->
<main id="posts" class="p-6 grid md:grid-cols-3 gap-6"></main>

<!-- ADMIN BTN -->
<button id="adminBtn" onclick="openAdmin()"
class="hidden fixed bottom-5 right-5 bg-gradient-to-r from-red-500 to-orange-500 px-5 py-3 rounded-full text-xl shadow-lg">
+
</button>

<!-- LOGIN -->
<div id="loginModal" class="hidden fixed inset-0 bg-black/80 flex justify-center items-center">
<div class="glass p-6 rounded-xl w-80">

<h2 class="text-center mb-3">Admin Login</h2>

<input type="password" id="adminPass" placeholder="Password"
class="w-full p-2 text-black rounded mb-3">

<button onclick="checkLogin()" class="w-full bg-orange-500 py-2 rounded">
Login
</button>

</div>
</div>

<!-- ADMIN PANEL -->
<div id="adminModal" class="hidden fixed inset-0 bg-black/80 flex justify-center items-center">
<div class="glass p-6 rounded-xl w-[90%] max-w-lg">

<h2>Add Post</h2>

<input id="title" placeholder="Title" class="w-full p-2 text-black mb-2 rounded">
<textarea id="content" class="w-full p-2 text-black mb-2 rounded"></textarea>

<input type="file" id="fileInput" class="mb-2">

<img id="preview" class="hidden w-full h-40 object-cover mb-2">

<button onclick="savePost()" class="w-full bg-green-500 py-2 rounded">Save</button>

</div>
</div>

<script>
const firebaseConfig = {
apiKey: "AIzaSyCUyQyMzEee1eO1RqmhTmIp_OjLT7guUAc",
authDomain: "factzone-a9ace.firebaseapp.com",
projectId: "factzone-a9ace"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let uploadedImage = "";
let isAdmin = false;

// 🔐 hidden admin trigger (3 click)
let clickCount = 0;
document.getElementById("logo").onclick = ()=>{
  clickCount++;
  if(clickCount===3){
    document.getElementById("loginModal").classList.remove("hidden");
  }
  setTimeout(()=>clickCount=0,1500);
};

// LOGIN
function checkLogin(){
  if(document.getElementById("adminPass").value==="Avnish@"){
    isAdmin = true;
    document.getElementById("adminBtn").classList.remove("hidden");
    document.getElementById("loginModal").classList.add("hidden");
    fetchPosts();
  } else alert("Wrong password");
}

// ADMIN
function openAdmin(){
  document.getElementById("adminModal").classList.remove("hidden");
}

// IMAGE
document.getElementById("fileInput").onchange=e=>{
const file=e.target.files[0];
const reader=new FileReader();
reader.onload=()=>{uploadedImage=reader.result;}
reader.readAsDataURL(file);
};

// FETCH POSTS
async function fetchPosts(){
const postsDiv=document.getElementById("posts");
postsDiv.innerHTML="Loading...";

const snapshot=await db.collection("posts").get();
postsDiv.innerHTML="";

snapshot.forEach(doc=>{
const p=doc.data();

const liked = localStorage.getItem(doc.id);

const div=document.createElement("div");
div.className="glass p-4 rounded-xl";

div.innerHTML=`
${p.image?`<img src="${p.image}" class="h-40 w-full object-cover mb-2 rounded">`:""}
<h2>${p.title}</h2>
<p>${p.content.substring(0,80)}</p>

<button class="likeBtn ${liked?"bg-gray-500":"bg-red-500"} px-3 py-1 rounded mt-2">
❤️ ${p.likes||0}
</button>
`;

div.querySelector(".likeBtn").onclick=(e)=>{
e.stopPropagation();

if(localStorage.getItem(doc.id)){
  alert("Already liked");
  return;
}

db.collection("posts").doc(doc.id).update({
likes: firebase.firestore.FieldValue.increment(1)
});

localStorage.setItem(doc.id,true);
fetchPosts();
};

postsDiv.appendChild(div);
});
}

// SAVE
async function savePost(){
const t=title.value;
const c=content.value;

await db.collection("posts").add({
title:t,
content:c,
image:uploadedImage,
likes:0
});

alert("Saved");
fetchPosts();
}

fetchPosts();
</script>

</body>
</html>
