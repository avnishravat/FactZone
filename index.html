<!-- index.html -->

<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
FactZone | Amazing Facts & Knowledge
</title>

<meta name="description"
content="Amazing facts, science facts, technology facts and viral knowledge.">

<meta name="keywords"
content="facts, amazing facts, science facts, technology facts">

<meta name="robots"
content="index, follow">

<link rel="icon"
href="logo.svg">

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background:#f3f4f6;
font-family:Arial;
}

.card{
transition:.3s;
border:2px solid #e5e7eb;
}

.card:hover{
transform:translateY(-5px);
border-color:black;
}

.line2{
display:-webkit-box;
-webkit-line-clamp:2;
-webkit-box-orient:vertical;
overflow:hidden;
}

</style>

</head>

<body>

<!-- HEADER -->

<header
class="bg-black sticky top-0 z-50 shadow-lg">

<div
class="max-w-7xl mx-auto p-4">

<a href="#"
class="flex items-center gap-3">

<img
src="logo.svg"
class="w-12 h-12 rounded-full bg-white p-1">

<h1
id="adminBtn"
class="text-3xl font-bold text-white cursor-pointer">
FactZone
</h1>

</a>

<input
type="text"
id="searchInput"
placeholder="🔍 Search posts..."
class="w-full mt-4 px-5 py-3 rounded-full outline-none text-lg">

</div>

</header>

<!-- POSTS -->

<main
id="posts"
class="max-w-7xl mx-auto p-5 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">

<div class="text-center col-span-full text-xl">
Loading posts...
</div>

</main>

<!-- FOOTER -->

<footer
class="bg-black text-white mt-10">

<div
class="max-w-7xl mx-auto px-5 py-8 text-center">

<div
class="flex flex-wrap gap-5 justify-center text-sm mb-5">

<a href="about.html">About</a>

<a href="contact.html">Contact</a>

<a href="privacy.html">Privacy</a>

<a href="terms.html">Terms</a>

<a href="disclaimer.html">Disclaimer</a>

</div>

<p class="text-gray-400">
© 2026 FactZone
</p>

</div>

</footer>

<!-- FIREBASE -->

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyCUyQyMzEee1eO1RqmhTmIp_OjLT7guUAc",

authDomain: "factzone-a9ace.firebaseapp.com",

databaseURL: "https://factzone-a9ace-default-rtdb.firebaseio.com",

projectId: "factzone-a9ace",

storageBucket: "factzone-a9ace.firebasestorage.app",

messagingSenderId: "425838320650",

appId: "1:425838320650:web:beab18baddf818cb73d3f3",

measurementId: "G-311JQXBXR9"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const postsContainer =
document.getElementById("posts");

async function loadPosts(){

const querySnapshot =
await getDocs(collection(db,"posts"));

postsContainer.innerHTML = "";

querySnapshot.forEach((doc)=>{

const post = doc.data();

postsContainer.innerHTML += `

<a href="detail.html?id=${doc.id}"
class="card bg-white rounded-2xl overflow-hidden shadow-lg">

<img
src="${post.image}"
class="w-full h-60 object-cover">

<div class="p-4">

<h2 class="font-bold text-xl mb-2 line2">
${post.title}
</h2>

<p class="text-gray-600 text-sm line2">
${post.desc}
</p>

</div>

</a>

`;

});

}

loadPosts();

document.getElementById("searchInput")
.addEventListener("input",(e)=>{

const value =
e.target.value.toLowerCase();

document.querySelectorAll("#posts a")
.forEach(card=>{

card.style.display =
card.innerText.toLowerCase()
.includes(value)
? "block"
: "none";

});

});

document.getElementById("adminBtn")
.onclick=()=>{

const pass =
prompt("Enter Admin Password");

if(pass==="admin123"){

location.href="admin.html";

}

};

</script>

</body>
</html>
