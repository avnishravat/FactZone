<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FactZone</title>

<link rel="icon" href="logo.svg">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{background:#f1f5f9;}
</style>
</head>

<body>

<header id="logoBtn" class="flex justify-center gap-2 p-4 bg-white shadow cursor-pointer">
<img src="logo.svg" class="w-8">
<h1 class="text-xl font-bold">FactZone</h1>
</header>

<main id="posts" class="p-6 grid md:grid-cols-3 gap-6"></main>

<button id="addBtn" class="hidden fixed bottom-5 right-5 bg-black text-white p-4 rounded-full">+</button>

<!-- LOGIN -->
<div id="loginBox" class="hidden fixed inset-0 bg-black/70 flex justify-center items-center">
<div class="bg-white p-4 w-80 rounded">
<input id="passInput" placeholder="Password" class="border p-2 mb-2 w-full">
<button id="loginBtn" class="bg-black text-white w-full p-2">Login</button>
</div>
</div>

<!-- ADMIN -->
<div id="adminBox" class="hidden fixed inset-0 bg-black/70 flex justify-center items-center">
<div class="bg-white p-4 w-96">
<input id="titleInput" placeholder="Title" class="w-full border p-2 mb-2">
<textarea id="contentInput" placeholder="Content" class="w-full border p-2 mb-2"></textarea>
<button id="saveBtn" class="bg-black text-white w-full p-2 mt-2">Save</button>
</div>
</div>

<script>

// 🔥 CONFIG
const firebaseConfig = {
apiKey: "AIzaSyCUyQyMzEee1eO1RqmhTmIp_OjLT7guUAc",
authDomain:"factzone-a9ace.firebaseapp.com",
projectId:"factzone-a9ace"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const ADMIN_PASS = "Avnish@";

let isAdmin = false;
let editId = null;

// DOM READY
window.onload = () => {

const loginBox = document.getElementById("loginBox");
const adminBox = document.getElementById("adminBox");

// 🔥 OPEN LOGIN
document.getElementById("logoBtn").onclick = () => {
loginBox.classList.remove("hidden");
};

// 🔥 LOGIN FIX
document.getElementById("loginBtn").onclick = () => {
let val = document.getElementById("passInput").value.trim();

if(val === ADMIN_PASS){
isAdmin = true;
document.getElementById("addBtn").classList.remove("hidden");
loginBox.classList.add("hidden");
}else{
alert("Wrong Password");
}
};

// 🔥 OPEN ADMIN
document.getElementById("addBtn").onclick = () => {
editId = null;
adminBox.classList.remove("hidden");
};

// 🔥 SAVE POST
document.getElementById("saveBtn").onclick = async () => {

let t = document.getElementById("titleInput").value.trim();
let c = document.getElementById("contentInput").value.trim();

if(!t || !c){
alert("Fill all fields");
return;
}

try{

if(editId){
await db.collection("posts").doc(editId).update({
title:t,
content:c,
adminKey: ADMIN_PASS
});
}else{
await db.collection("posts").add({
title:t,
content:c,
likes:0,
adminKey: ADMIN_PASS
});
}

adminBox.classList.add("hidden");
loadPosts();

}catch(e){
console.error(e);
alert("Save failed");
}
};

loadPosts();

};

// 🔥 LOAD POSTS
async function loadPosts(){

const postsDiv = document.getElementById("posts");
postsDiv.innerHTML = "";

let snap = await db.collection("posts").get();

snap.forEach(doc => {

let p = doc.data();

let card = document.createElement("div");
card.className = "bg-white p-4 rounded shadow cursor-pointer";

card.innerHTML = `
<h2 class="font-bold">${p.title}</h2>
<p>${(p.content||"").substring(0,80)}...</p>

<div class="flex justify-between mt-2">
<span class="likeBtn text-red-500 cursor-pointer">❤️ ${p.likes||0}</span>

${isAdmin ? `
<div>
<button class="editBtn">✏️</button>
<button class="delBtn">🗑️</button>
</div>` : ""}
</div>
`;


// 🔥 OPEN POST
card.onclick = () => {
window.location.href = "details.html?id=" + doc.id;
};

// 🔥 LIKE
card.querySelector(".likeBtn").onclick = (e)=>{
e.stopPropagation();

db.collection("posts").doc(doc.id).update({
likes: firebase.firestore.FieldValue.increment(1)
});

};

// 🔥 ADMIN
if(isAdmin){

card.querySelector(".editBtn").onclick = (e)=>{
e.stopPropagation();

editId = doc.id;
titleInput.value = p.title;
contentInput.value = p.content;

document.getElementById("adminBox").classList.remove("hidden");
};

card.querySelector(".delBtn").onclick = async (e)=>{
e.stopPropagation();

if(confirm("Delete?")){
await db.collection("posts").doc(doc.id).delete();
loadPosts();
}
};

}

postsDiv.appendChild(card);

});

}

</script>

</body>
</html>
