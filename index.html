<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FactZone | Amazing Facts & Knowledge</title>
    <link rel="icon" href="logo.svg">
    <script src="tailwindcss.com"></script>
    
    <!-- FIREBASE LIBRARIES -->
    <script src="gstatic.com"></script>
    <script src="gstatic.com"></script>
    <script src="gstatic.com"></script>

    <style>
        .container { max-width: 1200px; margin: auto; }
        .gradient-bg { background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); }
        .fact-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .fact-card:hover { transform: translateY(-6px); }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">

    <!-- HEADER -->
    <header class="gradient-bg text-white shadow-xl sticky top-0 z-40">
        <div class="container p-4 flex flex-col sm:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-3 cursor-pointer" onclick="openLoginModal()">
                <img src="logo.svg" class="w-10 h-10 bg-white p-1 rounded-full" alt="Logo">
                <h1 class="text-2xl font-black bg-gradient-to-r from-amber-400 to-orange-500 bg-clip-text text-transparent">FactZone</h1>
            </div>
            <div class="flex items-center gap-3 w-full sm:w-1/2 justify-end">
                <input id="search" placeholder="अजीबोगरीब फैक्ट्स खोजें..." class="px-4 py-2.5 rounded-2xl text-black w-full outline-none">
                <button id="logoutBtn" onclick="logout()" class="hidden bg-red-600 text-white px-4 py-2.5 rounded-2xl text-xs font-bold shadow-md">Log Out</button>
            </div>
        </div>
    </header>

    <!-- POSTS -->
    <div class="container px-4 py-10">
        <main id="posts" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-8"></main>
    </div>

    <button id="adminBtn" onclick="openAdmin()" class="hidden fixed bottom-6 right-6 bg-amber-500 text-white w-14 h-14 rounded-full shadow-2xl text-3xl flex items-center justify-center">+</button>

    <!-- LOGIN MODAL -->
    <div id="loginModal" class="hidden fixed inset-0 bg-black/80 flex justify-center items-center p-4 z-50">
        <div class="bg-white p-8 rounded-3xl max-w-sm w-full">
            <h2 class="text-2xl font-black mb-4">Admin Login</h2>
            <input id="adminEmail" type="email" placeholder="Admin Email" class="border p-3 mb-3 w-full rounded-2xl">
            <input id="adminPass" type="password" placeholder="Password" class="border p-3 mb-4 w-full rounded-2xl">
            <div class="flex gap-3">
                <button onclick="login()" class="bg-black text-white w-full py-3 rounded-2xl font-bold">Sign In</button>
                <button onclick="loginModal.classList.add('hidden')" class="bg-gray-100 text-gray-700 w-full py-3 rounded-2xl">Cancel</button>
            </div>
        </div>
    </div>

    <!-- ADMIN MODAL -->
    <div id="adminModal" class="hidden fixed inset-0 bg-black/80 flex justify-center items-center p-4 z-50">
        <div class="bg-white p-6 sm:p-8 rounded-3xl w-[90%] max-w-lg shadow-2xl">
            <h2 id="modalTitle" class="text-2xl font-black mb-4">Create New Post</h2>
            <input id="title" placeholder="टाइटल लिखें..." class="border p-3 mb-3 w-full rounded-2xl font-semibold">
            <textarea id="content" placeholder="फैक्ट की जानकारी लिखें..." rows="6" class="border p-3 mb-3 w-full rounded-2xl"></textarea>
            <input type="file" id="fileInput" accept="image/*" class="mb-4 block w-full text-sm text-gray-500">
            <div class="flex gap-3 pt-4">
                <button id="saveBtn" onclick="savePost()" class="bg-amber-500 text-white w-full py-3 rounded-2xl font-bold">Save & Publish</button>
                <button onclick="closeAdmin()" class="bg-gray-100 text-gray-700 w-full py-3 rounded-2xl">Close</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCUyQyMzEee1eO1RqmhTmIp_OjLT7guUAc",
            authDomain: "firebaseapp.com",
            projectId: "factzone-a9ace"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // ⚠️ अपनी ImgBB API Key यहाँ डालें
        const IMGBB_API_KEY = "f1bdb9735d4cd84dd8a265b7d092d2eb"; 

        let userLoggedIn = false, editId = null, existingImgUrl = "", selectedFile = null;

        auth.onAuthStateChanged(user => {
            if (user) {
                userLoggedIn = true;
                adminBtn.classList.remove("hidden");
                logoutBtn.classList.remove("hidden");
            } else {
                userLoggedIn = false;
                adminBtn.classList.add("hidden");
                logoutBtn.classList.add("hidden");
            }
            fetchPosts();
        });

        function openLoginModal() { if(!userLoggedIn) loginModal.classList.remove("hidden"); }
        async function login() {
            try {
                await auth.signInWithEmailAndPassword(adminEmail.value.trim(), adminPass.value);
                loginModal.classList.add("hidden");
            } catch(e) { alert("Failed: " + e.message); }
        }
        async function logout() { if(confirm("Logout?")) { await auth.signOut(); location.reload(); } }

        fileInput.onchange = e => {
            if(e.target.files.length === 0) { selectedFile = null; return; }
            selectedFile = e.target.files[0]; // सिंगल फाइल ऑब्जेक्ट सेव किया
        };

        async function fetchPosts() {
            posts.innerHTML = "<div class='col-span-full text-center py-20 text-gray-400 animate-pulse'>फैक्ट्स लोड हो रहे हैं...</div>";
            try {
                let snap = await db.collection("posts").get();
                posts.innerHTML = "";
                snap.forEach(doc => {
                    let p = doc.data();
                    let div = document.createElement("div");
                    div.className = "fact-card bg-white rounded-3xl shadow-md border overflow-hidden flex flex-col justify-between";
                    div.onclick = () => location.href = `detail.html?id=${doc.id}`;
                    div.innerHTML = `
                        <div>
                            ${p.image ? `<img src="${p.image}" class="w-full h-52 object-cover">` : ""}
                            <div class="p-5">
                                <h2 class="font-extrabold text-xl mb-2">${p.title || ""}</h2>
                                <p class="text-gray-500 text-sm">${(p.content || "").substring(0, 95)}...</p>
                            </div>
                        </div>
                        <div class="px-6 pb-6">
                            <div class="flex justify-between items-center text-xs border-t pt-4">
                                <button class="likeBtn text-rose-500 font-bold bg-rose-50 px-3 py-1.5 rounded-2xl">❤️ <span>${p.likes || 0}</span></button>
                                <span>👁 ${p.views || 0} व्यूज</span>
                            </div>
                            ${userLoggedIn ? `<div class="flex gap-4 border-t pt-3 mt-4 text-xs font-bold"><button class="editBtn text-blue-600">📝 Edit</button><button class="deleteBtn text-red-600">🗑 Delete</button></div>` : ""}
                        </div>`;

                    div.querySelector(".likeBtn").onclick = async (e) => {
                        e.stopPropagation();
                        let targetSpan = e.currentTarget.querySelector("span");
                        await db.collection("posts").doc(doc.id).update({ likes: firebase.firestore.FieldValue.increment(1) });
                        targetSpan.innerText = parseInt(targetSpan.innerText) + 1;
                    };

                    if(userLoggedIn) {
                        div.querySelector(".editBtn").onclick = (e) => {
                            e.stopPropagation(); editId = doc.id; title.value = p.title || ""; content.value = p.content || ""; existingImgUrl = p.image || ""; openAdmin();
                        };
                        div.querySelector(".deleteBtn").onclick = async (e) => {
                            e.stopPropagation(); if(confirm("Delete?")) { await db.collection("posts").doc(doc.id).delete(); fetchPosts(); }
                        };
                    }
                    posts.appendChild(div);
                });
            } catch(e) { posts.innerHTML = `Error: ${e.message}`; }
        }

        function openAdmin() { adminModal.classList.remove("hidden"); }
        function closeAdmin() {
            adminModal.classList.add("hidden"); editId = null; title.value = ""; content.value = ""; fileInput.value = ""; selectedFile = null; existingImgUrl = ""; saveBtn.innerText = "Save & Publish"; saveBtn.disabled = false;
        }

        // IMGBB SERVER UPLOAD FUNCTION
        async function savePost() {
            if(!title.value.trim() || !content.value.trim()) return alert("पूरी जानकारी भरें।");
            let postData = { title: title.value.trim(), content: content.value.trim() };
            saveBtn.innerText = "Uploading Image...";
            saveBtn.disabled = true;

            try {
                if(selectedFile) {
                    let formData = new FormData();
                    formData.append("image", selectedFile);
                    
                    // ImgBB API पर अपलोड रिक्वेस्ट
                    let res = await fetch(`imgbb.com{IMGBB_API_KEY}`, { method: "POST", body: formData });
                    let resData = await res.json();
                    
                    if(resData.success) {
                        postData.image = resData.data.url; // डायरेक्ट इमेज URL लिंक मिला
                    } else {
                        throw new Error("Image Upload Failed on ImgBB");
                    }
                } else if(editId && existingImgUrl) {
                    postData.image = existingImgUrl;
                }

                if(editId) {
                    await db.collection("posts").doc(editId).set(postData, { merge: true });
                } else {
                    postData.likes = 0; postData.views = 0;
                    await db.collection("posts").add(postData);
                }
                closeAdmin(); await fetchPosts();
            } catch(error) {
                alert("त्रुटि: " + error.message);
                saveBtn.innerText = "Save & Publish"; saveBtn.disabled = false;
            }
        }

        search.oninput = e => {
            let v = e.target.value.toLowerCase();
            document.querySelectorAll("#posts > div").forEach(c => { c.style.display = c.innerText.toLowerCase().includes(v) ? "flex" : "none"; });
        };
    </script>
</body>
</html>
