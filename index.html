<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FactZone</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{background:#f1f5f9;}
</style>
</head>

<body>

<header class="p-4 text-center bg-white shadow">
<h1 id="logo" class="text-2xl font-bold cursor-pointer">⚡ FactZone</h1>
</header>

<main id="posts" class="p-6 grid md:grid-cols-3 gap-6"></main>

<button id="addBtn" class="hidden fixed bottom-5 right-5 bg-black text-white p-4 rounded-full">+</button>

<!-- LOGIN -->
<div id="login" class="hidden fixed inset-0 bg-black/70 flex justify-center items-center">
<div class="bg-white p-4 w-80">
<input id="pass" placeholder="Password" class="border p-2 mb-2 w-full">
<button id="loginBtn" class="bg-black text-white p-2 w-full">Login</button>
</div>
</div>

<!-- ADMIN -->
<div id="admin" class="hidden fixed inset-0 bg-black/70 flex justify-center items-center">
<div class="bg-white p-4 w-96">
<input id="title" placeholder="Title" class="w-full border p-2 mb-2">
<textarea id="content" placeholder="Content" class="w-full border p-2 mb-2"></textarea>
<input type="file" id="file">
<img id="preview" class="hidden w-full h-40 object-cover mt-2">
<button id="saveBtn" class="bg-black text-white w-full p-2 mt-2">Save</button>
</div>
</div>

<script>

// 🔥 API KEY डालो
const firebaseConfig = {
  apiKey:"YOUR_API_KEY",
  authDomain:"factzone-a9ace.firebaseapp.com",
  projectId:"factzone-a9ace"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

const ADMIN_PASS="1234";

let isAdmin=false, editId=null, img="";

function f(n){
if(n>=1e6)return(n/1e6).toFixed(1)+"M";
if(n>=1e3)return(n/1e3).toFixed(1)+"K";
return n||0;
}

document.addEventListener("DOMContentLoaded", ()=>{

// OPEN LOGIN
document.getElementById("logo").onclick=()=>{
document.getElementById("login").classList.remove("hidden");
};

// LOGIN CLICK FIX
document.getElementById("loginBtn").onclick=()=>{
let val=document.getElementById("pass").value.trim();

if(val===ADMIN_PASS){
isAdmin=true;
document.getElementById("addBtn").classList.remove("hidden");
document.getElementById("login").classList.add("hidden");
load();
}else{
alert("Wrong Password");
}
};

// OPEN ADMIN
document.getElementById("addBtn").onclick=()=>{
editId=null;
document.getElementById("admin").classList.remove("hidden");
};

// IMAGE
document.getElementById("file").onchange=e=>{
let r=new FileReader();
r.onload=()=>{
img=r.result;
document.getElementById("preview").src=img;
document.getElementById("preview").classList.remove("hidden");
};
if(e.target.files[0])r.readAsDataURL(e.target.files[0]);
};

// SAVE
document.getElementById("saveBtn").onclick=async ()=>{
let t=title.value;
let c=content.value;

if(!t||!c)return alert("Fill all");

if(editId){
await db.collection("posts").doc(editId).update({
title:t,content:c,image:img,adminKey:"FACTZONE_SECRET_123"
});
}else{
await db.collection("posts").add({
title:t,content:c,image:img,likes:0,views:0,adminKey:"FACTZONE_SECRET_123"
});
}

document.getElementById("admin").classList.add("hidden");
load();
};

load();

});

// LOAD POSTS
async function load(){
posts.innerHTML="";
let snap=await db.collection("posts").get();

snap.forEach(doc=>{
let p=doc.data();

let card=document.createElement("div");
card.className="bg-white rounded shadow cursor-pointer p-3";

card.innerHTML=`
<h2 class="font-bold">${p.title}</h2>
<p>${(p.content||"").substring(0,60)}...</p>
<p class="text-sm text-gray-500">👁️ ${f(p.views)} views</p>
`;

card.onclick=()=>location.href="details.html?id="+doc.id;

posts.appendChild(card);
});
}

</script>

</body>
</html>
