<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FactZone</title>

<script src="https://cdn.tailwindcss.com"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<style>
body { background: linear-gradient(135deg,#eef2ff,#f8fafc); }

.card:hover { transform: translateY(-5px); transition: 0.3s; }

.heart {
  position:absolute;
  top:50%; left:50%;
  transform:translate(-50%,-50%) scale(0);
  font-size:70px; opacity:0;
}
.show-heart { animation: pop 0.6s ease; }

@keyframes pop {
  0%{transform:translate(-50%,-50%) scale(0);opacity:0;}
  50%{transform:translate(-50%,-50%) scale(1.3);opacity:1;}
  100%{transform:translate(-50%,-50%) scale(1);opacity:0;}
}
</style>
</head>

<body>

<!-- HEADER -->
<header class="bg-white shadow p-4 text-center sticky top-0 z-40">
  <h1 onclick="openLogin()" class="text-2xl font-bold cursor-pointer">⚡ FactZone</h1>
</header>

<!-- SEARCH -->
<div class="flex justify-center mt-4">
  <input id="search" placeholder="Search..."
  class="w-11/12 md:w-1/2 px-4 py-2 rounded-full shadow border">
</div>

<!-- POSTS -->
<main id="posts" class="p-6 grid sm:grid-cols-2 md:grid-cols-3 gap-6"></main>

<!-- ADMIN BTN -->
<button id="adminBtn" onclick="openAdmin()"
class="hidden fixed bottom-6 right-6 bg-black text-white px-5 py-4 rounded-full text-2xl shadow-lg">+</button>

<!-- LOGIN MODAL -->
<div id="loginModal" class="hidden fixed inset-0 bg-black/70 flex justify-center items-center">
  <div class="bg-white p-6 rounded-xl w-80 text-center">
    <h2 class="text-lg font-bold mb-3">Admin Login</h2>
    <input id="email" placeholder="Email" class="w-full border p-2 mb-2">
    <input id="password" type="password" placeholder="Password" class="w-full border p-2 mb-3">
    <button onclick="login()" class="bg-black text-white w-full py-2 rounded">Login</button>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="adminModal" class="hidden fixed inset-0 bg-black/70 flex justify-center items-center">
  <div class="bg-white p-6 rounded-xl w-[95%] max-w-lg">
    <input id="title" placeholder="Title" class="w-full border p-2 mb-2">
    <textarea id="content" placeholder="Content" class="w-full border p-2 mb-2"></textarea>

    <input type="file" id="fileInput">
    <img id="preview" class="hidden w-full h-40 object-cover mt-2">

    <button onclick="savePost()" class="bg-black text-white w-full py-2 mt-2">Save</button>
  </div>
</div>

<script>

// 🔥 CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCUyQyMzEee1eO1RqmhTmIp_OjLT7guUAc",
  authDomain: "factzone-a9ace.firebaseapp.com",
  projectId: "factzone-a9ace"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

// 🔐 YOUR UID
const ADMIN_UID = "FACTZONE_SECRET_123";

let isAdmin = false;
let editId = null;
let uploadedImage = "";

// ❤️ FORMAT
function formatLikes(n){
  if(n>=1000000) return (n/1000000).toFixed(1)+"M";
  if(n>=1000) return (n/1000).toFixed(1)+"K";
  return n;
}

// ❤️ LOCAL LIKE
function isLiked(id){ return localStorage.getItem("like_"+id)==="true"; }
function setLiked(id,v){ localStorage.setItem("like_"+id,v); }

// 🔐 LOGIN
function openLogin(){ loginModal.classList.remove("hidden"); }

function login(){
  auth.signInWithEmailAndPassword(email.value, password.value)
  .then(()=> loginModal.classList.add("hidden"))
  .catch(e=> alert(e.message));
}

// 🔐 AUTH STATE
auth.onAuthStateChanged(user=>{
  if(user && user.uid===ADMIN_UID){
    isAdmin=true;
    adminBtn.classList.remove("hidden");
  } else {
    isAdmin=false;
    adminBtn.classList.add("hidden");
  }
  fetchPosts();
});

// IMAGE
fileInput.onchange=e=>{
  const reader=new FileReader();
  reader.onload=()=>{
    uploadedImage=reader.result;
    preview.src=uploadedImage;
    preview.classList.remove("hidden");
  };
  reader.readAsDataURL(e.target.files[0]);
};

// FETCH POSTS
async function fetchPosts(){
  posts.innerHTML="";
  const snap=await db.collection("posts").get();

  snap.forEach(doc=>{
    const p=doc.data();
    const liked=isLiked(doc.id);

    const card=document.createElement("div");
    card.className="card bg-white rounded-xl shadow overflow-hidden cursor-pointer";

    card.innerHTML=`
      <div class="relative imgBox">
        ${p.image?`<img src="${p.image}" class="h-44 w-full object-cover">`:''}
        <div class="heart">❤️</div>
      </div>

      <div class="p-4">
        <h2 class="font-bold">${p.title}</h2>
        <p>${p.content.substring(0,80)}...</p>

        <div class="flex justify-between mt-2">
          <span class="likeBtn ${liked?'text-red-500':'text-gray-400'} cursor-pointer">
            ❤️ ${formatLikes(p.likes||0)}
          </span>

          ${isAdmin?`
            <div>
              <button class="edit text-blue-500">Edit</button>
              <button class="del text-red-500">Delete</button>
            </div>`:''}
        </div>
      </div>
    `;

    const likeBtn=card.querySelector(".likeBtn");
    const imgBox=card.querySelector(".imgBox");
    const heart=card.querySelector(".heart");

    // LIKE TOGGLE
    likeBtn.onclick=e=>{
      e.stopPropagation();
      let liked=isLiked(doc.id);

      db.collection("posts").doc(doc.id).update({
        likes: firebase.firestore.FieldValue.increment(liked?-1:1)
      });

      setLiked(doc.id,!liked);
      p.likes += liked?-1:1;

      likeBtn.innerText="❤️ "+formatLikes(p.likes);
      likeBtn.classList.toggle("text-red-500");
      likeBtn.classList.toggle("text-gray-400");
    };

    // DOUBLE TAP
    imgBox.ondblclick=e=>{
      e.stopPropagation();
      if(isLiked(doc.id)) return;

      heart.classList.add("show-heart");
      setTimeout(()=>heart.classList.remove("show-heart"),600);

      db.collection("posts").doc(doc.id).update({
        likes: firebase.firestore.FieldValue.increment(1)
      });

      setLiked(doc.id,true);
      p.likes++;

      likeBtn.innerText="❤️ "+formatLikes(p.likes);
      likeBtn.classList.add("text-red-500");
    };

    // ADMIN EDIT
    if(isAdmin){
      card.querySelector(".edit").onclick=e=>{
        e.stopPropagation();
        editId=doc.id;
        title.value=p.title;
        content.value=p.content;
        uploadedImage=p.image||"";
        preview.src=p.image;
        preview.classList.remove("hidden");
        adminModal.classList.remove("hidden");
      };

      card.querySelector(".del").onclick=async e=>{
        e.stopPropagation();
        if(confirm("Delete?")){
          await db.collection("posts").doc(doc.id).delete();
          fetchPosts();
        }
      };
    }

    posts.appendChild(card);
  });
}

// SAVE
async function savePost(){
  if(!title.value || !content.value) return alert("Fill all");

  if(editId){
    await db.collection("posts").doc(editId).update({
      title:title.value,
      content:content.value,
      image:uploadedImage
    });
  } else {
    await db.collection("posts").add({
      title:title.value,
      content:content.value,
      image:uploadedImage,
      likes:0
    });
  }

  adminModal.classList.add("hidden");
  fetchPosts();
}

// SEARCH
search.oninput=async e=>{
  const val=e.target.value.toLowerCase();
  const snap=await db.collection("posts").get();
  posts.innerHTML="";

  snap.forEach(doc=>{
    const p=doc.data();
    if(p.title.toLowerCase().includes(val)){
      const div=document.createElement("div");
      div.innerHTML=`<h2>${p.title}</h2>`;
      posts.appendChild(div);
    }
  });
};

</script>

</body>
</html>
