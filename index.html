<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Google Search Console Verification -->
    <meta name="google-site-verification" content="dtL9Egu7NLpAEH3Gm3VniruledIKjz2S-e-F1wGXuMt4" />

    <!-- SEO Meta Tags -->
    <title>FactZone | Amazing Facts & Knowledge</title>
    <meta name="description" content="Explore amazing and interesting facts from around the world on FactZone.">

    <link rel="icon" type="image/svg+xml" href="logo.svg" />
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Firebase SDKs -->
    <script src="https://gstatic.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>

<body class="bg-gray-100">

<!-- HEADER -->
<header class="bg-black text-white p-4 flex items-center justify-between shadow">
  <h1 class="text-2xl font-bold cursor-pointer" onclick="location.reload()">FactZone</h1>

  <input id="search" placeholder="🔍 Search articles..."
    class="w-1/2 px-4 py-2 rounded-full text-black"/>
    
</header>

<!-- POSTS CONTAINER -->
<main id="posts" class="p-6 grid md:grid-cols-3 gap-6"></main>

<!-- FLOAT BUTTON -->
<button id="adminBtn" onclick="openAdmin()"
class="hidden fixed bottom-5 right-5 bg-black text-white px-4 py-3 rounded-full text-xl shadow-lg">+</button>

<!-- LOGIN MODAL -->
<div id="loginModal" class="hidden fixed inset-0 bg-black/70 flex justify-center items-center z-50">
  <div class="bg-white p-6 rounded-xl w-80">
    <h2 class="text-xl font-bold mb-3 text-center">Admin Login</h2>
    <input type="password" id="adminPass" placeholder="Enter password"
      class="w-full border p-2 mb-3 rounded"/>
    <div class="flex gap-2">
        <button onclick="checkLogin()" class="bg-black text-white w-full py-2 rounded">Login</button>
        <button onclick="closeLogin()" class="bg-gray-300 w-full py-2 rounded">Close</button>
    </div>
  </div>
</div>

<!-- ADMIN MODAL -->
<div id="adminModal" class="hidden fixed inset-0 bg-black/70 flex justify-center items-center z-50">
  <div class="bg-white p-6 rounded-xl w-[95%] max-w-lg relative">
    <button onclick="closeAdmin()" class="absolute top-2 right-3 text-xl">✕</button>
    <h2 class="text-xl font-bold mb-3">Add / Edit Post</h2>
    <input id="title" placeholder="Title" class="w-full border p-2 mb-2 rounded"/>
    <textarea id="content" placeholder="Content" class="w-full border p-2 mb-2 h-28 rounded"></textarea>
    <input type="file" id="fileInput" class="mb-2"/>
    <img id="preview" class="hidden w-full h-40 object-cover mb-2 rounded"/>
    <div class="flex gap-2">
      <button onclick="savePost()" class="bg-black text-white w-full py-2 rounded">Save</button>
      <button onclick="closeAdmin()" class="bg-gray-400 text-white w-full py-2 rounded">Cancel</button>
    </div>
  </div>
</div>

<script>
// Firebase Configuration
const firebaseConfig = {
  apiKey: "AIzaSyCUyQyMzEee1eO1RqmhTmIp_OjLT7guUAc",
  authDomain: "://firebaseapp.com",
  projectId: "factzone-a9ace"
};

// Initialize Firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// Variables
let uploadedImage = "";
let editId = null;
let isAdmin = false;
const ADMIN_PASSWORD = "Avnish@";

const postsContainer = document.getElementById("posts");
const loginModal = document.getElementById("loginModal");
const adminModal = document.getElementById("adminModal");
const adminBtn = document.getElementById("adminBtn");

// Functions
function openLogin(){ loginModal.classList.remove("hidden"); }
function closeLogin(){ loginModal.classList.add("hidden"); }

function checkLogin(){
  const pass = document.getElementById("adminPass").value;
  if(pass === ADMIN_PASSWORD){
    isAdmin = true;
    adminBtn.classList.remove("hidden");
    loginModal.classList.add("hidden");
    fetchPosts();
    alert("Logged in as Admin ✅");
  } else {
    alert("Wrong password!");
  }
}

function openAdmin(){
  editId = null; 
  document.getElementById("title").value = ""; 
  document.getElementById("content").value = ""; 
  uploadedImage = "";
  document.getElementById("preview").classList.add("hidden"); 
  adminModal.classList.remove("hidden");
}
function closeAdmin(){ adminModal.classList.add("hidden"); }

document.getElementById("fileInput").onchange = e => {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    uploadedImage = reader.result;
    const preview = document.getElementById("preview");
    preview.src = uploadedImage;
    preview.classList.remove("hidden");
  };
  reader.readAsDataURL(file);
};

async function fetchPosts(){
  postsContainer.innerHTML = "<p class='text-center col-span-3'>Loading facts...</p>";
  try {
    const snapshot = await db.collection("posts").orderBy("createdAt", "desc").get();
    postsContainer.innerHTML = "";
    
    if(snapshot.empty) {
        postsContainer.innerHTML = "<p class='text-center col-span-3'>No posts found. Add one!</p>";
        return;
    }

    snapshot.forEach(doc => {
      const p = doc.data();
      const div = document.createElement("div");
      div.className = "bg-white p-4 rounded-xl shadow hover:shadow-lg transition cursor-pointer";
      div.innerHTML = `
        ${p.image ? `<img src="${p.image}" class="h-40 w-full object-cover mb-2 rounded">` : ""}
        <h2 class="font-bold text-lg">${p.title}</h2>
        <p class="text-gray-600">${p.content.substring(0,80)}...</p>
        <div class="flex justify-between items-center mt-2" onclick="event.stopPropagation()">
          <button class="likeBtn text-red-500 font-bold">❤️ ${p.likes || 0}</button>
          ${isAdmin ? `
            <div class="flex gap-2">
                <button class="editBtn bg-blue-500 text-white px-2 py-1 rounded text-sm">Edit</button>
                <button class="deleteBtn bg-red-500 text-white px-2 py-1 rounded text-sm">Delete</button>
            </div>` : ""}
        </div>`;
      
      div.onclick = () => { window.location.href = `details.html?id=${doc.id}`; };

      // Like Logic
      div.querySelector(".likeBtn").onclick = (e) => {
        e.stopPropagation();
        db.collection("posts").doc(doc.id).update({
            likes: firebase.firestore.FieldValue.increment(1)
        }).then(fetchPosts);
      };

      // Admin Actions
      if(isAdmin){
          div.querySelector(".editBtn").onclick = (e) => {
              e.stopPropagation();
              editId = doc.id;
              document.getElementById("title").value = p.title;
              document.getElementById("content").value = p.content;
              uploadedImage = p.image || "";
              if(p.image){
                  const preview = document.getElementById("preview");
                  preview.src = p.image;
                  preview.classList.remove("hidden");
              }
              adminModal.classList.remove("hidden");
          };
          div.querySelector(".deleteBtn").onclick = (e) => {
              e.stopPropagation();
              if(confirm("Delete this post?")){
                  db.collection("posts").doc(doc.id).delete().then(fetchPosts);
              }
          };
      }
      postsContainer.appendChild(div);
    });
  } catch (err) {
    postsContainer.innerHTML = "Error loading posts: " + err.message;
  }
}

async function savePost(){
  const t = document.getElementById("title").value.trim();
  const c = document.getElementById("content").value.trim();
  if(!t || !c){ alert("Please fill title and content"); return; }

  try {
    if(editId){
      await db.collection("posts").doc(editId).update({
        title: t, content: c, image: uploadedImage
      });
      alert("Post Updated!");
    } else {
      await db.collection("posts").add({
        title: t, content: c, image: uploadedImage, likes: 0, createdAt: new Date()
      });
      alert("Post Saved!");
    }
    closeAdmin();
    fetchPosts();
  } catch(err) { alert("Error: " + err.message); }
}

// Search Logic
document.getElementById("search").oninput = async e => {
  const val = e.target.value.toLowerCase();
  const allCards = postsContainer.querySelectorAll("div.bg-white");
  allCards.forEach(card => {
    const title = card.querySelector("h2").innerText.toLowerCase();
    card.style.display = title.includes(val) ? "block" : "none";
  });
};

// Start
fetchPosts();
</script>
</body>
</html>
