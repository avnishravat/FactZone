<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FactZone</title>

<link rel="icon" href="logo.svg">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{background:#f1f5f9;}

.heart{
position:absolute;
top:50%;left:50%;
transform:translate(-50%,-50%) scale(0);
font-size:60px;
opacity:0;
transition:.4s;
}
.show{
transform:translate(-50%,-50%) scale(1.3);
opacity:1;
}
</style>
</head>

<body>

<header onclick="openLogin()" class="flex items-center justify-center gap-2 p-4 bg-white shadow cursor-pointer">
<img src="logo.svg" class="w-8">
<h1 class="text-xl font-bold">FactZone</h1>
</header>

<main id="posts" class="p-6 grid md:grid-cols-3 gap-6"></main>

<button id="addBtn" class="hidden fixed bottom-5 right-5 bg-black text-white p-4 rounded-full">+</button>

<!-- LOGIN -->
<div id="login" class="hidden fixed inset-0 bg-black/70 flex justify-center items-center">
<div class="bg-white p-4 w-80 rounded">
<input id="pass" placeholder="Enter Password" class="border p-2 mb-2 w-full">
<button onclick="login()" class="bg-black text-white w-full p-2">Login</button>
</div>
</div>

<!-- ADMIN -->
<div id="admin" class="hidden fixed inset-0 bg-black/70 flex justify-center items-center">
<div class="bg-white p-4 w-96">
<input id="title" placeholder="Title" class="w-full border p-2 mb-2">
<textarea id="content" placeholder="Content" class="w-full border p-2 mb-2"></textarea>
<input type="file" id="file">
<img id="preview" class="hidden w-full h-40 mt-2">
<button onclick="savePost()" class="bg-black text-white w-full p-2 mt-2">Save</button>
</div>
</div>

<script>

// 🔥 CONFIG
const firebaseConfig = {
apiKey: "AIzaSyCUyQyMzEee1eO1RqmhTmIp_OjLT7guUAc",
authDomain:"factzone-a9ace.firebaseapp.com",
projectId:"factzone-a9ace"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const ADMIN_PASS="Avnish@";

let isAdmin=false, editId=null, img="";

// LOGIN OPEN
function openLogin(){
login.classList.remove("hidden");
}

// LOGIN
function login(){
if(pass.value === ADMIN_PASS){
isAdmin=true;
addBtn.classList.remove("hidden");
login.classList.add("hidden");
}else{
alert("Wrong Password");
}
}

// IMAGE
file.onchange=e=>{
let r=new FileReader();
r.onload=()=>{img=r.result;preview.src=img;preview.classList.remove("hidden");};
if(e.target.files[0])r.readAsDataURL(e.target.files[0]);
};

// SAVE
async function savePost(){
let t=title.value.trim();
let c=content.value.trim();
if(!t||!c)return alert("Fill all");

if(editId){
await db.collection("posts").doc(editId).update({
title:t,content:c,image:img,adminKey:ADMIN_PASS
});
}else{
await db.collection("posts").add({
title:t,content:c,image:img,likes:0,adminKey:ADMIN_PASS
});
}

admin.classList.add("hidden");
load();
}

// LOAD
async function load(){
posts.innerHTML="";
let snap=await db.collection("posts").get();

snap.forEach(doc=>{
let p=doc.data();

let div=document.createElement("div");
div.className="bg-white p-4 rounded shadow";

div.innerHTML=`
<h2 class="font-bold">${p.title}</h2>
<p>${(p.content||"").substring(0,80)}...</p>

<div class="flex justify-between mt-2">
<span onclick="like('${doc.id}')" class="cursor-pointer text-red-500">
❤️ ${p.likes||0}
</span>

${isAdmin?`
<div>
<button onclick="edit('${doc.id}')">✏️</button>
<button onclick="del('${doc.id}')">🗑️</button>
</div>`:''}
</div>
`;

posts.appendChild(div);
});
}

// LIKE
async function like(id){
await db.collection("posts").doc(id).update({
likes: firebase.firestore.FieldValue.increment(1)
});
load();
}

// EDIT
async function edit(id){
let doc=await db.collection("posts").doc(id).get();
let p=doc.data();

editId=id;
title.value=p.title;
content.value=p.content;
admin.classList.remove("hidden");
}

// DELETE
async function del(id){
if(confirm("Delete?")){
await db.collection("posts").doc(id).delete();
load();
}
}

// OPEN ADMIN
addBtn.onclick=()=> admin.classList.remove("hidden");

// INIT
load();

</script>

</body>
</html>
