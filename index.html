    body {
      background: #f3f4f6;
      font-family: Arial, sans-serif;

      padding: 0;
      overflow-x: hidden;
      transition: background-color 0.3s, color 0.3s;
    }
    html.dark body {
      background: #111827;
    }
    .card {
      transition: .3s;
      border: 2px solid #e5e7eb;
      background: #fff;
      border-radius: 20px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 100%;
      position: relative;
    }
    html.dark .card {
      background: #1f2937;
      border-color: #374151;
    }
    .card:hover {
      transform: translateY(-5px);
      border-color: black;
    }
    html.dark .card:hover {
      border-color: #ffffff;
    }
    .post-image {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
      background: #ddd;
    }
    .line2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    #posts {
      align-items: start;
      min-height: 300px;
    }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-thumb { background: #888; border-radius: 20px; }

    /* ── Reading Time Badge ── */
    .reading-time-badge {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.65);
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 4px;
      backdrop-filter: blur(4px);
      pointer-events: none;
      z-index: 2;
    }

    /* ── Share Button on Card ── */
    .share-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0,0,0,0.65);
      color: #fff;
      border: none;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
      z-index: 3;
      transition: background 0.2s, transform 0.2s;
    }
    .share-btn:hover {
      background: rgba(0,0,0,0.9);
      transform: scale(1.1);
    }
    .share-btn svg {
      width: 15px;
      height: 15px;
      fill: white;
    }

    /* ── Share Popup ── */
    .share-popup {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #fff;
      border-radius: 24px 24px 0 0;
      padding: 24px;
      z-index: 1000;
      box-shadow: 0 -8px 32px rgba(0,0,0,0.15);
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    html.dark .share-popup {
      background: #1f2937;
      color: #fff;
    }
    .share-popup.active {
      display: block;
      transform: translateY(0);
    }
    .share-popup-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 999;
      transition: opacity 0.3s;
    }
    .share-popup-overlay.active {
      display: block;
    }
    .share-popup h3 {
      font-size: 16px;
      font-weight: 700;
      margin: 0 0 16px;
      text-align: center;
    }
    .share-options {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    .share-option {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      color: #374151;
      border: none;
      background: none;
      padding: 8px 12px;
      border-radius: 12px;
      transition: background 0.2s;
    }
    html.dark .share-option {
      color: #d1d5db;
    }
    .share-option:hover {
      background: #f3f4f6;
    }
    html.dark .share-option:hover {
      background: #374151;
    }
    .share-option .icon {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }
    .share-popup-close {
      display: block;
      margin: 20px auto 0;
      background: #f3f4f6;
      border: none;
      border-radius: 20px;
      padding: 10px 32px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      color: #374151;
      transition: background 0.2s;

      background: #374151;
      color: #fff;
    }
    .share-popup-close:hover {
      background: #e5e7eb;
    }

    #copy-toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: #111827;
      color: #fff;
      padding: 10px 22px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 600;
      z-index: 2000;

      pointer-events: none;
    }
    #copy-toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* ── Skeleton Loading ── */
    @keyframes shimmer {
      0% { background-position: -700px 0; }
      100% { background-position: 700px 0; }
    }
    .skeleton-card {
      border: 2px solid #e5e7eb;

    .skeleton-line {

  <!-- Dark Mode Script -->
  <script>
    const toggleBtn = document.getElementById('themeToggle');
    const toggleBtnMobile = document.getElementById('themeToggleMobile');
    function toggleTheme() {
      if (document.documentElement.classList.contains('dark')) {
        document.documentElement.classList.remove('dark');
        localStorage.setItem('theme', 'light');
      } else {
        document.documentElement.classList.add('dark');
        localStorage.setItem('theme', 'dark');
      }
    }
    toggleBtn.addEventListener('click', toggleTheme);
    toggleBtnMobile.addEventListener('click', toggleTheme);
  </script>

  <!-- Share Popup Script -->
  <script>
    let currentShareUrl = '';
    let currentShareTitle = '';

    const sharePopup = document.getElementById('sharePopup');
    const shareOverlay = document.getElementById('shareOverlay');

    function openSharePopup(url, title) {
      currentShareUrl = url;
      currentShareTitle = title;
      sharePopup.style.display = 'block';
      shareOverlay.classList.add('active');
      requestAnimationFrame(() => sharePopup.classList.add('active'));
    }

    function closeSharePopup() {
      sharePopup.classList.remove('active');
      shareOverlay.classList.remove('active');
      setTimeout(() => { sharePopup.style.display = 'none'; }, 350);
    }

    document.getElementById('closeSharePopup').addEventListener('click', closeSharePopup);
    shareOverlay.addEventListener('click', closeSharePopup);

    document.getElementById('shareWhatsApp').addEventListener('click', () => {
      window.open(`https://wa.me/?text=${encodeURIComponent(currentShareTitle + ' ' + currentShareUrl)}`, '_blank');
    });
    document.getElementById('shareTwitter').addEventListener('click', () => {
      window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(currentShareTitle)}&url=${encodeURIComponent(currentShareUrl)}`, '_blank');
    });
    document.getElementById('shareFacebook').addEventListener('click', () => {
      window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(currentShareUrl)}`, '_blank');
    });
    document.getElementById('shareTelegram').addEventListener('click', () => {
      window.open(`https://t.me/share/url?url=${encodeURIComponent(currentShareUrl)}&text=${encodeURIComponent(currentShareTitle)}`, '_blank');
    });
    document.getElementById('shareCopy').addEventListener('click', () => {
      navigator.clipboard.writeText(currentShareUrl).then(() => {
        closeSharePopup();
        const toast = document.getElementById('copy-toast');
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2500);
      });
    });
  </script>

            </button>
          </div>
          <div class="p-4 flex flex-col flex-1">
            <h2 class="font-bold text-xl mb-2 line2 dark:text-white">${post.title || ''}</h2>
            <p class="text-gray-600 dark:text-gray-400 text-sm line2">${post.desc || ''}</p>
          </div>
        </a>`;
    }

    // ── Filter posts by search + category ──
    const categoryMap = {
      science: ["science","विज्ञान","वैज्ञानिक","space","अंतरिक्ष","ग्रह","earth"],
      tech: ["tech","technology","तकनीक","मोबाइल","computer","ai","इंटरनेट"],
      history: ["history","इतिहास","पुराना","राजा","किला","प्राचीन","mystery"],
      mystery: ["mystery","रहस्य","अनसुलझा","हैरान","भूत","रहस्यमयी"],
      viral: ["viral","रोचक","तथ्य","amazing","facts","knowledge","fact"]
    };

    function getFilteredPosts() {
      return allPosts.filter(post => {
        const text = ((post.title || '') + ' ' + (post.desc || '')).toLowerCase();
        const matchesSearch = !activeSearch || text.includes(activeSearch);
        let matchesCategory = activeCategory === 'all';
        if (!matchesCategory) {
          matchesCategory = (categoryMap[activeCategory] || []).some(kw => text.includes(kw));
        }
        return matchesSearch && matchesCategory;
      });
    }

    function renderPosts(reset = false) {
      if (reset) {
        postsContainer.innerHTML = '';
        visibleCount = 0;
      }
      const filtered = getFilteredPosts();
      const slice = filtered.slice(visibleCount, visibleCount + POSTS_PER_PAGE);
      slice.forEach(post => {
        postsContainer.insertAdjacentHTML('beforeend', buildCardHTML(post));
      });
      visibleCount += slice.length;

      // Load More only shown if somehow paginating
      if (visibleCount < filtered.length) {
        loadMoreBtn.style.display = 'block';
        loadMoreBtn.disabled = false;
        loadMoreBtn.classList.remove('loading');
        loadMoreBtn.textContent = `Load More Posts (${filtered.length - visibleCount} left)`;
      } else {
        loadMoreBtn.style.display = 'none';
      }

      if (filtered.length === 0 && allPosts.length > 0) {
        postsContainer.innerHTML = `<h2 class="text-center text-2xl col-span-full dark:text-white">No posts found 😕</h2>`;
      }
    }

    loadMoreBtn.addEventListener('click', () => {
      loadMoreBtn.disabled = true;
      loadMoreBtn.classList.add('loading');
      setTimeout(() => renderPosts(false), 300);
    });

    async function loadPosts() {
      // 1. Try cache first for instant display
      const cachedRaw = localStorage.getItem(CACHE_KEY);
      const cachedTime = parseInt(localStorage.getItem(CACHE_TIME_KEY) || '0');
      const cacheValid = cachedRaw && (Date.now() - cachedTime < CACHE_TTL);

      if (cachedRaw) {
        try {
          allPosts = JSON.parse(cachedRaw);
          hideSkeletons();
          renderPosts(true);
        } catch(e) {
          localStorage.removeItem(CACHE_KEY);
        }
      }

      // 2. Always fetch fresh from Firebase (even if cache was used)
      try {
        // No orderBy — avoids Firestore index requirement. Sort client-side instead.
        const q = query(collection(db, "posts"));
        const querySnapshot = await getDocs(q);

        if (querySnapshot.empty) {
          if (!cachedRaw) {
            hideSkeletons();
            postsContainer.innerHTML = `<h2 class="text-center text-2xl col-span-full dark:text-white">No Posts Found</h2>`;
          }
          return;
        }

        const postsArray = [];
        querySnapshot.forEach(doc => postsArray.push({ id: doc.id, ...doc.data() }));
        postsArray.sort((a, b) => {
          const tA = a.createdAt?.seconds || a.createdAt || 0;
          const tB = b.createdAt?.seconds || b.createdAt || 0;
          return tB - tA;
        });

        allPosts = postsArray;
        localStorage.setItem(CACHE_KEY, JSON.stringify(postsArray));
        localStorage.setItem(CACHE_TIME_KEY, Date.now().toString());

        hideSkeletons();
        renderPosts(true);

      } catch (error) {
        console.error("Firebase fetch error:", error);
        // If cache was shown already, keep it. Otherwise show error.
        if (!cachedRaw) {
          hideSkeletons();
          postsContainer.innerHTML = `<div class="col-span-full text-center py-10">
            <p class="text-2xl mb-3">⚠️</p>
            <p class="text-gray-600 dark:text-gray-400 font-semibold">Posts load nahi ho sake.<br>Internet check karein aur page reload karein.</p>
            <button onclick="location.reload()" class="mt-4 bg-black dark:bg-white text-white dark:text-black px-6 py-2 rounded-full font-bold text-sm">🔄 Reload</button>
          </div>`;
        }
      }
    }

    // Search & filter listeners
    document.getElementById("searchInput").addEventListener("input", e => {
      activeSearch = e.target.value.toLowerCase();
      renderPosts(true);
    });
    document.getElementById("filterInput").addEventListener("change", e => {
      activeCategory = e.target.value;
      renderPosts(true);
    });

    loadPosts();
  </script>

</body>
</html>
