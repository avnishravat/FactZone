<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">
<title>FactZone</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{background:#fff;font-family:sans-serif;}
header{background:#000;color:#fff;}
.post{max-width:500px;margin:auto;margin-bottom:20px;background:#fff;
border-radius:12px;box-shadow:0 4px 10px rgba(0,0,0,0.1);overflow:hidden;}
</style>
</head>

<body>

<header class="flex justify-between p-3">
<h1 onclick="openLogin()" class="cursor-pointer font-bold">🔥 FactZone</h1>
<input id="search" placeholder="🔍 Search..." class="px-3 py-1 rounded text-black">
</header>

<div id="posts" class="p-3"></div>

<button id="adminBtn" onclick="openAdmin()" 
class="hidden fixed bottom-5 right-5 bg-black text-white px-4 py-3 rounded-full">+</button>

<!-- LOGIN -->
<div id="loginBox" class="hidden fixed inset-0 bg-black/50 flex justify-center items-center">
<div class="bg-white p-5">
<input id="pass" type="password" placeholder="Password" class="border p-2 mb-2">
<button onclick="login()">Unlock</button>
</div>
</div>

<!-- ADMIN -->
<div id="adminPanel" class="hidden fixed inset-0 bg-black/50 flex justify-center items-center">
<div class="bg-white p-5 w-[90%] max-w-md">
<input id="title" placeholder="Title" class="border p-2 mb-2 w-full">
<textarea id="content" placeholder="Content" class="border p-2 mb-2 w-full"></textarea>
<input type="file" id="fileInput">
<button onclick="savePost()" class="bg-green-500 text-white w-full mt-2 py-2">Save</button>
</div>
</div>

<script>
const firebaseConfig={
apiKey:"AIzaSyCUyQyMzEee1eO1RqmhTmIp_OjLT7guUAc",
authDomain:"factzone-a9ace.firebaseapp.com",
projectId:"factzone-a9ace"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

let isAdmin=false,editId=null,imgData="";

function openLogin(){loginBox.classList.remove("hidden");}
function login(){
if(pass.value==="Avnish@@"){
isAdmin=true;
adminBtn.classList.remove("hidden");
loginBox.classList.add("hidden");
fetchPosts();
}else alert("Wrong Password");
}

fileInput.onchange=e=>{
let r=new FileReader();
r.onload=()=>imgData=r.result;
r.readAsDataURL(e.target.files[0]);
};

async function fetchPosts(){
posts.innerHTML="Loading...";
let snap=await db.collection("posts").orderBy("createdAt","desc").get();

posts.innerHTML="";

snap.forEach(doc=>{
let p=doc.data();

let div=document.createElement("div");
div.className="post";

div.innerHTML=`
<a href="./detail.html?id=${doc.id}" style="text-decoration:none;color:inherit;display:block">

${p.image?`<img src="${p.image}" style="width:100%;height:250px;object-fit:cover;">`:""}

<div style="padding:10px">
<h2><b>${p.title}</b></h2>
<p>${p.content.substring(0,80)}...</p>

<div style="display:flex;justify-content:space-between;margin-top:5px">
<button class="likeBtn">❤️ ${p.likes||0}</button>
<span>👁 ${p.views||0}</span>
</div>

${isAdmin?`
<button class="editBtn">Edit</button>
<button class="deleteBtn">Delete</button>`:""}

</div>
</a>
`;

div.querySelector(".likeBtn").onclick=(e)=>{
e.preventDefault();
e.stopPropagation();
db.collection("posts").doc(doc.id).update({
likes:firebase.firestore.FieldValue.increment(1)
}).then(fetchPosts);
};

if(isAdmin){
div.querySelector(".editBtn").onclick=(e)=>{
e.preventDefault();e.stopPropagation();edit(doc.id);
};
div.querySelector(".deleteBtn").onclick=(e)=>{
e.preventDefault();e.stopPropagation();
if(confirm("Delete?")){
db.collection("posts").doc(doc.id).delete().then(fetchPosts);
}
};
}

posts.appendChild(div);
});
}

fetchPosts();

function openAdmin(){adminPanel.classList.remove("hidden");}

function savePost(){
if(!title.value||!content.value)return alert("Fill fields");

if(editId){
db.collection("posts").doc(editId).set({
title:title.value,content:content.value,image:imgData
},{merge:true});
}else{
db.collection("posts").add({
title:title.value,content:content.value,image:imgData,
likes:0,views:0,createdAt:new Date()
});
}

adminPanel.classList.add("hidden");
fetchPosts();
}

function edit(id){editId=id;openAdmin();}

search.oninput=e=>{
let v=e.target.value.toLowerCase();
document.querySelectorAll("#posts > div").forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(v)?"block":"none";
});
};
</script>

</body>
</html>
