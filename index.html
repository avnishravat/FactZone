  <style>
    body{
      background:#f3f4f6;
      font-family:Arial,sans-serif;

      padding:0;
      overflow-x:hidden;
    }
    .card{
      transition:.3s;
      border:2px solid #e5e7eb;
      background:#fff;
      border-radius:20px;
      overflow:hidden;

      height:100%;
    }
    .card:hover{
      transform:translateY(-5px);
      border-color:black;
    }
    .post-image{
      width:100%;
      height:220px;
      object-fit:cover;
      display:block;
      background:#ddd;
    }
    .line2{
      display:-webkit-box;
      -webkit-line-clamp:2;
      -webkit-box-orient:vertical;
      overflow:hidden;
    }
    #posts{
      align-items:start;
      min-height:300px;
    }
    ::-webkit-scrollbar{
      width:8px;
    }
    ::-webkit-scrollbar-thumb{
      background:#888;
      border-radius:20px;
    }

  <!-- Tailwind Script Defer loaded -->

  <script type="application/ld+json">

      "target":"https://factzone.online/?search={search_term_string}",

<body>

  <header class="bg-black sticky top-0 z-50 shadow-lg">
    <div class="max-w-7xl mx-auto px-4 py-3 flex flex-col sm:flex-row gap-3 items-center justify-between">
      
      <a href="index.html" class="flex items-center gap-2.5 self-start sm:self-center">
        <div class="p-[2px] bg-gradient-to-tr from-yellow-400 via-pink-500 to-purple-600 rounded-full flex items-center justify-center shadow-md">
          <img src="logo.svg" alt="FactZone Logo" class="w-8 h-8 rounded-full bg-black p-0.5" width="32" height="32">
        </div>
        <h1 class="text-xl md:text-2xl font-bold text-white tracking-wide">FactZone</h1>
      </a>
      
      <div class="w-full sm:w-auto flex items-center gap-2 max-w-md">
        <div class="relative flex-1 sm:w-64">
          <input type="text" id="searchInput" placeholder="Search posts..." class="w-full px-4 py-1.5 rounded-full outline-none text-sm text-black border border-gray-700 bg-white placeholder-gray-400">
        </div>
        
        <select id="filterInput" class="bg-gray-900 text-white text-xs font-medium px-3 py-1.5 rounded-full border border-gray-800 outline-none cursor-pointer hover:bg-gray-800 transition-colors">
          <option value="all">All Topics</option>
          <option value="science">🔬 Science / विज्ञान</option>
          <option value="tech">💻 Tech / तकनीक</option>
          <option value="history">📜 History / इतिहास</option>
          <option value="mystery">🔮 Mystery / रहस्य</option>
          <option value="viral">🔥 Viral / रोचक तथ्य</option>
        </select>
      </div>

    </div>
  </header>

  <section class="max-w-7xl mx-auto px-5 py-4">
    <h2 class="text-2xl font-bold">Amazing Facts, Science Facts & Knowledge</h2>
    <p class="text-gray-600 mt-2">Read science facts, technology facts, history facts, mystery facts and educational knowledge articles.</p>
  </section>
    
  <!-- MAIN CONTAINER (INSTANT INSTANT RENDER FROM LOCALSTORAGE) -->
  <main id="posts" class="max-w-7xl mx-auto p-5 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
    <script>
      // Page render block hone se pehle local storage se posts inject kar do
      const cached = localStorage.getItem("factzone_posts");
      if(cached) {
        document.write(cached);
      } else {
        document.write(`
          <div id="seo-placeholder-cards" class="col-span-full grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 w-full">
            <div class="card shadow-lg">
              <img src="logo.svg" alt="Amazing Science Facts" class="post-image p-4 bg-gray-900 object-contain" width="100%" height="220">
              <div class="p-4 flex flex-col flex-1">
                <h2 class="font-bold text-xl mb-2 line2">विज्ञान से जुड़े कुछ बेहद हैरान करने वाले रोचक तथ्य</h2>
                <p class="text-gray-600 text-sm line2">Read amazing science facts on FactZone Official...</p>
              </div>
            </div>
          </div>
        `);
      }
    </script>
  </main>

  <footer class="bg-black text-white mt-10">
    <div class="max-w-7xl mx-auto px-5 py-8 text-center">
      <div class="flex flex-wrap gap-5 justify-center text-sm mb-5">
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="privacy.html">Privacy</a>
        <a href="terms.html">Terms</a>
        <a href="disclaimer.html">Disclaimer</a>
      </div>
      <p class="text-gray-400">
        © 2026 FactZone • <a href="author.html" class="hover:text-white underline transition">Awaneesh</a>
      </p>
    </div>
  </footer>

  <script type="module">
    // Filter posts standalone function
    window.filterPosts = function() {
      const searchValue = document.getElementById("searchInput").value.toLowerCase();
      const selectedCategory = document.getElementById("filterInput").value;
      
      const categoryMap = {
        science: ["science", "विज्ञान", "वैज्ञानिक", "space", "अंतरिक्ष", "ग्रह", "earth"],
        tech: ["tech", "technology", "तकनीक", "मोबाइल", "computer", "ai", "इंटरनेट"],
        history: ["history", "इતિહાસ", "पुराना", "राजा", " किला", "प्राचीन", "mystery"],
        mystery: ["mystery", "रहस्य", "अनसुलझा", "हैरान", "भूत", "रहस्यमयी"],
        viral: ["viral", "रोचक", "तथ्य", "amazing", "facts", "knowledge", "fact"]
      };

      document.querySelectorAll("#posts a").forEach(card => {
        const cardText = card.innerText.toLowerCase();
        const matchesSearch = cardText.includes(searchValue);
        let matchesCategory = false;
        
        if (selectedCategory === "all") {
          matchesCategory = true;
        } else {
          const keywords = categoryMap[selectedCategory];
          matchesCategory = keywords.some(keyword => cardText.includes(keyword));
        }
        
        card.style.display = (matchesSearch && matchesCategory) ? "block" : "none";
      });
    }

    document.getElementById("searchInput").addEventListener("input", window.filterPosts);
    document.getElementById("filterInput").addEventListener("change", window.filterPosts);

    // Smart Interactivity Delay Strategy for Scripts
    let heavyScriptsLoaded = false;
    
    function loadHeavyScripts() {
      if (heavyScriptsLoaded) return;
      heavyScriptsLoaded = true;

      // 1. Dynamic Analytics Load
      const gaScript = document.createElement('script');
      gaScript.src = "https://www.googletagmanager.com/gtag/js?id=G-311JQXBXR9";
      gaScript.async = true;
      document.head.appendChild(gaScript);
      
      gaScript.onload = () => {
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-311JQXBXR9');
      };

      // 2. Dynamic AdSense Load
      const adsScript = document.createElement('script');
      adsScript.src = "https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-697419046628538";
      adsScript.crossOrigin = "anonymous";
      adsScript.async = true;
      document.head.appendChild(adsScript);

      // 3. Dynamic Firebase Import and Core Fetch
      import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js").then((firebaseModule) => {
        import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js").then((firestoreModule) => {
          
          const firebaseConfig = {
            apiKey: "AIzaSyCUyQyMzEee1eO1RqmhTmIp_OjLT7guUAc",
            authDomain: "factzone-a9ace.firebaseapp.com",
            databaseURL: "https://factzone-a9ace-default-rtdb.firebaseio.com",
            projectId: "factzone-a9ace",
            storageBucket: "factzone-a9ace.firebasestorage.app",
            messagingSenderId: "425838320650",
            appId: "1:425838320650:web:beab18baddf818cb73d3f3",
            measurementId: "G-311JQXBXR9"
          };

          const app = firebaseModule.initializeApp(firebaseConfig);
          const db = firestoreModule.getFirestore(app);
          const postsContainer = document.getElementById("posts");

          async function fetchFirebaseData() {
            try {
              const q = firestoreModule.query(firestoreModule.collection(db, "posts"), firestoreModule.orderBy("createdAt", "desc"));
              const querySnapshot = await firestoreModule.getDocs(q);

              if(querySnapshot.empty) return;

              const postsArray = [];
              querySnapshot.forEach((doc) => {
                postsArray.push({ id: doc.id, ...doc.data() });
              });

              postsArray.sort((a, b) => {
                const timeA = a.createdAt?.seconds || a.createdAt || 0;
                const timeB = b.createdAt?.seconds || b.createdAt || 0;
                return timeB - timeA; 
              });

              let htmlContent = "";
              postsArray.forEach((post)=>{
                htmlContent += `
                <a href="detail.html?id=${post.id}" class="card shadow-lg">
                  <img src="${post.image || 'https://via.placeholder.com/500'}" alt="${post.title || 'FactZone Post'}" class="post-image" loading="lazy" width="100%" height="220">
                  <div class="p-4 flex flex-col flex-1">
                    <h2 class="font-bold text-xl mb-2 line2">${post.title || ''}</h2>
                    <p class="text-gray-600 text-sm line2">${post.desc || ''}</p>
                  </div>
                </a>`;
              });

              postsContainer.innerHTML = htmlContent;
              localStorage.setItem("factzone_posts", htmlContent);
              window.filterPosts();
            } catch (err) {
              console.error(err);
            }
          }
          fetchFirebaseData();
        });
      });
    }

    // Trigger loading on user movement, scroll or mouse intent
    window.addEventListener('scroll', loadHeavyScripts, { passive: true });
    window.addEventListener('touchstart', loadHeavyScripts, { passive: true });
    window.addEventListener('mousemove', loadHeavyScripts, { passive: true });
    
    // Safety fallback: load anyway after 3.5 seconds if user is idle
    setTimeout(loadHeavyScripts, 3500);
  </script>

</body>
</html>
