<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FactZone</title>

<link rel="icon" href="logo.svg">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{background:#f1f5f9;}
</style>
</head>

<body>

<header id="logo" class="flex justify-center gap-2 p-4 bg-white shadow cursor-pointer">
<img src="logo.svg" class="w-8">
<h1 class="text-xl font-bold">FactZone</h1>
</header>

<main id="posts" class="p-6 grid md:grid-cols-3 gap-6"></main>

<button id="addBtn" class="hidden fixed bottom-5 right-5 bg-black text-white p-4 rounded-full">+</button>

<!-- LOGIN -->
<div id="login" class="hidden fixed inset-0 bg-black/70 flex justify-center items-center">
<div class="bg-white p-4 w-80 rounded">
<input id="pass" placeholder="Password" class="border p-2 mb-2 w-full">
<button id="loginBtn" class="bg-black text-white w-full p-2">Login</button>
</div>
</div>

<!-- ADMIN -->
<div id="admin" class="hidden fixed inset-0 bg-black/70 flex justify-center items-center">
<div class="bg-white p-4 w-96">
<input id="title" placeholder="Title" class="w-full border p-2 mb-2">
<textarea id="content" placeholder="Content" class="w-full border p-2 mb-2"></textarea>
<button id="saveBtn" class="bg-black text-white w-full p-2">Save</button>
</div>
</div>

<script>

const firebaseConfig = {
apiKey: "AIzaSyCUyQyMzEee1eO1RqmhTmIp_OjLT7guUAc",
authDomain:"factzone-a9ace.firebaseapp.com",
projectId:"factzone-a9ace"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const ADMIN_PASS = "Avnish@";

let isAdmin = false;
let editId = null;

// LOGIN OPEN
logo.onclick = () => login.classList.remove("hidden");

// LOGIN
loginBtn.onclick = () => {
if(pass.value === ADMIN_PASS){
isAdmin = true;
addBtn.classList.remove("hidden");
login.classList.add("hidden");
load();
}else{
alert("Wrong password");
}
};

// OPEN ADMIN
addBtn.onclick = () => {
editId = null;
admin.classList.remove("hidden");
};

// SAVE
saveBtn.onclick = async () => {

let t = title.value.trim();
let c = content.value.trim();

if(!t || !c){
alert("Fill all");
return;
}

if(editId){
await db.collection("posts").doc(editId).update({
title:t,
content:c,
adminKey:ADMIN_PASS
});
}else{
await db.collection("posts").add({
title:t,
content:c,
likes:0,
adminKey:ADMIN_PASS
});
}

admin.classList.add("hidden");
load();
};

// LOAD POSTS
async function load(){
posts.innerHTML="";

let snap = await db.collection("posts").get();

snap.forEach(doc=>{

let p = doc.data();

let div = document.createElement("div");
div.className="bg-white p-4 rounded shadow cursor-pointer";

div.innerHTML = `
<h2 class="font-bold">${p.title}</h2>
<p>${p.content.substring(0,80)}...</p>

<div class="flex justify-between mt-2">
<span class="like text-red-500 cursor-pointer">❤️ ${p.likes||0}</span>

${isAdmin ? `
<div>
<button class="edit">✏️</button>
<button class="del">🗑️</button>
</div>` : ""}
</div>
`;

// OPEN DETAILS
div.onclick = () => {
window.location.href = "details.html?id="+doc.id;
};

// LIKE
div.querySelector(".like").onclick = (e)=>{
e.stopPropagation();

db.collection("posts").doc(doc.id).update({
likes: firebase.firestore.FieldValue.increment(1)
});
};

// ADMIN
if(isAdmin){

div.querySelector(".edit").onclick = (e)=>{
e.stopPropagation();

editId = doc.id;
title.value = p.title;
content.value = p.content;
admin.classList.remove("hidden");
};

div.querySelector(".del").onclick = async (e)=>{
e.stopPropagation();

if(confirm("Delete?")){
await db.collection("posts").doc(doc.id).delete();
load();
}
};

}

posts.appendChild(div);

});
}

load();

</script>

</body>
</html>
