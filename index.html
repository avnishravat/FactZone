<!DOCTYPE html>
<html lang="hi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FactZone | Amazing Facts & Knowledge</title>

<meta name="description"
content="Amazing facts, science facts, technology facts and educational knowledge platform.">

<meta name="keywords"
content="facts, amazing facts, science facts, technology facts, space facts">

<meta name="robots"
content="index, follow">

<link rel="canonical"
href="https://factzone.online/">

<link rel="icon"
href="logo.svg">

<script src="https://cdn.tailwindcss.com"></script>

<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>

body{
background:#f3f4f6;
font-family:Arial,sans-serif;
}

.card{
transition:.3s;
border:2px solid #e5e7eb;
}

.card:hover{
transform:translateY(-6px);
border-color:black;
}

.line2{
display:-webkit-box;
-webkit-line-clamp:2;
-webkit-box-orient:vertical;
overflow:hidden;
}

</style>

</head>

<body>

<!-- HEADER -->

<header class="bg-black sticky top-0 z-50 shadow-lg">

<div class="max-w-7xl mx-auto p-4">

<div
onclick="openLogin()"
class="flex items-center gap-3 mb-4 cursor-pointer">

<img
src="logo.svg"
class="w-11 h-11 rounded-full bg-white p-1">

<h1 class="text-2xl font-bold text-white">
FactZone
</h1>

</div>

<input
type="text"
id="searchInput"
placeholder="🔍 Search posts..."
class="w-full px-5 py-3 rounded-full outline-none">

</div>

</header>

<!-- POSTS -->

<main
id="posts"
class="max-w-7xl mx-auto p-5 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">

</main>

<!-- ADD BUTTON -->

<button
id="addBtn"
onclick="openAdmin()"
class="hidden fixed bottom-5 right-5 w-14 h-14 rounded-full bg-black text-white text-3xl shadow-xl">
+
</button>

<!-- LOGIN MODAL -->

<div
id="loginModal"
class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">

<div class="bg-white w-[90%] max-w-sm rounded-2xl p-6">

<h2 class="text-2xl font-bold text-center mb-5">
Admin Login
</h2>

<input
id="email"
type="email"
placeholder="Email"
class="w-full border p-3 rounded-xl mb-3">

<input
id="password"
type="password"
placeholder="Password"
class="w-full border p-3 rounded-xl mb-4">

<button
onclick="login()"
class="w-full bg-black text-white py-3 rounded-xl">
Login
</button>

<button
onclick="closeLogin()"
class="w-full bg-gray-200 py-3 rounded-xl mt-3">
Close
</button>

</div>

</div>

<!-- ADMIN MODAL -->

<div
id="adminModal"
class="hidden fixed inset-0 bg-black/70 flex justify-center items-center z-50 overflow-auto">

<div class="bg-white w-[95%] max-w-2xl rounded-2xl p-5 my-10">

<h2 class="text-2xl font-bold mb-4">
Create / Edit Post
</h2>

<input
id="title"
placeholder="Post Title"
class="w-full border p-3 rounded-xl mb-3">

<textarea
id="content"
placeholder="Post Content"
class="w-full border p-3 rounded-xl h-40 mb-3"></textarea>

<input
id="image"
placeholder="Image URL"
class="w-full border p-3 rounded-xl mb-4">

<button
onclick="savePost()"
class="w-full bg-black text-white py-3 rounded-xl">
Save Post
</button>

<button
onclick="closeAdmin()"
class="w-full bg-gray-200 py-3 rounded-xl mt-3">
Close
</button>

</div>

</div>

<!-- FOOTER -->

<footer class="bg-black text-white mt-10">

<div class="max-w-7xl mx-auto px-5 py-8">

<div class="flex flex-wrap gap-5 justify-center text-sm">

<a href="about.html">About</a>

<a href="contact.html">Contact</a>

<a href="privacy.html">Privacy</a>

<a href="terms.html">Terms</a>

<a href="disclaimer.html">Disclaimer</a>

</div>

<p class="text-center text-gray-400 mt-5 text-sm">
© 2026 FactZone
</p>

</div>

</footer>

<script>

// FIREBASE CONFIG

const firebaseConfig = {

apiKey: "AIzaSyCUyQyMzEee1eO1RqmhTmIp_OjLT7guUAc",

authDomain: "factzone-a9ace.firebaseapp.com",

databaseURL: "https://factzone-a9ace-default-rtdb.firebaseio.com",

projectId: "factzone-a9ace",

storageBucket: "factzone-a9ace.firebasestorage.app",

messagingSenderId: "425838320650",

appId: "1:425838320650:web:beab18baddf818cb73d3f3",

measurementId: "G-311JQXBXR9"

};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();

const db = firebase.firestore();

let editId = null;

let isAdmin =
localStorage.getItem("admin") === "yes";

if(isAdmin){

document.getElementById("addBtn")
.classList.remove("hidden");

}

// LOGIN

function openLogin(){

document.getElementById("loginModal")
.classList.remove("hidden");

}

function closeLogin(){

document.getElementById("loginModal")
.classList.add("hidden");

}

async function login(){

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

try{

await auth.signInWithEmailAndPassword(
email,
password
);

localStorage.setItem("admin","yes");

isAdmin = true;

document.getElementById("addBtn")
.classList.remove("hidden");

closeLogin();

fetchPosts();

alert("Login Success");

}catch(err){

alert(err.message);

}

}

// ADMIN

function openAdmin(){

editId = null;

document.getElementById("title").value = "";

document.getElementById("content").value = "";

document.getElementById("image").value = "";

document.getElementById("adminModal")
.classList.remove("hidden");

}

function closeAdmin(){

document.getElementById("adminModal")
.classList.add("hidden");

}

// SAVE POST

async function savePost(){

const title =
document.getElementById("title").value;

const content =
document.getElementById("content").value;

const image =
document.getElementById("image").value;

if(editId){

await db.collection("posts")
.doc(editId)
.update({

title,
content,
image

});

}else{

await db.collection("posts")
.add({

title,
content,
image,
createdAt:Date.now()

});

}

closeAdmin();

fetchPosts();

}

// FETCH POSTS

async function fetchPosts(){

const posts =
document.getElementById("posts");

posts.innerHTML =
"<h2 class='col-span-full text-center'>Loading...</h2>";

const snapshot =
await db.collection("posts")
.orderBy("createdAt","desc")
.get();

posts.innerHTML = "";

snapshot.forEach((doc)=>{

const p = doc.data();

const div =
document.createElement("div");

div.className =
"card bg-white rounded-2xl overflow-hidden shadow-lg";

div.innerHTML = `

<a href="detail.html?id=${doc.id}">

<img
src="${p.image}"
class="w-full h-60 object-cover">

<div class="p-4">

<h2 class="font-bold text-xl mb-2 line2">
${p.title}
</h2>

<p class="text-gray-600 text-sm line2">
${p.content}
</p>

</div>

</a>

${isAdmin ? `

<div class="flex gap-2 p-4">

<button
onclick="editPost('${doc.id}','${p.title}','${p.content}','${p.image}')"
class="bg-blue-600 text-white px-4 py-2 rounded-lg">
Edit
</button>

<button
onclick="deletePost('${doc.id}')"
class="bg-red-600 text-white px-4 py-2 rounded-lg">
Delete
</button>

</div>

` : ""}

`;

posts.appendChild(div);

});

}

// EDIT

function editPost(id,title,content,image){

editId = id;

document.getElementById("title").value =
title;

document.getElementById("content").value =
content;

document.getElementById("image").value =
image;

openAdmin();

}

// DELETE

async function deletePost(id){

if(confirm("Delete Post?")){

await db.collection("posts")
.doc(id)
.delete();

fetchPosts();

}

}

// SEARCH

document.getElementById("searchInput")
.addEventListener("input",(e)=>{

const value =
e.target.value.toLowerCase();

document.querySelectorAll(".card")
.forEach(card=>{

card.style.display =
card.innerText.toLowerCase().includes(value)
? "block"
: "none";

});

});

fetchPosts();

</script>

</body>
</html>
