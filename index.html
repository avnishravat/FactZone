<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FactZone | Amazing Facts</title>

<link rel="icon" href="logo.svg">
<script src="https://cdn.tailwindcss.com"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
.container{max-width:1200px;margin:auto;}
</style>
</head>

<body class="bg-gray-100">

<!-- HEADER -->
<header class="bg-black text-white p-4 flex items-center justify-between">

<div class="flex items-center gap-3 cursor-pointer" onclick="openLogin()">
<img src="logo.svg" class="w-10 h-10 rounded-full bg-white p-1 shadow">
<h1 class="text-xl font-bold">FactZone</h1>
</div>

<input id="search" placeholder="🔍 Search..."
class="px-4 py-2 rounded-full text-black w-1/3">

</header>

<!-- POSTS -->
<div class="container">
<main id="posts" class="p-6 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6"></main>
</div>

<button id="adminBtn" onclick="openAdmin()" 
class="hidden fixed bottom-5 right-5 bg-black text-white px-4 py-3 rounded-full shadow-lg">+</button>

<!-- LOGIN -->
<div id="loginModal" class="hidden fixed inset-0 bg-black/70 flex justify-center items-center">
<div class="bg-white p-6 rounded">
<input id="adminPass" type="password" placeholder="Password" class="border p-2 mb-2 w-full">
<button onclick="checkLogin()" class="bg-black text-white w-full py-2">Login</button>
</div>
</div>

<!-- ADMIN -->
<div id="adminModal" class="hidden fixed inset-0 bg-black/70 flex justify-center items-center">
<div class="bg-white p-6 rounded w-[90%] max-w-md">
<input id="title" placeholder="Title" class="border p-2 mb-2 w-full">
<textarea id="content" placeholder="Content" class="border p-2 mb-2 w-full"></textarea>
<input type="file" id="fileInput">
<button onclick="savePost()" class="bg-black text-white w-full py-2 mt-2">Save</button>
</div>
</div>

<script>
const firebaseConfig={
apiKey:"AIzaSyCUyQyMzEee1eO1RqmhTmIp_OjLT7guUAc",
authDomain:"factzone-a9ace.firebaseapp.com",
projectId:"factzone-a9ace"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

let isAdmin=false,editId=null,imgData="";

// LOGIN
function openLogin(){loginModal.classList.remove("hidden");}
function checkLogin(){
if(adminPass.value==="Avnish@@"){
isAdmin=true;
adminBtn.classList.remove("hidden");
loginModal.classList.add("hidden");
fetchPosts();
}else alert("Wrong Password");
}

// IMAGE
fileInput.onchange=e=>{
let r=new FileReader();
r.onload=()=>imgData=r.result;
r.readAsDataURL(e.target.files[0]);
};

// FETCH POSTS
async function fetchPosts(){
posts.innerHTML="<p class='text-center col-span-full'>Loading...</p>";

let snap=await db.collection("posts").orderBy("createdAt","desc").get();

posts.innerHTML="";

snap.forEach(doc=>{
let p=doc.data();

let div=document.createElement("div");
div.className="bg-white rounded-xl shadow hover:shadow-lg cursor-pointer overflow-hidden";

// CLICK OPEN
div.onclick=()=>location.href=`detail.html?id=${doc.id}`;

div.innerHTML=`
${p.image?`<img src="${p.image}" class="w-full h-48 object-cover">`:""}

<div class="p-3">
<h2 class="font-bold text-lg">${p.title}</h2>
<p class="text-gray-600 text-sm">${p.content.substring(0,80)}...</p>

<div class="flex justify-between mt-2">
<button class="likeBtn text-red-500 font-bold">❤️ ${p.likes||0}</button>
<span class="text-gray-500 text-sm">👁 ${p.views||0}</span>
</div>

${isAdmin?`
<div class="flex gap-2 mt-2">
<button class="editBtn bg-blue-500 text-white px-2 py-1 rounded text-xs">Edit</button>
<button class="deleteBtn bg-red-500 text-white px-2 py-1 rounded text-xs">Delete</button>
</div>`:""}

</div>
`;

// LIKE
div.querySelector(".likeBtn").onclick=(e)=>{
e.stopPropagation();
e.preventDefault();
db.collection("posts").doc(doc.id).update({
likes:firebase.firestore.FieldValue.increment(1)
}).then(fetchPosts);
};

// ADMIN
if(isAdmin){
div.querySelector(".editBtn").onclick=(e)=>{
e.stopPropagation();
editId=doc.id;
title.value=p.title;
content.value=p.content;
openAdmin();
};

div.querySelector(".deleteBtn").onclick=(e)=>{
e.stopPropagation();
if(confirm("Delete?")){
db.collection("posts").doc(doc.id).delete().then(fetchPosts);
}
};
}

posts.appendChild(div);
});
}

fetchPosts();

// ADMIN
function openAdmin(){adminModal.classList.remove("hidden");}

function savePost(){
if(!title.value||!content.value)return alert("Fill fields");

if(editId){
db.collection("posts").doc(editId).set({
title:title.value,
content:content.value,
image:imgData
},{merge:true});
}else{
db.collection("posts").add({
title:title.value,
content:content.value,
image:imgData,
likes:0,
views:0,
createdAt:new Date()
});
}

adminModal.classList.add("hidden");
fetchPosts();
}

// SEARCH
search.oninput=e=>{
let v=e.target.value.toLowerCase();
document.querySelectorAll("#posts > div").forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(v)?"block":"none";
});
};
</script>

</body>
</html>
