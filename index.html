<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FactZone | Amazing Facts & Knowledge</title>

<meta name="description" content="Explore amazing facts and daily knowledge on FactZone.">
<meta name="keywords" content="facts, amazing facts, knowledge, factzone">

<meta property="og:title" content="FactZone">
<meta property="og:description" content="Daily amazing facts & knowledge">
<meta property="og:image" content="https://factzone.online/logo.svg">

<link rel="icon" href="logo.svg">

<script src="https://cdn.tailwindcss.com"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<style>
body{
background:#f3f4f6;
font-family:Arial, sans-serif;
}

.container{
max-width:1200px;
margin:auto;
}

.post-card{
transition:0.3s;
}

.post-card:hover{
transform:translateY(-5px);
}

textarea{
resize:none;
}
</style>
</head>

<body>

<!-- HEADER -->
<header class="bg-black text-white p-4 flex items-center justify-between sticky top-0 z-50 shadow-lg">

<!-- LOGO -->
<div class="flex items-center gap-3 cursor-pointer" onclick="openLogin()">

<img src="logo.svg"
class="w-10 h-10 rounded-full bg-white p-1">

<h1 class="text-2xl font-bold">
FactZone
</h1>

</div>

<!-- SEARCH -->
<input
id="search"
type="text"
placeholder="🔍 Search..."
class="w-[40%] px-4 py-2 rounded-full text-black outline-none"
/>

</header>

<!-- POSTS -->
<div class="container">

<main
id="posts"
class="p-6 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
</main>

</div>

<!-- ADMIN FLOAT BUTTON -->
<button
id="adminBtn"
onclick="openAdmin()"
class="hidden fixed bottom-5 right-5 bg-black text-white w-14 h-14 rounded-full text-3xl shadow-xl z-50">
+
</button>

<!-- LOGIN MODAL -->
<div
id="loginModal"
class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">

<div class="bg-white p-6 rounded-xl w-[90%] max-w-sm">

<h2 class="text-2xl font-bold mb-4 text-center">
Admin Login
</h2>

<input
id="adminPass"
type="password"
placeholder="Enter Password"
class="border w-full p-3 rounded mb-3 outline-none"
/>

<button
onclick="checkLogin()"
class="bg-black text-white w-full py-3 rounded-lg font-bold">
Login
</button>

<button
onclick="closeLogin()"
class="bg-gray-300 w-full py-3 rounded-lg mt-2">
Cancel
</button>

</div>
</div>

<!-- ADMIN PANEL -->
<div
id="adminModal"
class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">

<div class="bg-white p-6 rounded-xl w-[95%] max-w-lg">

<h2 class="text-2xl font-bold mb-4">
Add / Edit Post
</h2>

<input
id="title"
placeholder="Post Title"
class="border w-full p-3 rounded mb-3 outline-none"
/>

<textarea
id="content"
placeholder="Post Content"
class="border w-full p-3 rounded mb-3 h-40 outline-none"></textarea>

<input
type="file"
id="fileInput"
class="mb-3"
/>

<img
id="preview"
class="hidden w-full h-52 object-cover rounded-lg mb-3"
/>

<button
id="saveBtn"
onclick="savePost()"
class="bg-black text-white w-full py-3 rounded-lg font-bold">
Save Post
</button>

<button
onclick="closeAdmin()"
class="bg-gray-300 w-full py-3 rounded-lg mt-2">
Close
</button>

</div>
</div>

<script>

// FIREBASE CONFIG
const firebaseConfig = {
apiKey:"AIzaSyCUyQyMzEee1eO1RqmhTmIp_OjLT7guUAc",
authDomain:"factzone-a9ace.firebaseapp.com",
projectId:"factzone-a9ace"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

let isAdmin = false;
let editId = null;
let uploadedImage = "";

// OPEN LOGIN
function openLogin(){
document.getElementById("loginModal").classList.remove("hidden");
}

// CLOSE LOGIN
function closeLogin(){
document.getElementById("loginModal").classList.add("hidden");
}

// ADMIN LOGIN
async function checkLogin(){

const email = "admin@factzone.com";
const password = document.getElementById("adminPass").value;

try{

await auth.signInWithEmailAndPassword(email,password);

isAdmin = true;

document.getElementById("adminBtn").classList.remove("hidden");

closeLogin();

fetchPosts();

alert("Admin Login Success");

}catch(err){

alert("Wrong Password");

}

}

// OPEN ADMIN
function openAdmin(){

editId = null;

title.value = "";
content.value = "";

uploadedImage = "";

preview.classList.add("hidden");

adminModal.classList.remove("hidden");

}

// CLOSE ADMIN
function closeAdmin(){
adminModal.classList.add("hidden");
}

// IMAGE UPLOAD
fileInput.onchange = e=>{

const file = e.target.files[0];

if(!file) return;

const reader = new FileReader();

reader.onload = ()=>{

uploadedImage = reader.result;

preview.src = uploadedImage;

preview.classList.remove("hidden");

};

reader.readAsDataURL(file);

};

// FETCH POSTS
async function fetchPosts(){

posts.innerHTML = `
<p class="text-center col-span-full text-xl">
Loading...
</p>
`;

const snapshot = await db.collection("posts").get();

posts.innerHTML = "";

snapshot.forEach(doc=>{

const p = doc.data();

const div = document.createElement("div");

div.className =
"post-card bg-white rounded-2xl shadow overflow-hidden cursor-pointer";

div.onclick = ()=>{
location.href = `detail.html?id=${doc.id}`;
};

div.innerHTML = `

${p.image ? `
<img
src="${p.image}"
class="w-full h-56 object-cover">
` : ""}

<div class="p-4">

<h2 class="font-bold text-xl mb-2">
${p.title || ""}
</h2>

<p class="text-gray-600 text-sm mb-3">
${(p.content || "").substring(0,100)}...
</p>

<div class="flex justify-between items-center">

<button class="likeBtn text-red-500 font-bold">
❤️ ${p.likes || 0}
</button>

<span class="text-gray-500 text-sm">
👁️ ${p.views || 0} views
</span>

</div>

${isAdmin ? `

<div class="flex gap-3 mt-3">

<button
class="editBtn bg-blue-500 text-white px-3 py-1 rounded">
Edit
</button>

<button
class="deleteBtn bg-red-500 text-white px-3 py-1 rounded">
Delete
</button>

</div>

` : ""}

</div>
`;


// LIKE
div.querySelector(".likeBtn").onclick = async (e)=>{

e.stopPropagation();

await db.collection("posts").doc(doc.id).update({

likes: firebase.firestore.FieldValue.increment(1)

});

fetchPosts();

};

// ADMIN BUTTONS
if(isAdmin){

// EDIT
div.querySelector(".editBtn").onclick = (e)=>{

e.stopPropagation();

editId = doc.id;

title.value = p.title || "";

content.value = p.content || "";

uploadedImage = p.image || "";

if(p.image){

preview.src = p.image;

preview.classList.remove("hidden");

}

openAdmin();

};

// DELETE
div.querySelector(".deleteBtn").onclick = async (e)=>{

e.stopPropagation();

if(confirm("Delete this post?")){

await db.collection("posts").doc(doc.id).delete();

fetchPosts();

}

};

}

posts.appendChild(div);

});

}

// SAVE POST
async function savePost(){

const t = title.value.trim();
const c = content.value.trim();

if(!t || !c){

alert("Fill all fields");

return;

}

try{

// EDIT
if(editId){

await db.collection("posts").doc(editId).set({

title:t,
content:c,
image:uploadedImage

},{merge:true});

alert("Post Updated");

}

// NEW
else{

await db.collection("posts").add({

title:t,
content:c,
image:uploadedImage,
likes:0,
views:0,
createdAt:new Date()

});

alert("Post Uploaded");

}

closeAdmin();

fetchPosts();

}catch(err){

alert("Error: " + err.message);

}

}

// SEARCH
search.oninput = e=>{

const value = e.target.value.toLowerCase();

document.querySelectorAll("#posts > div").forEach(card=>{

card.style.display =
card.innerText.toLowerCase().includes(value)
? "block"
: "none";

});

};

// INIT
fetchPosts();

</script>

</body>
</html>
