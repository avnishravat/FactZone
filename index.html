<!-- FIREBASE -->

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
query,
orderBy,
onSnapshot
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  
const firebaseConfig = {

apiKey: "AIzaSyCUyQyMzEee1eO1RqmhTmIp_OjLT7guUAc",

authDomain: "factzone-a9ace.firebaseapp.com",

databaseURL: "https://factzone-a9ace-default-rtdb.firebaseio.com",

projectId: "factzone-a9ace",

storageBucket: "factzone-a9ace.firebasestorage.app",

messagingSenderId: "425838320650",

appId: "1:425838320650:web:beab18baddf818cb73d3f3",

measurementId: "G-311JQXBXR9"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const postsContainer =
document.getElementById("posts");

/* LOAD POSTS */

function loadPosts(){

const cachedPosts =
localStorage.getItem("factzone_posts");

if(cachedPosts){
postsContainer.innerHTML = cachedPosts;
}

const q =
query(
collection(db,"posts"),
orderBy("createdAt","desc")
);

onSnapshot(q,(querySnapshot)=>{

postsContainer.innerHTML = "";

if(querySnapshot.empty){

postsContainer.innerHTML = `
<h2 class="text-center text-2xl col-span-full">
No Posts Found
</h2>
`;

return;

}

const posts = [];

querySnapshot.forEach((doc)=>{

posts.push({
id:doc.id,
...doc.data()
});

});

posts.sort((a,b)=>
(b.createdAt || 0) - (a.createdAt || 0)
);

posts.forEach((post)=>{

postsContainer.innerHTML += `

const popularPosts =
document.getElementById("popularPosts");

if(popularPosts){

popularPosts.innerHTML = "";

posts.slice(0,5).forEach(post=>{

popularPosts.innerHTML += `
<div class="mb-3">
<a href="detail.html?id=${post.id}"
class="text-blue-600 hover:underline font-medium">
${post.title}
</a>
</div>
`;

});

}

localStorage.setItem(
"factzone_posts",
postsContainer.innerHTML
);

});

}

loadPosts();

/* SEARCH */

document.getElementById("searchInput")
.addEventListener("input",(e)=>{

const value =
e.target.value.toLowerCase();

document.querySelectorAll("#posts a")
.forEach(card=>{

card.style.display =
card.innerText.toLowerCase()
.includes(value)
? "block"
: "none";

});

});

</script>
