<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FactZone | Amazing Facts & Knowledge</title>

<meta name="description"
content="Explore amazing facts and knowledge on FactZone.">

<link rel="icon" type="image/svg+xml" href="logo.svg">

<script src="https://cdn.tailwindcss.com"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>

body{
background:#f3f4f6;
font-family:Arial,sans-serif;
}

.line2{
display:-webkit-box;
-webkit-line-clamp:2;
-webkit-box-orient:vertical;
overflow:hidden;
}

.card{
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

</style>

</head>

<body>

<!-- HEADER -->

<header class="bg-black sticky top-0 z-50 shadow-lg">

<div class="max-w-7xl mx-auto flex items-center justify-between p-4 gap-4">

<!-- LOGO -->

<div
onclick="openLogin()"
class="flex items-center gap-3 cursor-pointer">

<img
src="logo.svg"
class="w-11 h-11 rounded-full bg-white p-1">

<h1 class="text-2xl font-bold text-white">
FactZone
</h1>

</div>

<!-- SEARCH -->

<input
type="text"
id="searchInput"
placeholder="🔍 Search posts..."
class="w-full max-w-xl px-5 py-3 rounded-full outline-none">

</div>

</header>

<!-- POSTS -->

<main
id="posts"
class="max-w-7xl mx-auto p-5 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">

</main>

<!-- ADMIN BUTTON -->

<button
id="addBtn"
onclick="openAdmin()"
class="hidden fixed bottom-6 right-6 w-14 h-14 rounded-full bg-black text-white text-3xl shadow-xl z-50">
+
</button>

<!-- LOGIN MODAL -->

<div
id="loginModal"
class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">

<div class="bg-white w-[90%] max-w-sm rounded-2xl p-6">

<h2 class="text-2xl font-bold text-center mb-5">
Admin Login
</h2>

<input
type="email"
id="email"
placeholder="Email"
class="w-full border p-3 rounded-xl mb-3 outline-none">

<input
type="password"
id="password"
placeholder="Password"
class="w-full border p-3 rounded-xl mb-4 outline-none">

<button
onclick="login()"
class="w-full bg-black text-white py-3 rounded-xl font-bold">
Login
</button>

<button
onclick="closeLogin()"
class="w-full bg-gray-200 py-3 rounded-xl mt-2">
Close
</button>

</div>

</div>

<!-- ADMIN PANEL -->

<div
id="adminModal"
class="hidden fixed inset-0 bg-black/70 flex justify-center items-center z-50 overflow-auto">

<div class="bg-white w-[95%] max-w-2xl rounded-2xl p-5 my-10">

<h2 class="text-2xl font-bold mb-4">
Create / Edit Post
</h2>

<input
id="title"
placeholder="Post Title"
class="w-full border p-3 rounded-xl mb-3 outline-none">

<textarea
id="content"
placeholder="Post Content"
class="w-full border p-3 rounded-xl h-40 mb-3 outline-none"></textarea>

<input
type="file"
id="fileInput"
class="mb-4">

<img
id="preview"
class="hidden w-full h-72 object-cover rounded-xl mb-4">

<button
onclick="savePost()"
class="w-full bg-black text-white py-3 rounded-xl font-bold">
Save Post
</button>

<button
onclick="closeAdmin()"
class="w-full bg-gray-200 py-3 rounded-xl mt-3">
Close
</button>

</div>

</div>

<script>

// FIREBASE CONFIG

const firebaseConfig = {

apiKey:"AIzaSyCUyQyMzEee1eO1RqmhTmIp_OjLT7guUAc",

authDomain:"factzone-a9ace.firebaseapp.com",

projectId:"factzone-a9ace"

};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

// CACHE

db.enablePersistence()
.catch((err)=>{

console.log(err);

});

let uploadedImage = "";
let editId = null;
let isAdmin = false;

// OPEN LOGIN

function openLogin(){

loginModal.classList.remove("hidden");

}

// CLOSE LOGIN

function closeLogin(){

loginModal.classList.add("hidden");

}

// LOGIN

async function login(){

const email = document.getElementById("email").value;

const password = document.getElementById("password").value;

try{

await auth.signInWithEmailAndPassword(
email,
password
);

isAdmin = true;

addBtn.classList.remove("hidden");

closeLogin();

fetchPosts();

alert("Admin Login Success ✅");

}catch(err){

alert("Wrong Email or Password");

console.log(err);

}

}

// OPEN ADMIN

function openAdmin(){

editId = null;

title.value = "";
content.value = "";

uploadedImage = "";

preview.classList.add("hidden");

adminModal.classList.remove("hidden");

}

// CLOSE ADMIN

function closeAdmin(){

adminModal.classList.add("hidden");

}

// IMAGE UPLOAD

fileInput.onchange = async (e)=>{

const file = e.target.files[0];

if(!file) return;

const formData = new FormData();

formData.append("image",file);

try{

preview.classList.remove("hidden");

preview.src =
"https://i.imgur.com/ZKZC5Qx.gif";

const response = await fetch(

"https://api.imgbb.com/1/upload?key=f1bdb9735d4cd84dd8a265b7d092d2eb",

{
method:"POST",
body:formData
}

);

const data = await response.json();

uploadedImage = data.data.url;

preview.src = uploadedImage;

alert("Image Uploaded ✅");

}catch(err){

alert("Image Upload Failed ❌");

console.log(err);

}

};

// FETCH POSTS

function fetchPosts(){

posts.innerHTML = `

<div class="text-center col-span-full py-10">

<div class="animate-spin rounded-full h-12 w-12 border-b-2 border-black mx-auto">
</div>

<p class="mt-3 text-gray-500">
Loading Posts...
</p>

</div>

`;

db.collection("posts")
.orderBy("createdAt","desc")
.onSnapshot((snapshot)=>{

posts.innerHTML = "";

if(snapshot.empty){

posts.innerHTML = `
<h2 class="text-center text-gray-500 col-span-full text-2xl">
No Posts Found
</h2>
`;

return;

}

snapshot.forEach((doc)=>{

const p = doc.data();

const div = document.createElement("div");

div.className =
"card bg-white rounded-2xl overflow-hidden shadow-lg hover:shadow-2xl";

div.innerHTML = `

<a href="detail.html?id=${doc.id}" class="block">

<img
src="${p.image || 'https://via.placeholder.com/500'}"
loading="lazy"
class="w-full h-60 object-cover bg-gray-200">

<div class="p-4">

<h2 class="font-bold text-xl mb-2 line2">
${p.title || ""}
</h2>

<p class="text-gray-600 text-sm line2 mb-4">
${p.content || ""}
</p>

<div class="flex justify-between items-center">

<button
class="likeBtn text-red-500 font-bold">
❤️ ${p.likes || 0}
</button>

<span class="text-gray-500 text-sm">
👁️ ${p.views || 0}
</span>

</div>

${isAdmin ? `

<div class="flex gap-2 mt-4">

<button
class="editBtn bg-blue-600 text-white px-4 py-2 rounded-lg text-sm">
Edit
</button>

<button
class="deleteBtn bg-red-600 text-white px-4 py-2 rounded-lg text-sm">
Delete
</button>

</div>

` : ""}

</div>

</a>
`;


// LIKE

div.querySelector(".likeBtn")
.onclick = async (e)=>{

e.preventDefault();
e.stopPropagation();

await db.collection("posts")
.doc(doc.id)
.update({

likes:
firebase.firestore.FieldValue.increment(1)

});

};

// ADMIN

if(isAdmin){

// EDIT

div.querySelector(".editBtn")
.onclick = (e)=>{

e.preventDefault();
e.stopPropagation();

editId = doc.id;

title.value = p.title || "";

content.value = p.content || "";

uploadedImage = p.image || "";

preview.src = p.image || "";

preview.classList.remove("hidden");

adminModal.classList.remove("hidden");

};

// DELETE

div.querySelector(".deleteBtn")
.onclick = async (e)=>{

e.preventDefault();
e.stopPropagation();

if(confirm("Delete Post?")){

await db.collection("posts")
.doc(doc.id)
.delete();

}

};

}

posts.appendChild(div);

});

});

}

// SAVE POST

async function savePost(){

const t = title.value.trim();
const c = content.value.trim();

if(!t || !c){

alert("Fill all fields");

return;

}

try{

if(editId){

await db.collection("posts")
.doc(editId)
.update({

title:t,
content:c,
image:uploadedImage

});

alert("Post Updated ✅");

}else{

await db.collection("posts")
.add({

title:t,
content:c,
image:uploadedImage,
likes:0,
views:0,
createdAt:new Date()

});

alert("Post Uploaded ✅");

}

closeAdmin();

fetchPosts();

}catch(err){

alert(err.message);

console.log(err);

}

}

// SEARCH

searchInput.oninput = (e)=>{

const value =
e.target.value.toLowerCase();

document.querySelectorAll("#posts > div")
.forEach(card=>{

const text =
card.innerText.toLowerCase();

card.style.display =
text.includes(value)
? "block"
: "none";

});

};

// INIT

fetchPosts();

</script>

</body>
</html>
