<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FactZone | Amazing Facts & Knowledge</title>

<meta name="description" content="Explore amazing facts and daily knowledge on FactZone.">
<meta name="keywords" content="facts, amazing facts, knowledge, online earning ideas, factzone">

<meta property="og:title" content="FactZone">
<meta property="og:description" content="Daily amazing facts & knowledge">
<meta property="og:image" content="https://factzone.online/logo.svg">

<link rel="icon" href="logo.svg">

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
.container{max-width:1200px;margin:auto;}
</style>
</head>

<body class="bg-gray-100">

<!-- HEADER -->
<header class="bg-black text-white p-4 flex items-center justify-between">

<div class="flex items-center gap-3 cursor-pointer" onclick="openLogin()">
<img src="logo.svg" class="w-10 h-10 bg-white p-1 rounded-full">
<h1 class="text-xl font-bold">FactZone</h1>
</div>

<input id="search" placeholder="🔍 Search..."
class="px-4 py-2 rounded-full text-black w-1/3">

</header>

<!-- POSTS -->
<div class="container">
<main id="posts" class="p-6 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6"></main>
</div>

<button id="adminBtn" onclick="openAdmin()" 
class="hidden fixed bottom-5 right-5 bg-black text-white px-4 py-3 rounded-full shadow-lg">+</button>

<!-- LOGIN -->
<div id="loginModal" class="hidden fixed inset-0 bg-black/70 flex justify-center items-center">
<div class="bg-white p-6 rounded">
<input id="adminPass" type="password" placeholder="Password" class="border p-2 mb-2 w-full">
<button onclick="checkLogin()" class="bg-black text-white w-full py-2">Login</button>
</div>
</div>

<!-- ADMIN -->
<div id="adminModal" class="hidden fixed inset-0 bg-black/70 flex justify-center items-center">
<div class="bg-white p-6 rounded w-[90%] max-w-md">
<input id="title" placeholder="Title" class="border p-2 mb-2 w-full">
<textarea id="content" placeholder="Content" class="border p-2 mb-2 w-full"></textarea>
<input type="file" id="fileInput" accept="image/*">
<button id="saveBtn" onclick="savePost()" class="bg-black text-white w-full py-2 mt-2">Save</button>
</div>
</div>

<script>
const firebaseConfig={
apiKey:"AIzaSyCUyQyMzEee1eO1RqmhTmIp_OjLT7guUAc",
authDomain:"factzone-a9ace.firebaseapp.com",
projectId:"factzone-a9ace"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

// ⬇️ यहाँ अपनी ImgBB API Key डालें
const IMGBB_API_KEY = "f1bdb9735d4cd84dd8a265b7d092d2eb"; 

let isAdmin=false,editId=null,existingImgUrl="",selectedFile=null;

// LOGIN
function openLogin(){loginModal.classList.remove("hidden");}
function checkLogin(){
if(adminPass.value==="Avnish@@"){
isAdmin=true;
adminBtn.classList.remove("hidden");
loginModal.classList.add("hidden");
fetchPosts();
}else alert("Wrong Password");
}

// IMAGE SELECT
fileInput.onchange=e=>{
if(e.target.files.length === 0) { selectedFile = null; return; }
selectedFile = e.target.files[0]; // मूल फाइल ऑब्जेक्ट सुरक्षित किया
};

// FETCH POSTS
async function fetchPosts(){
posts.innerHTML="Loading...";

let snap=await db.collection("posts").get();
posts.innerHTML="";

snap.forEach(doc=>{
let p=doc.data();

let div=document.createElement("div");
div.className="bg-white rounded-xl shadow hover:shadow-lg cursor-pointer overflow-hidden";

div.onclick=()=>location.href=`detail.html?id=${doc.id}`;

div.innerHTML=`
${p.image?`<img src="${p.image}" class="w-full h-48 object-cover">`:""}

<div class="p-3">
<h2 class="font-bold text-lg">${p.title||""}</h2>
<p class="text-gray-600 text-sm">${(p.content||"").substring(0,80)}...</p>

<div class="flex justify-between mt-2">
<button class="likeBtn text-red-500">❤️ <span>${p.likes||0}</span></button>
<span>👁 ${p.views||0}</span>
</div>

${isAdmin?`
<div class="mt-2 flex gap-2">
<button class="editBtn text-blue-500 font-bold">Edit</button>
<button class="deleteBtn text-red-500 font-bold">Delete</button>
</div>`:""}

</div>
`;

// LIKE
div.querySelector(".likeBtn").onclick=async (e)=>{
e.stopPropagation();
let targetSpan = e.currentTarget.querySelector("span");
await db.collection("posts").doc(doc.id).update({
likes:firebase.firestore.FieldValue.increment(1)
});
targetSpan.innerText = parseInt(targetSpan.innerText) + 1;
};

// ADMIN ACTIONS
if(isAdmin){
div.querySelector(".editBtn").onclick=(e)=>{
e.stopPropagation();
editId=doc.id;
title.value=p.title || "";
content.value=p.content || "";
existingImgUrl=p.image || ""; // पुरानी इमेज लिंक सहेजें
openAdmin();
};

div.querySelector(".deleteBtn").onclick=async (e)=>{
e.stopPropagation();
if(confirm("Delete?")){
await db.collection("posts").doc(doc.id).delete();
fetchPosts();
}
};
}

posts.appendChild(div);
});
}

fetchPosts();

// ADMIN WINDOW
function openAdmin(){adminModal.classList.remove("hidden");}

// SECURE ASYNC SAVE POST (With ImgBB Pipeline)
async function savePost(){
if(!title.value.trim()||!content.value.trim())return alert("Fill fields");

let postData = {
title: title.value.trim(),
content: content.value.trim()
};

saveBtn.innerText = "Uploading Image...";
saveBtn.disabled = true;

try {
if(selectedFile) {
let formData = new FormData();
formData.append("image", selectedFile);

// ImgBB क्लाउड पर भेजना
let res = await fetch(`imgbb.com{IMGBB_API_KEY}`, {
method: "POST",
body: formData
});
let resData = await res.json();

if(resData.success) {
postData.image = resData.data.url; // डायरेक्ट लाइव यूआरएल मिला
} else {
throw new Error("ImgBB Upload Process Dropped");
}
} else if(editId && existingImgUrl) {
postData.image = existingImgUrl; // कोई नई फोटो नहीं चुनी तो पुरानी रहने दें
}

if(editId){
await db.collection("posts").doc(editId).set(postData,{merge:true});
}else{
postData.likes = 0;
postData.views = 0;
await db.collection("posts").add(postData);
}

// फॉर्म रीसेट क्लीनअप
editId=null; title.value=""; content.value=""; fileInput.value=""; selectedFile=null; existingImgUrl="";
saveBtn.innerText = "Save"; saveBtn.disabled = false;
adminModal.classList.add("hidden");
await fetchPosts();
} catch(error) {
alert("Error saving data: " + error.message);
saveBtn.innerText = "Save"; saveBtn.disabled = false;
}
}

// SEARCH
search.oninput=e=>{
let v=e.target.value.toLowerCase();
document.querySelectorAll("#posts > div").forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(v)?"block":"none";
});
};
</script>

</body>
</html>
