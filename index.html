<!DOCTYPE html>
<html lang="hi">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
FactZone | Amazing Facts & Knowledge
</title>

<meta name="description"
content="Explore amazing facts, science facts, technology facts and viral knowledge on FactZone.">

<meta name="keywords"
content="facts, amazing facts, science facts, technology facts">

<meta name="robots"
content="index, follow">

<meta property="og:title"
content="FactZone">

<meta property="og:image"
content="https://factzone.online/logo.svg">

<link rel="icon"
href="logo.svg">

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>

body{
background:#f3f4f6;
font-family:Arial,sans-serif;
}

.card{
transition:.3s;
border:2px solid #e5e7eb;
}

.card:hover{
transform:translateY(-5px);
border-color:black;
}

.line2{
display:-webkit-box;
-webkit-line-clamp:2;
-webkit-box-orient:vertical;
overflow:hidden;
}

</style>

</head>

<body>

<!-- HEADER -->

<header
class="bg-black sticky top-0 z-50 shadow-lg">

<div
class="max-w-7xl mx-auto p-4">

<div
onclick="openLogin()"
class="flex items-center gap-3 cursor-pointer mb-4">

<img
src="logo.svg"
class="w-11 h-11 rounded-full bg-white p-1">

<h1
class="text-2xl font-bold text-white">
FactZone
</h1>

</div>

<input
type="text"
id="searchInput"
placeholder="🔍 Search posts..."
class="w-full px-5 py-3 rounded-full outline-none">

</div>

</header>

<!-- POSTS -->

<main
id="posts"
class="max-w-7xl mx-auto p-5 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">

<div class="text-center col-span-full py-20">
Loading Posts...
</div>

</main>

<!-- ADMIN BUTTON -->

<button
id="addBtn"
onclick="openAdmin()"
class="hidden fixed bottom-6 right-6 w-14 h-14 rounded-full bg-black text-white text-3xl shadow-xl">
+
</button>

<!-- LOGIN MODAL -->

<div
id="loginModal"
class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">

<div
class="bg-white p-6 rounded-2xl w-[90%] max-w-sm">

<h2
class="text-2xl font-bold mb-4 text-center">
Admin Login
</h2>

<input
type="email"
id="email"
placeholder="Email"
class="w-full border p-3 rounded-xl mb-3">

<input
type="password"
id="password"
placeholder="Password"
class="w-full border p-3 rounded-xl mb-4">

<button
onclick="login()"
class="w-full bg-black text-white py-3 rounded-xl">
Login
</button>

</div>

</div>

<!-- ADMIN PANEL -->

<div
id="adminModal"
class="hidden fixed inset-0 bg-black/70 flex justify-center items-center z-50 overflow-auto">

<div
class="bg-white w-[95%] max-w-2xl rounded-2xl p-5 my-10">

<h2
class="text-2xl font-bold mb-4">
Create / Edit Post
</h2>

<input
id="title"
placeholder="Post Title"
class="w-full border p-3 rounded-xl mb-3">

<textarea
id="content"
placeholder="Post Content"
class="w-full border p-3 rounded-xl h-40 mb-3"></textarea>

<input
id="image"
placeholder="Image URL"
class="w-full border p-3 rounded-xl mb-4">

<button
onclick="savePost()"
class="w-full bg-black text-white py-3 rounded-xl font-bold">
Save Post
</button>

<button
onclick="closeAdmin()"
class="w-full bg-gray-200 py-3 rounded-xl mt-3">
Close
</button>

</div>

</div>

<script>

/* FIREBASE */

const firebaseConfig = {

apiKey:"YOUR_API_KEY",

authDomain:"YOUR_AUTH_DOMAIN",

projectId:"YOUR_PROJECT_ID"

};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();

const db = firebase.firestore();

let editId = null;

let isAdmin =
localStorage.getItem("admin") === "yes";

/* ADMIN BUTTON */

if(isAdmin){

document.getElementById("addBtn")
.classList.remove("hidden");

}

/* LOGIN */

function openLogin(){

document.getElementById("loginModal")
.classList.remove("hidden");

}

async function login(){

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

try{

await auth.signInWithEmailAndPassword(
email,
password
);

localStorage.setItem("admin","yes");

location.reload();

}catch(err){

alert("Wrong Email or Password");

}

}

/* ADMIN */

function openAdmin(){

editId = null;

document.getElementById("title").value = "";

document.getElementById("content").value = "";

document.getElementById("image").value = "";

document.getElementById("adminModal")
.classList.remove("hidden");

}

function closeAdmin(){

document.getElementById("adminModal")
.classList.add("hidden");

}

/* SAVE POST */

async function savePost(){

const title =
document.getElementById("title")
.value.trim();

const content =
document.getElementById("content")
.value.trim();

const image =
document.getElementById("image")
.value.trim();

if(!title || !content){

alert("Fill all fields");

return;

}

try{

if(editId){

await db.collection("posts")
.doc(editId)
.update({

title,
content,
image

});

alert("Post Updated ✅");

}else{

await db.collection("posts")
.add({

title,
content,
image,
createdAt:Date.now()

});

alert("Post Uploaded ✅");

}

closeAdmin();

fetchPosts();

}catch(err){

alert(err.message);

}

}

/* FETCH POSTS */

async function fetchPosts(){

const posts =
document.getElementById("posts");

posts.innerHTML = "";

const snap =
await db.collection("posts")
.orderBy("createdAt","desc")
.get();

if(snap.empty){

posts.innerHTML = `
<h2 class="text-center text-2xl text-gray-500 col-span-full">
No Posts Found
</h2>
`;

return;

}

snap.forEach((doc)=>{

const p = doc.data();

const div =
document.createElement("a");

div.href =
`detail.html?id=${doc.id}`;

div.className =
"card bg-white rounded-2xl overflow-hidden shadow-lg";

div.innerHTML = `

<img
src="${p.image || 'https://via.placeholder.com/500'}"
class="w-full h-60 object-cover bg-gray-200">

<div class="p-4">

<h2 class="font-bold text-xl mb-2 line2">
${p.title}
</h2>

<p class="text-gray-600 text-sm mb-4 line2">
${p.content}
</p>

${isAdmin ? `

<div class="flex gap-2">

<button
onclick="editPost(event,'${doc.id}','${p.title}','${p.content}','${p.image}')"
class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm">
Edit
</button>

<button
onclick="deletePost(event,'${doc.id}')"
class="bg-red-600 text-white px-4 py-2 rounded-lg text-sm">
Delete
</button>

</div>

` : ""}

</div>

`;

posts.appendChild(div);

});

}

/* EDIT */

function editPost(e,id,title,content,image){

e.preventDefault();

editId = id;

document.getElementById("title").value =
title;

document.getElementById("content").value =
content;

document.getElementById("image").value =
image;

document.getElementById("adminModal")
.classList.remove("hidden");

}

/* DELETE */

async function deletePost(e,id){

e.preventDefault();

if(confirm("Delete Post?")){

await db.collection("posts")
.doc(id)
.delete();

fetchPosts();

}

}

/* SEARCH */

document.getElementById("searchInput")
.addEventListener("input",(e)=>{

const value =
e.target.value.toLowerCase();

document.querySelectorAll("#posts a")
.forEach(card=>{

const text =
card.innerText.toLowerCase();

card.style.display =
text.includes(value)
? "block"
: "none";

});

});

/* INIT */

fetchPosts();

</script>

</body>
</html>
