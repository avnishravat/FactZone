<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <!-- SEO -->
  <title>FactZone Post</title>

  <meta name="description"
  content="Amazing facts and knowledge from FactZone">

  <meta name="keywords"
  content="facts, amazing facts, knowledge, tech, education">

  <meta name="author" content="FactZone">

  <!-- Open Graph SEO -->
  <meta property="og:type" content="article">
  <meta property="og:title" content="FactZone Post">
  <meta property="og:description"
  content="Amazing facts and knowledge from FactZone">
  <meta property="og:image" content="logo.svg">

  <!-- Favicon -->
  <link rel="icon" href="logo.svg">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <style>
    body{
      background:#0f0f0f;
      color:white;
      font-family:Arial;
    }

    .glass{
      background:rgba(255,255,255,0.05);
      backdrop-filter:blur(10px);
      border:1px solid rgba(255,255,255,0.08);
    }

    .fade{
      animation:fade .5s ease;
    }

    @keyframes fade{
      from{
        opacity:0;
        transform:translateY(20px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }
  </style>
</head>

<body>

<!-- HEADER -->
<header class="sticky top-0 z-50 bg-black border-b border-gray-800 p-4">

  <div class="flex items-center gap-3">

    <img src="logo.svg"
    class="w-11 h-11 rounded-full border border-gray-700">

    <div>
      <h1 class="text-2xl font-bold text-white">
        FactZone
      </h1>

      <p class="text-gray-400 text-sm">
        Amazing Facts & Knowledge
      </p>
    </div>

  </div>

</header>

<!-- MAIN -->
<div class="max-w-4xl mx-auto p-4">

  <!-- Back -->
  <button onclick="history.back()"
  class="mb-4 bg-gray-800 hover:bg-gray-700 px-4 py-2 rounded-lg">
    ← Back
  </button>

  <!-- Loading -->
  <div id="loading"
  class="text-center text-gray-400 py-10">
    Loading post...
  </div>

  <!-- POST -->
  <div id="postBox"
  class="hidden glass rounded-2xl overflow-hidden fade">

    <!-- IMAGE -->
    <img id="postImage"
    class="w-full max-h-[500px] object-cover">

    <!-- CONTENT -->
    <div class="p-6">

      <!-- TITLE -->
      <h1 id="postTitle"
      class="text-3xl font-bold mb-4 leading-tight">
      </h1>

      <!-- META -->
      <div class="flex gap-4 text-sm text-gray-400 mb-6">

        <span id="postDate"></span>

        <span>
          ❤️ <span id="likesCount">0</span>
        </span>

      </div>

      <!-- CONTENT -->
      <div id="postContent"
      class="text-gray-200 leading-8 text-lg whitespace-pre-line">
      </div>

      <!-- LIKE -->
      <button id="likeBtn"
      class="mt-8 bg-red-600 hover:bg-red-700 px-6 py-3 rounded-xl font-bold transition">
        ❤️ Like Post
      </button>

    </div>

  </div>

</div>

<script>
/* FIREBASE */

const firebaseConfig = {
  apiKey: "AIzaSyCUyQyMzEee1eO1RqmhTmIp_OjLT7guUAc",
  authDomain: "factzone-a9ace.firebaseapp.com",
  projectId: "factzone-a9ace"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

/* GET ID */

const params = new URLSearchParams(location.search);

const id = params.get("id");

/* ELEMENTS */

const loading = document.getElementById("loading");

const postBox = document.getElementById("postBox");

const postTitle = document.getElementById("postTitle");

const postContent = document.getElementById("postContent");

const postImage = document.getElementById("postImage");

const likesCount = document.getElementById("likesCount");

const postDate = document.getElementById("postDate");

/* LOAD POST */

async function loadPost(){

  if(!id){
    loading.innerHTML = "Post not found";
    return;
  }

  try{

    const doc = await db.collection("posts")
    .doc(id)
    .get();

    if(!doc.exists){
      loading.innerHTML = "Post not found";
      return;
    }

    const post = doc.data();

    /* SHOW DATA */

    postTitle.innerText = post.title || "";

    postContent.innerText = post.content || "";

    likesCount.innerText = post.likes || 0;

    /* DATE */

    if(post.createdAt){

      const date = post.createdAt.toDate();

      postDate.innerText =
      date.toLocaleDateString();

    }

    /* IMAGE */

    if(post.image){

      postImage.src = post.image;

      postImage.style.display = "block";

    }else{

      postImage.style.display = "none";

    }

    /* SEO DYNAMIC */

    document.title =
    post.title + " | FactZone";

    document.querySelector(
    'meta[name="description"]'
    ).setAttribute(
      "content",
      post.content.substring(0,150)
    );

    document.querySelector(
    'meta[property="og:title"]'
    ).setAttribute(
      "content",
      post.title
    );

    document.querySelector(
    'meta[property="og:description"]'
    ).setAttribute(
      "content",
      post.content.substring(0,150)
    );

    if(post.image){

      document.querySelector(
      'meta[property="og:image"]'
      ).setAttribute(
        "content",
        post.image
      );

    }

    /* SHOW */

    loading.style.display = "none";

    postBox.classList.remove("hidden");

    /* LIKE */

    document.getElementById("likeBtn")
    .onclick = async ()=>{

      await db.collection("posts")
      .doc(id)
      .update({
        likes:
        firebase.firestore.FieldValue.increment(1)
      });

      likesCount.innerText =
      parseInt(likesCount.innerText)+1;

    };

  }catch(err){

    loading.innerHTML =
    "Failed to load post";

    console.log(err);

  }

}

loadPost();
</script>

</body>
</html>
