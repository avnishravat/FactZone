<!-- FIREBASE -->

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
query,
orderBy
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyCUyQyMzEee1eO1RqmhTmIp_OjLT7guUAc",

authDomain: "factzone-a9ace.firebaseapp.com",

databaseURL: "https://factzone-a9ace-default-rtdb.firebaseio.com",

projectId: "factzone-a9ace",

storageBucket: "factzone-a9ace.firebasestorage.app",

messagingSenderId: "425838320650",

appId: "1:425838320650:web:beab18baddf818cb73d3f3",

measurementId: "G-311JQXBXR9"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const postsContainer =
document.getElementById("posts");

async function loadPosts(){

postsContainer.innerHTML =
"<h2 class='text-center text-2xl col-span-full'>Loading...</h2>";

const q =
query(
collection(db,"posts"),
orderBy("createdAt","desc")
);

const querySnapshot =
await getDocs(q);

postsContainer.innerHTML = "";

if(querySnapshot.empty){

postsContainer.innerHTML = `
<h2 class="text-center text-2xl col-span-full">
No Posts Found
</h2>
`;

return;

}

querySnapshot.forEach((doc)=>{

const post = doc.data();

postsContainer.innerHTML += `

<a href="detail.html?id=${doc.id}"
class="card bg-white rounded-2xl overflow-hidden shadow-lg">

<img
src="${post.image || 'https://via.placeholder.com/500'}"
alt="${post.title || ''}"
class="w-full h-60 object-cover">

<div class="p-4">

<h2 class="font-bold text-xl mb-2 line2">
${post.title || ''}
</h2>

<p class="text-gray-600 text-sm line2">
${post.desc || ''}
</p>

</div>

</a>

`;

});

}

loadPosts();

document.getElementById("searchInput")
.addEventListener("input",(e)=>{

const value =
e.target.value.toLowerCase();

document.querySelectorAll("#posts a")
.forEach(card=>{

card.style.display =
card.innerText.toLowerCase()
.includes(value)
? "block"
: "none";

});

});

</script>
