<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FactZone | Amazing Facts & Knowledge</title>
    
    <meta name="description" content="Explore amazing facts and daily knowledge on FactZone.">
    <meta name="keywords" content="facts, amazing facts, knowledge, factzone">
    <meta property="og:title" content="FactZone">
    <meta property="og:description" content="Daily amazing facts & knowledge">
    <meta property="og:image" content="factzone.online">
    
    <link rel="icon" href="logo.svg">
    <script src="tailwindcss.com"></script>
    
    <!-- FIREBASE LIBRARIES (AUTH ADDED) -->
    <script src="gstatic.com"></script>
    <script src="gstatic.com"></script>
    <script src="gstatic.com"></script>
    <script src="gstatic.com"></script>

    <style>
        .container { max-width: 1200px; margin: auto; }
    </style>
</head>
<body class="bg-gray-100">

    <!-- HEADER -->
    <header class="bg-black text-white p-4 flex items-center justify-between">
        <div class="flex items-center gap-3 cursor-pointer" onclick="openLoginModal()">
            <img src="logo.svg" class="w-10 h-10 bg-white p-1 rounded-full" alt="Logo">
            <h1 class="text-xl font-bold">FactZone</h1>
        </div>
        <div class="flex items-center gap-4 w-1/3 justify-end">
            <input id="search" placeholder="🔍 Search..." class="px-4 py-2 rounded-full text-black w-full">
            <button id="logoutBtn" onclick="logout()" class="hidden bg-red-600 text-white px-3 py-1 rounded text-sm font-bold">Logout</button>
        </div>
    </header>

    <!-- MAIN POSTS CONTAINER -->
    <div class="container">
        <main id="posts" class="p-6 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6"></main>
    </div>

    <!-- FLOATING ADMIN BUTTON -->
    <button id="adminBtn" onclick="openAdmin()" class="hidden fixed bottom-5 right-5 bg-black text-white px-5 py-4 rounded-full shadow-lg text-xl font-bold">+</button>

    <!-- LOGIN MODAL -->
    <div id="loginModal" class="hidden fixed inset-0 bg-black/70 flex justify-center items-center p-4 z-50">
        <div class="bg-white p-6 rounded shadow-lg max-w-sm w-full">
            <h2 class="text-lg font-bold mb-3">Admin Secure Login</h2>
            <input id="adminEmail" type="email" placeholder="Admin Email" class="border p-2 mb-3 w-full rounded">
            <input id="adminPass" type="password" placeholder="Password" class="border p-2 mb-3 w-full rounded">
            <div class="flex gap-2">
                <button onclick="login()" class="bg-black text-white w-full py-2 rounded font-bold">Login</button>
                <button onclick="loginModal.classList.add('hidden')" class="bg-gray-300 w-full py-2 rounded">Cancel</button>
            </div>
        </div>
    </div>

    <!-- ADMIN CRUD MODAL -->
    <div id="adminModal" class="hidden fixed inset-0 bg-black/70 flex justify-center items-center p-4 z-50">
        <div class="bg-white p-6 rounded w-[90%] max-w-md shadow-lg">
            <h2 id="modalTitle" class="text-lg font-bold mb-3">Create New Post</h2>
            <input id="title" placeholder="Title" class="border p-2 mb-2 w-full rounded">
            <textarea id="content" placeholder="Content" rows="5" class="border p-2 mb-2 w-full rounded"></textarea>
            <input type="file" id="fileInput" accept="image/*" class="mb-3 block w-full text-sm text-gray-500">
            <div class="flex gap-2 mt-4">
                <button onclick="savePost()" class="bg-black text-white w-full py-2 rounded font-bold">Save Post</button>
                <button onclick="closeAdmin()" class="bg-gray-300 w-full py-2 rounded">Close</button>
            </div>
        </div>
    </div>

    <script>
        // FIREBASE CONFIGURATION
        const firebaseConfig = {
            apiKey: "AIzaSyCUyQyMzEee1eO1RqmhTmIp_OjLT7guUAc",
            authDomain: "firebaseapp.com",
            projectId: "factzone-a9ace",
            storageBucket: "appspot.com"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();
        const auth = firebase.auth();

        let userLoggedIn = false, editId = null, existingImgUrl = "", selectedFile = null;

        // AUTH STATE OBSERVER (चेक करता है कि आप लॉगिंड हैं या नहीं)
        auth.onAuthStateChanged(user => {
            if (user) {
                userLoggedIn = true;
                adminBtn.classList.remove("hidden");
                logoutBtn.classList.remove("hidden");
            } else {
                userLoggedIn = false;
                adminBtn.classList.add("hidden");
                logoutBtn.classList.add("hidden");
            }
            fetchPosts(); // लॉगिन स्टेट बदलने पर पोस्ट्स दोबारा लोड करें ताकि सही बटन दिखें
        });

        // LOGIN SYSTEM
        function openLoginModal() { 
            if(!userLoggedIn) loginModal.classList.remove("hidden"); 
        }
        
        async function login() {
            try {
                await auth.signInWithEmailAndPassword(adminEmail.value.trim(), adminPass.value);
                loginModal.classList.add("hidden");
                adminEmail.value = "";
                adminPass.value = "";
            } catch(error) {
                alert("Login Failed: " + error.message);
            }
        }

        async function logout() {
            if(confirm("Logout?")) {
                await auth.signOut();
                location.reload();
            }
        }

        // CAPTURE SELECTED FILE
        fileInput.onchange = e => {
            if(e.target.files.length === 0) {
                selectedFile = null;
                return;
            }
            selectedFile = e.target.files[0];
        };

        // FETCH ALL POSTS
        async function fetchPosts() {
            posts.innerHTML = "<div class='col-span-full text-center py-10 font-medium text-gray-500'>Loading Posts...</div>";
            
            try {
                let snap = await db.collection("posts").get();
                posts.innerHTML = "";

                if(snap.empty) {
                    posts.innerHTML = "<div class='col-span-full text-center py-10 text-gray-500'>No posts found.</div>";
                    return;
                }

                snap.forEach(doc => {
                    let p = doc.data();
                    let div = document.createElement("div");
                    div.className = "bg-white rounded-xl shadow hover:shadow-lg cursor-pointer overflow-hidden flex flex-col justify-between";
                    
                    div.onclick = () => location.href = `detail.html?id=${doc.id}`;
                    
                    div.innerHTML = `
                        <div>
                            ${p.image ? `<img src="${p.image}" class="w-full h-48 object-cover">` : ""}
                            <div class="p-4">
                                <h2 class="font-bold text-lg text-gray-900 mb-1">${p.title || ""}</h2>
                                <p class="text-gray-600 text-sm">${(p.content || "").substring(0, 80)}...</p>
                            </div>
                        </div>
                        <div class="p-4 pt-0 border-t border-gray-50 mt-auto">
                            <div class="flex justify-between items-center text-sm text-gray-500 mt-2">
                                <button class="likeBtn text-red-500 font-semibold flex items-center gap-1 bg-red-50 px-2 py-1 rounded">❤️ <span>${p.likes || 0}</span></button>
                                <span>👁 ${p.views || 0} views</span>
                            </div>
                            ${userLoggedIn ? `
                            <div class="flex gap-4 border-t pt-2 mt-3 text-sm">
                                <button class="editBtn text-blue-600 font-bold hover:underline">Edit</button>
                                <button class="deleteBtn text-red-600 font-bold hover:underline">Delete</button>
                            </div>` : ""}
                        </div>
                    `;

                    // LIKE BUTTON CLICK
                    div.querySelector(".likeBtn").onclick = async (e) => {
                        e.stopPropagation();
                        let targetSpan = e.currentTarget.querySelector("span");
                        try {
                            await db.collection("posts").doc(doc.id).update({
                                likes: firebase.firestore.FieldValue.increment(1)
                            });
                            targetSpan.innerText = parseInt(targetSpan.innerText) + 1;
                        } catch(err) { console.error(err); }
                    };

                    // ADMIN ACTIONS (ONLY WORKS IF LOGGED IN)
                    if(userLoggedIn) {
                        div.querySelector(".editBtn").onclick = (e) => {
                            e.stopPropagation();
                            editId = doc.id;
                            title.value = p.title || "";
                            content.value = p.content || "";
                            existingImgUrl = p.image || "";
                            modalTitle.innerText = "Edit Existing Post";
                            openAdmin();
                        };

                        div.querySelector(".deleteBtn").onclick = async (e) => {
                            e.stopPropagation();
                            if(confirm("Are you sure you want to delete this post?")) {
                                try {
                                    await db.collection("posts").doc(doc.id).delete();
                                    fetchPosts();
                                } catch(err) { alert("Error deleting: " + err.message); }
                            }
                        };
                    }
                    posts.appendChild(div);
                });
            } catch(error) {
                posts.innerHTML = `<div class='col-span-full text-red-500 text-center py-10'>Error: ${error.message}</div>`;
            }
        }

        // ADMIN MODAL CONTROLS
        function openAdmin() { adminModal.classList.remove("hidden"); }
        function closeAdmin() {
            adminModal.classList.add("hidden");
            editId = null;
            title.value = "";
            content.value = "";
            fileInput.value = "";
            selectedFile = null;
            existingImgUrl = "";
            modalTitle.innerText = "Create New Post";
        }

        // SAVE POST WITH SECURE UPLOAD
        async function savePost() {
            if(!auth.currentUser) return alert("Unauthorized access. Please login first.");
            if(!title.value.trim() || !content.value.trim()) return alert("Please fill fields.");

            let postData = {
                title: title.value.trim(),
                content: content.value.trim()
            };

            try {
                if(selectedFile) {
                    let storageRef = storage.ref('images/' + Date.now() + '_' + selectedFile.name);
                    let uploadTask = await storageRef.put(selectedFile);
                    let downloadURL = await uploadTask.ref.getDownloadURL();
                    postData.image = downloadURL;
                } else if(editId && existingImgUrl) {
                    postData.image = existingImgUrl;
                }

                if(editId) {
                    await db.collection("posts").doc(editId).set(postData, { merge: true });
                } else {
                    postData.likes = 0;
                    postData.views = 0;
                    await db.collection("posts").add(postData);
                }
                
                closeAdmin();
                await fetchPosts();
            } catch(error) {
                alert("Error saving post: " + error.message);
            }
        }

        // LIVE SEARCH FILTER
        search.oninput = e => {
            let v = e.target.value.toLowerCase();
            document.querySelectorAll("#posts > div").forEach(c => {
                c.style.display = c.innerText.toLowerCase().includes(v) ? "flex" : "none";
            });
        };
    </script>
</body>
</html>
