<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FactZone Post</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>

<body class="bg-white p-6">

<button onclick="history.back()" class="mb-4 bg-black text-white px-3 py-1 rounded">
⬅ Back
</button>

<img id="img" class="w-full h-72 object-cover mb-4 rounded">

<h1 id="title" class="text-2xl font-bold mb-2"></h1>
<p id="content" class="text-gray-700"></p>

<div class="flex justify-between mt-3">
<span id="views"></span>
<span id="likes"></span>
</div>

<button id="likeBtn" class="bg-red-500 text-white px-4 py-2 mt-4 rounded">
❤️ Like
</button>

<script>
const firebaseConfig={
apiKey:"AIzaSyCUyQyMzEee1eO1RqmhTmIp_OjLT7guUAc",
authDomain:"factzone-a9ace.firebaseapp.com",
projectId:"factzone-a9ace"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

const id=new URLSearchParams(location.search).get("id");

async function load(){
let ref=db.collection("posts").doc(id);

if(!localStorage.getItem("view_"+id)){
await ref.update({views:firebase.firestore.FieldValue.increment(1)});
localStorage.setItem("view_"+id,true);
}

let doc=await ref.get();
let p=doc.data();

title.innerText=p.title;
content.innerText=p.content;
views.innerText="👁 "+(p.views||0);
likes.innerText="❤️ "+(p.likes||0);

if(p.image) img.src=p.image;

likeBtn.onclick=async ()=>{
await ref.update({likes:firebase.firestore.FieldValue.increment(1)});
load();
};
}

load();
</script>

</body>
</html>
