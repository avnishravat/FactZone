<!DOCTYPE html>
<html lang="hi">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>FactZone Post</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>

body{
background:#f3f4f6;
font-family:Arial,sans-serif;
}

</style>

</head>

<body>

<header class="bg-black p-4 text-white text-center text-2xl font-bold">

<a href="index.html">
FactZone
</a>

</header>

<main
id="post"
class="max-w-4xl mx-auto p-5">

<div class="bg-white rounded-2xl shadow-lg overflow-hidden">

<img
id="postImage"
class="w-full h-[400px] object-cover">

<div class="p-6">

<h1
id="postTitle"
class="text-3xl font-bold mb-4">
</h1>

<p
id="postContent"
class="text-lg leading-8 text-gray-700">
</p>

</div>

</div>

</main>

<script>

const firebaseConfig = {

apiKey:"AIzaSyCUyQyMzEee1eO1RqmhTmIp_OjLT7guUAc",

authDomain:"factzone-a9ace.firebaseapp.com",

projectId:"factzone-a9ace"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

const params =
new URLSearchParams(window.location.search);

const id = params.get("id");

if(id){

db.collection("posts")
.doc(id)
.get()
.then((doc)=>{

if(doc.exists){

const p = doc.data();

document.title = p.title;

document.getElementById("postTitle")
.innerText = p.title;

document.getElementById("postContent")
.innerText = p.content;

document.getElementById("postImage")
.src =
p.image || "https://via.placeholder.com/800";

}else{

document.getElementById("post")
.innerHTML = `
<h2 class="text-center text-3xl mt-10">
Post Not Found
</h2>
`;

}

});

}

</script>

</body>
</html>
