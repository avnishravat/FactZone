<!-- detail.html -->

<!DOCTYPE html>
<html lang="hi">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
FactZone Post
</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<header
class="bg-black text-white p-4 shadow-lg">

<div
class="max-w-4xl mx-auto flex items-center gap-3">

<img
src="logo.svg"
class="w-10 h-10 rounded-full bg-white p-1">

<h1
class="text-2xl font-bold">
FactZone
</h1>

</div>

</header>

<main
class="max-w-4xl mx-auto p-5">

<div
class="bg-white rounded-2xl overflow-hidden shadow-lg border-2 border-gray-200">

<img
id="postImage"
class="w-full h-[400px] object-cover">

<div class="p-6">

<h1
id="postTitle"
class="text-3xl font-bold mb-4">
</h1>

<p
id="postDesc"
class="text-gray-700 leading-8 text-lg">
</p>

</div>

</div>

</main>

<script>

const params =
new URLSearchParams(window.location.search);

document.getElementById("postTitle")
.innerText =
params.get("title");

document.getElementById("postImage")
.src =
params.get("image");

document.getElementById("postDesc")
.innerText =
params.get("desc");

</script>

</body>
</html>
