<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- BASE SEO — overwritten by JS once post data loads -->
  <title>FactZone - Amazing Facts & Educational Knowledge</title>
  <meta name="description" content="Read verified facts, science updates, historical mysteries, and knowledge articles on FactZone Official.">
  <meta name="robots" content="index,follow,max-image-preview:large">
  <link rel="canonical" id="canonical" href="https://factzone.online/detail.html">

  <!-- Open Graph -->
  <meta property="og:type" content="article">
  <meta property="og:title" content="FactZone - Amazing Facts & Educational Knowledge">
  <meta property="og:description" content="Read verified facts, science updates, historical mysteries, and knowledge articles.">
  <meta property="og:image" content="https://factzone.online/logo.svg">
  <meta property="og:url" content="https://factzone.online/detail.html">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="FactZone - Amazing Facts & Educational Knowledge">
  <meta name="twitter:description" content="Read verified facts, science updates, historical mysteries, and knowledge articles.">
  <meta name="twitter:image" content="https://factzone.online/logo.svg">

  <link rel="icon" href="logo.svg">

  <!-- Preconnect for performance -->
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://pagead2.googlesyndication.com" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- AdSense — load eagerly so Google can verify the site -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-697419046628538" crossorigin="anonymous"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --bg: #f5f4f0;
      --surface: #ffffff;
      --ink: #1a1a18;
      --ink-muted: #5a5a55;
      --accent: #c0392b;
      --border: #e2e0d8;
      --radius: 1rem;
    }

    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      margin: 0;
      padding: 0;
      color: var(--ink);
    }

    /* ── Layout ── */
    .main-wrapper {
      max-width: 860px;
      margin: 0 auto;
      padding: 1.5rem 1.25rem 3rem;
    }

    /* ── Header / Nav ── */
    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
      padding-bottom: 1.25rem;
      border-bottom: 2px solid var(--ink);
    }
    .logo-link {
      display: flex;
      align-items: center;
      gap: .75rem;
      text-decoration: none;
      color: inherit;
    }
    .logo-link img {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #fff;
      padding: 3px;
      box-shadow: 0 2px 8px rgba(0,0,0,.12);
    }
    .logo-link span {
      font-family: 'Merriweather', serif;
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -.02em;
    }
    .back-btn {
      background: var(--ink);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      font-size: .875rem;
      padding: .55rem 1.1rem;
      border-radius: .5rem;
      transition: background .18s;
    }
    .back-btn:hover { background: #333; }

    /* ── Article card ── */
    #post {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 1.75rem 2rem;
      box-shadow: 0 2px 16px rgba(0,0,0,.07);
    }

    #post img.hero {
      width: 100%;
      border-radius: .75rem;
      max-height: 440px;
      object-fit: cover;
      margin-bottom: 1.5rem;
      display: block;
    }

    #post h1 {
      font-family: 'Merriweather', serif;
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      line-height: 1.3;
      font-weight: 700;
      margin: 0 0 1.25rem;
    }

    #post .content {
      font-size: 1.05rem;
      line-height: 1.85;
      color: #2d2d2b;
      white-space: pre-line;
    }

    .author-box {
      margin-top: 2rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--border);
      font-size: .95rem;
      color: var(--ink-muted);
    }
    .author-box strong { color: var(--ink); }
    .author-box a { color: var(--accent); text-decoration: none; font-weight: 600; }

    /* ── Skeleton loader ── */
    .skeleton {
      background: linear-gradient(90deg, #eee 25%, #f8f8f8 50%, #eee 75%);
      background-size: 400% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: .5rem;
    }
    @keyframes shimmer { to { background-position: -400% 0; } }
    .sk-img   { width: 100%; height: 340px; border-radius: .75rem; margin-bottom: 1.5rem; }
    .sk-title { height: 2rem; width: 80%; margin-bottom: .75rem; }
    .sk-line  { height: 1rem; width: 100%; margin-bottom: .6rem; }
    .sk-line.short { width: 60%; }

    /* ── Error state ── */
    .error-box {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--ink-muted);
    }
    .error-box h2 { font-family: 'Merriweather', serif; color: var(--ink); margin-bottom: .5rem; }

    /* ── Related posts ── */
    #relatedPosts {
      margin-top: 2rem;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 1.75rem 2rem;
      box-shadow: 0 2px 16px rgba(0,0,0,.07);
    }
    #relatedPosts h2 {
      font-family: 'Merriweather', serif;
      font-size: 1.3rem;
      font-weight: 700;
      margin: 0 0 1.25rem;
      padding-bottom: .75rem;
      border-bottom: 2px solid var(--ink);
    }
    #relatedContainer {
      display: grid;
      gap: .85rem;
    }
    .related-card {
      display: flex;
      align-items: center;
      gap: .9rem;
      padding: .85rem;
      border: 1px solid var(--border);
      border-radius: .75rem;
      background: var(--bg);
      text-decoration: none;
      color: inherit;
      transition: box-shadow .18s, transform .18s;
    }
    .related-card:hover {
      box-shadow: 0 4px 18px rgba(0,0,0,.1);
      transform: translateY(-2px);
    }
    .related-card img {
      width: 68px;
      height: 68px;
      object-fit: cover;
      border-radius: .5rem;
      flex-shrink: 0;
    }
    .related-card h3 {
      font-size: .9rem;
      font-weight: 700;
      margin: 0;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    @media (max-width: 600px) {
      #post { padding: 1.25rem 1rem; }
      #relatedPosts { padding: 1.25rem 1rem; }
    }
  </style>
</head>

<body>
  <div class="main-wrapper">

    <!-- Header -->
    <header class="site-header">
      <a href="index.html" class="logo-link" aria-label="FactZone Home">
        <img src="logo.svg" alt="FactZone Logo" width="44" height="44">
        <span>FactZone</span>
      </a>
      <a href="index.html" class="back-btn" aria-label="Back to home">← Back</a>
    </header>

    <!-- Article -->
    <article id="post">
      <!-- Skeleton shown while content loads -->
      <div id="skeleton">
        <div class="skeleton sk-img"></div>
        <div class="skeleton sk-title"></div>
        <div class="skeleton sk-line"></div>
        <div class="skeleton sk-line"></div>
        <div class="skeleton sk-line short"></div>
      </div>
    </article>

    <!-- Related posts -->
    <section id="relatedPosts" aria-label="Related Facts">
      <h2>Related Facts</h2>
      <div id="relatedContainer"></div>
    </section>

  </div>

  <!-- ════════════════════════════════════════════
       MAIN SCRIPT  –  Firebase loads IMMEDIATELY
       (no lazy-defer, no scroll/touch gating)
  ════════════════════════════════════════════ -->
  <script type="module">
    import { initializeApp }            from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, query, limit, getDocs }
                                        from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    /* ── Firebase config ── */
    const firebaseConfig = {
      apiKey:            "AIzaSyCUyQyMzEee1eO1RqmhTmIp_OjLT7guUAc",
      authDomain:        "factzone-a9ace.firebaseapp.com",
      databaseURL:       "https://factzone-a9ace-default-rtdb.firebaseio.com",
      projectId:         "factzone-a9ace",
      storageBucket:     "factzone-a9ace.firebasestorage.app",
      messagingSenderId: "425838320650",
      appId:             "1:425838320650:web:beab18baddf818cb73d3f3",
      measurementId:     "G-311JQXBXR9"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);

    /* ── Helpers ── */
    const $  = id => document.getElementById(id);
    const qs = sel => document.querySelector(sel);

    const params = new URLSearchParams(location.search);
    const id     = params.get("id");

    /* ── Update SEO meta tags ── */
    function updateSEO(title, description, image) {
      const url = location.href;
      document.title = `${title} | FactZone`;

      const set = (sel, attr, val) => { const el = qs(sel); if (el) el.setAttribute(attr, val); };
      set('meta[name="description"]',         "content", description);
      set('meta[property="og:title"]',        "content", title);
      set('meta[property="og:description"]',  "content", description);
      set('meta[property="og:image"]',        "content", image);
      set('meta[property="og:url"]',          "content", url);
      set('meta[name="twitter:title"]',       "content", title);
      set('meta[name="twitter:description"]', "content", description);
      set('meta[name="twitter:image"]',       "content", image);

      // Canonical
      let canonical = document.getElementById("canonical");
      if (!canonical) {
        canonical = document.createElement("link");
        canonical.rel = "canonical";
        canonical.id  = "canonical";
        document.head.appendChild(canonical);
      }
      canonical.href = url;

      // Article schema
      const existingSchema = document.getElementById("articleSchema");
      if (existingSchema) existingSchema.remove();
      const schema = {
        "@context": "https://schema.org",
        "@type": "Article",
        headline:    title,
        description: description,
        url:         url,
        image:       [image],
        author:      { "@type": "Person",       "name": "Awaneesh" },
        publisher:   {
          "@type": "Organization",
          "name":  "FactZone Official",
          logo:    { "@type": "ImageObject", url: "https://factzone.online/logo.svg" }
        }
      };
      const scriptEl = document.createElement("script");
      scriptEl.type  = "application/ld+json";
      scriptEl.id    = "articleSchema";
      scriptEl.text  = JSON.stringify(schema);
      document.head.appendChild(scriptEl);
    }

    /* ── Render article HTML ── */
    function renderPost(post) {
      const title      = post.title   || "FactZone Educational Article";
      const rawContent = post.content || "Amazing facts and verified educational details.";
      const image      = post.image   || "https://factzone.online/logo.svg";
      const description = rawContent.replace(/\n/g, " ").substring(0, 160);

      updateSEO(title, description, image);

      $("post").innerHTML = `
        <img class="hero" src="${image}" alt="${title}"
             loading="eager" width="1200" height="675">
        <h1>${title}</h1>
        <div class="content">${rawContent}</div>
        <div class="author-box">
          Written by <a href="author.html">Awaneesh</a>
        </div>
      `;
    }

    /* ── Render related posts ── */
    function renderRelated(posts) {
      const container = $("relatedContainer");
      if (!posts.length) {
        $("relatedPosts").style.display = "none";
        return;
      }
      container.innerHTML = posts.map(([pid, p]) => `
        <a href="detail.html?id=${pid}" class="related-card"
           aria-label="Read: ${p.title || ''}">
          <img src="${p.image || 'https://factzone.online/logo.svg'}"
               loading="lazy" width="68" height="68" alt="">
          <h3>${p.title || ''}</h3>
        </a>
      `).join("");
    }

    /* ── Safe localStorage wrapper ── */
    function lsGet(key) {
      try { return localStorage.getItem(key); } catch { return null; }
    }
    function lsSet(key, val) {
      try { localStorage.setItem(key, val); } catch { /* quota */ }
    }

    /* ── Load post ── */
    async function loadPost() {
      if (!id) {
        $("post").innerHTML = `<div class="error-box"><h2>No article ID found</h2><p>Please go back and select an article.</p></div>`;
        return;
      }

      // Try cache first for instant paint
      const cacheKey = "factzone_" + id;
      const cached   = lsGet(cacheKey);
      if (cached) {
        try { renderPost(JSON.parse(cached)); } catch { /* bad cache */ }
      }

      // Always fetch fresh from Firebase
      try {
        const snap = await getDoc(doc(db, "posts", id));
        if (snap.exists()) {
          const post = snap.data();
          lsSet(cacheKey, JSON.stringify(post));
          renderPost(post);                     // re-render with fresh data
        } else if (!cached) {
          $("post").innerHTML = `<div class="error-box"><h2>Post Not Found</h2><p>This article may have been removed.</p></div>`;
        }
      } catch (err) {
        console.error("Firebase loadPost error:", err);
        if (!cached) {
          $("post").innerHTML = `<div class="error-box"><h2>Failed to load</h2><p>Please check your connection and refresh.</p></div>`;
        }
      }
    }

    /* ── Load related posts ── */
    async function loadRelatedPosts() {
      // Show cached related posts instantly
      const cachedRelated = lsGet("factzone_related_v2");
      if (cachedRelated) {
        try { renderRelated(JSON.parse(cachedRelated)); } catch { /* bad */ }
      }

      try {
        const q    = query(collection(db, "posts"), limit(6));
        const snap = await getDocs(q);
        const posts = [];
        snap.forEach(docSnap => {
          if (docSnap.id !== id && posts.length < 4) {
            posts.push([docSnap.id, docSnap.data()]);
          }
        });
        lsSet("factzone_related_v2", JSON.stringify(posts));
        renderRelated(posts);
      } catch (err) {
        console.error("Firebase related error:", err);
      }
    }

    /* ── Run both immediately ── */
    loadPost();
    loadRelatedPosts();
  </script>
</body>
</html>
