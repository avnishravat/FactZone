<!DOCTYPE html>
<html lang="hi">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>FactZone Post</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>

body{
background:#f3f4f6;
font-family:Arial,sans-serif;
}

</style>

</head>

<body>

<header class="bg-black text-white p-4">

<a href="index.html"
class="text-2xl font-bold">
FactZone
</a>

</header>

<main
class="max-w-4xl mx-auto bg-white p-6 rounded-2xl shadow-lg mt-8">

<img
id="image"
class="w-full rounded-2xl mb-5">

<h1
id="title"
class="text-4xl font-bold mb-5">
Loading...
</h1>

<p
id="content"
class="text-lg leading-8 text-gray-700">
</p>

</main>

<script>

const firebaseConfig = {

apiKey: "AIzaSyCUyQyMzEee1eO1RqmhTmIp_OjLT7guUAc",

authDomain: "factzone-a9ace.firebaseapp.com",

databaseURL: "https://factzone-a9ace-default-rtdb.firebaseio.com",

projectId: "factzone-a9ace",

storageBucket: "factzone-a9ace.firebasestorage.app",

messagingSenderId: "425838320650",

appId: "1:425838320650:web:beab18baddf818cb73d3f3",

measurementId: "G-311JQXBXR9"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

const params =
new URLSearchParams(window.location.search);

const id =
params.get("id");

db.collection("posts")
.doc(id)
.get()
.then((doc)=>{

const p = doc.data();

document.title =
p.title + " | FactZone";

document.getElementById("title")
.innerText = p.title;

document.getElementById("content")
.innerText = p.content;

document.getElementById("image")
.src = p.image;

});

</script>

</body>
</html>
