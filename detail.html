<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<title>FactZone Post</title>

<meta name="description" content="Read amazing facts on FactZone">

<meta property="og:title" content="FactZone Post">
<meta property="og:description" content="Amazing facts">
<meta property="og:image" content="https://factzone.online/logo.svg">

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>

<body class="bg-white p-6">

<button onclick="history.back()" class="bg-black text-white px-3 py-1 mb-4">⬅ Back</button>

<img id="img" class="w-full h-72 object-cover mb-3 rounded">

<h1 id="title" class="text-2xl font-bold mb-2"></h1>
<p id="content" class="text-gray-700"></p>

<div class="flex justify-between mt-3">
<span id="views"></span>
<span id="likes"></span>
</div>

<button id="likeBtn" class="bg-red-500 text-white px-4 py-2 mt-4 rounded">
❤️ Like
</button>

<script>
const firebaseConfig={
apiKey:"AIzaSyCUyQyMzEee1eO1RqmhTmIp_OjLT7guUAc",
authDomain:"factzone-a9ace.firebaseapp.com",
projectId:"factzone-a9ace"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

const id=new URLSearchParams(location.search).get("id");

async function load(){

if(!id){
document.body.innerHTML="<h2>No Post Found</h2>";
return;
}

let ref=db.collection("posts").doc(id);

// VIEW
if(!localStorage.getItem("view_"+id)){
try{
await ref.update({
views:firebase.firestore.FieldValue.increment(1)
});
}catch(e){}
localStorage.setItem("view_"+id,true);
}

let doc=await ref.get();

if(!doc.exists){
document.body.innerHTML="<h2>Post Not Found</h2>";
return;
}

let p=doc.data();

// SEO TITLE
document.title = p.title + " | FactZone";

// DATA
title.innerText=p.title||"";
content.innerText=p.content||"";
views.innerText="👁 "+(p.views||0);
likes.innerText="❤️ "+(p.likes||0);

// IMAGE
if(p.image){
img.src=p.image;
}else{
img.style.display="none";
}

// LIKE
likeBtn.onclick=async ()=>{
await ref.update({
likes:firebase.firestore.FieldValue.increment(1)
});
load();
};

}

load();
</script>

</body>
</html>
