<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
FactZone Post
</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background:#f3f4f6;
font-family:Arial;
}

</style>

</head>

<body>

<div
id="post"
class="max-w-4xl mx-auto bg-white p-5 mt-10 rounded-2xl shadow-lg">

Loading...

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
doc,
getDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyCUyQyMzEee1eO1RqmhTmIp_OjLT7guUAc",

authDomain: "factzone-a9ace.firebaseapp.com",

databaseURL: "https://factzone-a9ace-default-rtdb.firebaseio.com",

projectId: "factzone-a9ace",

storageBucket: "factzone-a9ace.firebasestorage.app",

messagingSenderId: "425838320650",

appId: "1:425838320650:web:beab18baddf818cb73d3f3",

measurementId: "G-311JQXBXR9"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const params =
new URLSearchParams(location.search);

const id =
params.get("id");

const postDiv =
document.getElementById("post");

async function loadPost(){

try{

const docRef =
doc(db,"posts",id);

const snap =
await getDoc(docRef);

if(snap.exists()){

const post =
snap.data();

document.title =
post.title || "FactZone";

postDiv.innerHTML = `

<img
src="${post.image || 'https://via.placeholder.com/800'}"
class="w-full rounded-xl mb-5">

<h1 class="text-4xl font-bold mb-4">
${post.title || ''}
</h1>

<p class="text-gray-700 text-lg leading-8 whitespace-pre-line">
${post.content || ''}
</p>

`;

}else{

postDiv.innerHTML = `
<h2 class="text-3xl text-center">
Post Not Found
</h2>
`;

}

}catch(error){

postDiv.innerHTML = `
<h2 class="text-3xl text-center text-red-500">
Error Loading Post
</h2>
`;

}

}

loadPost();

</script>

</body>
</html>
