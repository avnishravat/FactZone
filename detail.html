<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>FactZone - Amazing Facts & Educational Knowledge</title>
  <meta name="description" content="Read verified facts, science updates, historical mysteries, and knowledge articles on FactZone Official.">
  <meta name="robots" content="index,follow,max-image-preview:large">
  <link rel="canonical" href="https://factzone.online/detail.html">

  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://pagead2.googlesyndication.com" crossorigin>

  <meta property="og:type" content="article">
  <meta property="og:title" content="FactZone - Amazing Facts & Educational Knowledge">
  <meta property="og:description" content="Read verified facts, science updates, historical mysteries, and knowledge articles.">
  <meta property="og:image" content="https://factzone.online/logo.svg">
  <meta property="og:url" content="https://factzone.online/detail.html">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="FactZone - Amazing Facts & Educational Knowledge">
  <meta name="twitter:description" content="Read verified facts, science updates, historical mysteries, and knowledge articles.">
  <meta name="twitter:image" content="https://factzone.online/logo.svg">

  <link rel="icon" href="logo.svg">

  <style>
    body { background: #f3f4f6; font-family: Arial, sans-serif; margin: 0; padding: 0; }
    .main-wrapper { max-width: 896px; margin: 0 auto; padding: 1.25rem; }
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .fallback-box { background: #fff; width: 100%; height: 350px; border-radius: .75rem; border: 1px solid #e5e7eb; display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 1.25rem; padding: 1rem; box-sizing: border-box; }
    
    /* Layout Shifting Lock and No-Flicker Skeleton Rule */
    .detail-img-placeholder { width: 100%; border-radius: .75rem; margin-bottom: 1.25rem; height: 350px; max-height: 450px; object-fit: cover; background: #e5e7eb; display: block; }
    .skeleton-text { height: 20px; background: #e5e7eb; border-radius: 4px; margin-bottom: 10px; }
  </style>

  <script src="https://cdn.tailwindcss.com" defer></script>
</head>

<body>
  <div class="main-wrapper">
    <div class="flex items-center justify-between mb-5">
      <a href="index.html" class="flex items-center gap-3" style="text-decoration:none;color:inherit;" aria-label="FactZone Home">
        <img src="logo.svg" alt="FactZone Logo" width="48" height="48" class="w-12 h-12 rounded-full bg-white p-1 shadow">
        <span class="text-3xl font-bold">FactZone</span>
      </a>
      <a href="index.html" class="bg-black text-white px-5 py-3 rounded-xl hover:bg-gray-800 transition-colors" style="text-decoration:none;font-weight:bold;" aria-label="Go back to home page">← Back</a>
    </div>

    <div id="post" class="bg-white p-5 rounded-2xl shadow-lg">
      <div id="loader-placeholder">
        <div class="detail-img-placeholder"></div>
        <h1 class="text-3xl font-bold mb-4 text-gray-800">Interesting Educational Fact Article</h1>
        <div class="skeleton-text" style="width: 100%;"></div>
        <div class="skeleton-text" style="width: 90%;"></div>
        <div class="skeleton-text" style="width: 40%;"></div>
      </div>
    </div>

    <section id="relatedPosts" class="mt-10 bg-white p-5 rounded-2xl shadow-lg">
      <h2 class="text-2xl font-bold mb-4">Related Facts</h2>
      <div id="relatedContainer" style="display:grid;gap:1rem;">
        </div>
    </section>
  </div>

  <script type="module">
    const postDiv = document.getElementById("post");
    const relatedContainer = document.getElementById("relatedContainer");
    const params = new URLSearchParams(location.search);
    const id = params.get("id");

    // Dynamic Safe Layout Injection Engine
    function renderPost(post) {
      if (!post) return;

      const title = post.title || "FactZone Educational Article";
      const rawContent = post.content || "Amazing facts and verified educational details.";
      const description = rawContent.replace(/\n/g," ").substring(0,160);
      const image = post.image || "https://factzone.online/logo.svg";

      document.title = title + " | FactZone";

      // Instantly inject meta attributes for Googlebot optimization
      const metaDesc = document.querySelector('meta[name="description"]');
      if (metaDesc) metaDesc.setAttribute("content", description);

      const canonical = document.querySelector('link[rel="canonical"]');
      if (canonical) canonical.setAttribute("href", location.href);

      const ogTitle = document.querySelector('meta[property="og:title"]');
      if (ogTitle) ogTitle.setAttribute("content", title);

      const ogDesc = document.querySelector('meta[property="og:description"]');
      if (ogDesc) ogDesc.setAttribute("content", description);

      const ogImage = document.querySelector('meta[property="og:image"]');
      if (ogImage) ogImage.setAttribute("content", image);

      const ogUrl = document.querySelector('meta[property="og:url"]');
      if (ogUrl) ogUrl.setAttribute("content", location.href);

      const twTitle = document.querySelector('meta[name="twitter:title"]');
      if (twTitle) twTitle.setAttribute("content", title);

      const twDesc = document.querySelector('meta[name="twitter:description"]');
      if (twDesc) twDesc.setAttribute("content", description);

      const twImage = document.querySelector('meta[name="twitter:image"]');
      if (twImage) twImage.setAttribute("content", image);

      const oldSchema = document.getElementById("articleSchema");
      if (oldSchema) oldSchema.remove();

      const schema = {
        "@context":"https://schema.org",
        "@type":"Article",
        "headline":title,
        "description":description,
        "url":location.href,
        "image":[image],
        "author":{"@type":"Person","name":"Awaneesh"},
        "publisher":{
          "@type":"Organization",
          "name":"FactZone Official",
          "logo":{"@type":"ImageObject","url":"https://factzone.online/logo.svg"}
        }
      };

      const script = document.createElement("script");
      script.type = "application/ld+json";
      script.id = "articleSchema";
      script.text = JSON.stringify(schema);
      document.head.appendChild(script);

      // Pixel Perfect Match to prevent layout flicker completely on variable load
      postDiv.innerHTML = `
        <img src="${image}" alt="${title}" loading="eager" width="1200" height="675" style="width:100%;border-radius:.75rem;margin-bottom:1.25rem;max-height:450px;object-fit:cover;">
        <h1 class="text-3xl md:text-4xl font-bold mb-4">${title}</h1>
        <p class="text-gray-700 text-lg leading-8" style="white-space:pre-line;">${rawContent}</p>
        <div style="margin-top:2.5rem;border-top:1px solid #e5e7eb;padding-top:1.25rem;">
          <h3 style="font-weight:700;font-size:1.25rem;margin-bottom:.5rem;">About Author</h3>
          <p style="color:#4b5563;">Written by <a href="author.html" style="color:#2563eb;text-decoration:none;font-weight:500;">Awaneesh</a></p>
        </div>
      `;
    }

    // Instantly check cache before processing network requests
    if (id) {
      const initialCached = localStorage.getItem("factzone_" + id);
      if (initialCached) {
        try {
          renderPost(JSON.parse(initialCached));
        } catch(e) { console.error(e); }
      }
      
      const cachedRelatedHtml = localStorage.getItem("factzone_related");
      if (cachedRelatedHtml) {
        relatedContainer.innerHTML = cachedRelatedHtml;
      }
    }

    // CRITICAL SEO FIX: Execute Core Firestore Scripts Instantly for Googlebot Validation
    import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js").then((firebaseModule) => {
      import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js").then((firestoreModule) => {
        
        const firebaseConfig = {
          apiKey: "AIzaSyCUyQyMzEee1eO1RqmhTmIp_OjLT7guUAc",
          authDomain: "factzone-a9ace.firebaseapp.com",
          databaseURL: "https://factzone-a9ace-default-rtdb.firebaseio.com",
          projectId: "factzone-a9ace",
          storageBucket: "factzone-a9ace.firebasestorage.app",
          messagingSenderId: "425838320650",
          appId: "1:425838320650:web:beab18baddf818cb73d3f3",
          measurementId: "G-311JQXBXR9"
        };

        const app = firebaseModule.initializeApp(firebaseConfig);
        const db = firestoreModule.getFirestore(app);

        async function loadPost() {
          if (!id) return;
          const cacheKey = "factzone_" + id;
          try {
            const snap = await firestoreModule.getDoc(firestoreModule.doc(db, "posts", id));
            if (snap.exists()) {
              const post = snap.data();
              try { localStorage.setItem(cacheKey, JSON.stringify(post)); } catch(e) {}
              renderPost(post);
            } else if (!localStorage.getItem(cacheKey)) {
              postDiv.innerHTML = `<h1 class="text-2xl font-bold text-center p-10">Post Not Found</h1>`;
            }
          } catch(error) {
            console.error("Firebase fetch error:", error);
          }
        }

        async function loadRelatedPosts() {
          try {
            const q = firestoreModule.query(firestoreModule.collection(db, "posts"), firestoreModule.limit(6));
            const snap = await firestoreModule.getDocs(q);
            let html = "";
            let count = 0;

            snap.forEach(docSnap => {
              if (docSnap.id === id || count >= 4) return;
              const p = docSnap.data();
              html += `
                <a href="detail.html?id=${docSnap.id}" style="display:flex;align-items:center;gap:.75rem;padding:.75rem;border:1px solid #e5e7eb;border-radius:.75rem;background:#f9fafb;text-decoration:none;color:inherit;" aria-label="Read related fact: ${p.title || ''}">
                  <img src="${p.image || 'https://factzone.online/logo.svg'}" loading="lazy" width="64" height="64" style="width:64px;height:64px;object-fit:cover;border-radius:.5rem;flex-shrink:0;" alt="">
                  <h3 style="font-weight:700;font-size:.875rem;color:#1f2937;margin:0;" class="line-clamp-2">${p.title || ''}</h3>
                </a>`;
              count++;
            });

            if (html) {
              relatedContainer.innerHTML = html;
              try { localStorage.setItem("factzone_related", html); } catch(e) {}
            } else if (!localStorage.getItem("factzone_related")) {
              document.getElementById("relatedPosts").style.display = "none";
            }
          } catch(e) {
            console.error("Related posts fetch error:", e);
          }
        }

        loadPost();
        loadRelatedPosts();
      });
    });

    // Lazy load non-critical configurations (AdSense setup only on user touch/scroll)
    let adsLoaded = false;
    function loadAdsEngine() {
      if (adsLoaded) return;
      adsLoaded = true;
      const adsScript = document.createElement('script');
      adsScript.src = "https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-697419046628538";
      adsScript.crossOrigin = "anonymous";
      adsScript.async = true;
      document.head.appendChild(adsScript);
    }

    window.addEventListener('scroll', loadAdsEngine, { passive: true });
    window.addEventListener('touchstart', loadAdsEngine, { passive: true });
    window.addEventListener('mousemove', loadAdsEngine, { passive: true });
  </script>
</body>
</html>
