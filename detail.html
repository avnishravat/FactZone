  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #f5f4f0;

      --ink:      #1a1a18;
      --muted:    #5a5a55;
      --accent:    #c0392b;
      --border:    #e2e0d8;

    }
    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--ink);
    }
    .wrap { max-width: 860px; margin: 0 auto; padding: 1rem 1rem 2rem; }

    .site-header {

    .logo-link { display: flex; align-items: center; gap: .75rem; text-decoration: none; color: inherit; }
    .logo-link img { width: 40px; height: 40px; border-radius: 50%; background: #fff; padding: 3px; box-shadow: 0 2px 8px rgba(0,0,0,.12); }
    .logo-link span { font-family: 'Merriweather', serif; font-size: 1.4rem; font-weight: 700; letter-spacing: -.02em; }

    .back-btn:hover { background: #333; }

    #post { background: var(--surface); border-radius: var(--r); padding: 1.25rem 1.5rem; box-shadow: 0 2px 16px rgba(0,0,0,.07); }
    .hero-wrap { display: flex; justify-content: center; margin-bottom: .85rem; }
    #post img.hero { width: 100%; max-width: 300px; aspect-ratio: 16/9; border-radius: .6rem; object-fit: cover; display: block; box-shadow: 0 4px 18px rgba(0,0,0,.18); }
    #post h1 { font-family: 'Merriweather', serif; font-size: clamp(1.3rem, 4vw, 1.9rem); line-height: 1.25; font-weight: 700; margin-bottom: .5rem; }
    .meta-line { font-size: .82rem; color: var(--muted); margin-bottom: .85rem; display: flex; flex-wrap: wrap; gap: .4rem; align-items: center; }
    
    #post .content { font-size: 1.02rem; line-height: 1.7; color: #2d2d2b; white-space: normal; }
    
    .ql-code-block-container { background: #282c34; color: #abb2bf; padding: 1rem; border-radius: 0.5rem; font-family: monospace; margin: 1rem 0; overflow-x: auto; }
    
    .author-box { margin-top: 1.25rem; padding-top: .85rem; border-top: 1px solid var(--border); font-size: .9rem; color: var(--muted); }
    .author-box a { color: var(--accent); text-decoration: none; font-weight: 600; }

    .share-container { margin-top: 1rem; padding-top: .85rem; border-top: 1px dashed var(--border); }
    .share-title { font-size: 0.95rem; font-weight: 700; color: var(--ink); margin-bottom: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .share-buttons { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .share-btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.5rem 0.85rem; border-radius: 0.375rem; font-size: 0.85rem; font-weight: 700; text-decoration: none; color: #fff; transition: opacity 0.15s, transform 0.1s; cursor: pointer; border: none; }
    .share-btn:hover { opacity: 0.9; }
    .share-btn:active { transform: scale(0.97); }
    .btn-wa { background-color: #25D366; }
    .btn-fb { background-color: #1877F2; }
    .btn-tw { background-color: #000000; }
    .btn-cp { background-color: var(--muted); }

    .sk { background: linear-gradient(90deg,#eee 25%,#f8f8f8 50%,#eee 75%); background-size: 400% 100%; animation: sh 1.4s infinite; border-radius: .5rem; }
    @keyframes sh { to { background-position: -400% 0; } }
    .sk-img   { width: 100%; height: 200px; border-radius: .75rem; margin-bottom: 1.5rem; }
    .sk-h      { height: 2rem;   width: 75%; margin-bottom: 1rem; }
    .sk-p      { height: 1rem;   width: 100%; margin-bottom: .65rem; }
    .sk-p.s   { width: 55%; }

    .err { text-align: center; padding: 3rem 1rem; color: var(--muted); }
    .err h2 { font-family: 'Merriweather', serif; color: var(--ink); margin-bottom: .5rem; }

    #relatedSection { margin-top: 1.25rem; background: var(--surface); border-radius: var(--r); padding: 1.25rem 1.5rem; box-shadow: 0 2px 16px rgba(0,0,0,.07); }

    #relatedGrid { display: grid; gap: .65rem; }
    .rc { display: flex; align-items: center; gap: .75rem; padding: .65rem; border: 1px solid var(--border); border-radius: .75rem; background: var(--bg); text-decoration: none; color: inherit; transition: box-shadow .18s, transform .18s; }
    .rc:hover { box-shadow: 0 4px 18px rgba(0,0,0,.1); transform: translateY(-2px); }
    .rc img { width: 60px; height: 60px; object-fit: cover; border-radius: .5rem; flex-shrink: 0; }
    .rc h3  { font-size: .88rem; font-weight: 700; margin: 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

    @media(max-width:600px) { #post,#relatedSection { padding: 1rem .85rem; } }
  </style>

  <!-- BOTTOM NATIVE BANNER (Related section ke pehle) -->

<script>
(function () {

  var PROJECT_ID = "factzone-a9ace";
  var API_KEY    = "AIzaSyCUyQyMzEee1eO1RqmhTmIp_OjLT7guUAc";
  var FS_BASE = "https://firestore.googleapis.com/v1/projects/" + PROJECT_ID + "/databases/(default)/documents/";

  var params = new URLSearchParams(location.search);
  var id     = params.get("id") || "";

  function $(q) { return document.getElementById(q); }

  function escapeHtml(str) {
    return String(str == null ? "" : str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  function parseField(val) {
    if (!val) return "";
    if (val.stringValue  !== undefined) return val.stringValue;
    if (val.integerValue  !== undefined) return val.integerValue;
    if (val.booleanValue  !== undefined) return val.booleanValue;
    if (val.timestampValue !== undefined) return val.timestampValue;
    if (val.arrayValue    !== undefined) {
      return (val.arrayValue.values || []).map(parseField);
    }
    if (val.mapValue      !== undefined) return parseDoc(val.mapValue.fields || {});
    return "";
  }

  function parseDoc(fields) {
    var obj = {};
    Object.keys(fields || {}).forEach(function(k){ obj[k] = parseField(fields[k]); });
    return obj;
  }

  function lsGet(k) { try { return localStorage.getItem(k); } catch(e){ return null; } }
  function lsSet(k, v) { try { localStorage.setItem(k, v); } catch(e){} }

  function toSafeDate(val) {
    if (val === undefined || val === null || val === "") return null;
    var d;
    if (typeof val === 'number') {
      d = new Date(val);
    } else if (typeof val === 'string' && /^\d+$/.test(val)) {
      var num = Number(val);
      if (val.length <= 10) num = num * 1000;
      d = new Date(num);
    } else {
      d = new Date(val);
    }
    return isNaN(d.getTime()) ? null : d;
  }

  function readingTime(text) {
    var words = (text || "").trim().split(/\s+/).filter(Boolean).length;
    var mins = Math.max(1, Math.round(words / 200));
    return mins + " min read";
  }

  function formatDate(iso) {
    try {
      var d = new Date(iso);
      if (isNaN(d.getTime())) return "";
      return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
    } catch (e) { return ""; }
  }

  function updateSEO(title, desc, image, publishedISO, updatedISO, keywords) {
    var url = location.href;
    document.title = title + " | FactZone";

    function setMeta(sel, attr, val) {
      var el = document.querySelector(sel);
      if (el) el.setAttribute(attr, val);
    }

    setMeta('meta[name="description"]',         "content", desc);
    setMeta('meta[property="og:title"]',        "content", title);
    setMeta('meta[property="og:description"]',  "content", desc);
    setMeta('meta[property="og:image"]',        "content", image);
    setMeta('meta[property="og:url"]',          "content", url);
    setMeta('meta[name="twitter:title"]',       "content", title);
    setMeta('meta[name="twitter:description"]', "content", desc);
    setMeta('meta[name="twitter:image"]',       "content", image);
    setMeta('#meta-published', "content", publishedISO);
    setMeta('#meta-modified',  "content", updatedISO);

    var can = document.getElementById("meta-canonical");
    if (can) can.href = url;

    var schema = {
      "@context":   "https://schema.org",
      "@type":      "Article",
      "mainEntityOfPage": { "@type": "WebPage", "@id": url },
      "headline":   title,
      "description": desc,
      "url":         url,
      "image": {
        "@type": "ImageObject",
        "url":    image,
        "width":  1200,
        "height": 630
      },
      "datePublished": publishedISO,
      "dateModified":  updatedISO,
      "inLanguage":    "hi",
      "articleSection": "Amazing Facts",
      "keywords":      keywords,
      "author": {
        "@type": "Person",
        "name":  "Awaneesh",
        "url":   "https://factzone.online/author.html"
      },
      "publisher": {
        "@type": "Organization",
        "name":  "FactZone Official",
        "logo":  { "@type": "ImageObject", "url": "https://factzone.online/logo.png", "width": 512, "height": 512 }
      }
    };
    var el = document.getElementById("articleSchema");
    if (el) el.textContent = JSON.stringify(schema);

    var breadcrumb = {
      "@context": "https://schema.org",
      "@type":    "BreadcrumbList",
      "itemListElement": [
        { "@type": "ListItem", "position": 1, "name": "Home",          "item": "https://factzone.online/" },
        { "@type": "ListItem", "position": 2, "name": "Amazing Facts", "item": "https://factzone.online/" },
        { "@type": "ListItem", "position": 3, "name": title,           "item": url }
      ]
    };
    var bc = document.getElementById("breadcrumbSchema");
    if (bc) bc.textContent = JSON.stringify(breadcrumb);
  }

  window.copyArticleLink = function(btn) {
    var currentUrl = location.href;
    navigator.clipboard.writeText(currentUrl).then(function() {
      var oldText = btn.innerHTML;
      btn.innerHTML = '✓ Copied!';
      setTimeout(function() { btn.innerHTML = oldText; }, 2000);
    }).catch(function() {
      alert("Link copied: " + currentUrl);
    });
  };

  // Safe Dynamic Ad Loader Function
  function injectAdNetworkScripts() {
    try {
      // 1. Native ad container trigger script load
      var adScript = document.createElement('script');
      adScript.type = 'text/javascript';
      adScript.async = true;
      adScript.setAttribute('data-cfasync', 'false');
      adScript.src = 'https://pl30385025.effectivecpmnetwork.com/7ff4b1b57bf01a56609549fe3598888b/invoke.js';
      document.head.appendChild(adScript);
    } catch(e) { 
      console.error("Ad script embedding standard error:", e); 
    }
  }

  function renderPost(post) {
    var titleRaw   = post.title   || "FactZone Educational Article";
    var contentRaw = post.content || "Amazing facts and verified educational details.";
    var image      = post.image   || "https://factzone.online/logo.png";
    
    var descRaw    = contentRaw.replace(/<[^>]*>/g, '').replace(/\n/g," ");
    var desc       = descRaw.substring(0, 160);
    
    var createdDate  = toSafeDate(post.createdAt);
    var publishedISO = createdDate ? createdDate.toISOString() : new Date().toISOString();
    var updatedDate  = toSafeDate(post.updatedAt);
    var updatedISO   = updatedDate ? updatedDate.toISOString() : publishedISO;
    var keywords   = Array.isArray(post.tags) && post.tags.length ? post.tags.join(", ") : "amazing facts, science facts, hindi facts";

    updateSEO(titleRaw, desc, image, publishedISO, updatedISO, keywords);

    var title   = escapeHtml(titleRaw);
    
    var content = (typeof DOMPurify !== "undefined")
      ? DOMPurify.sanitize(contentRaw)
      : escapeHtml(contentRaw); 
    
    var cleanTextForReadTime = contentRaw.replace(/<[^>]*>/g, '');
    var minsRead = readingTime(cleanTextForReadTime);
    
    var author  = escapeHtml(post.author || "Awaneesh");

    var metaBits = ['📅 ' + formatDate(publishedISO), '📖 ' + minsRead, '👤 ' + author];
    if (updatedISO !== publishedISO) {
      metaBits.splice(1, 0, '🔄 Updated: ' + formatDate(updatedISO));
    }
    var metaLine = metaBits.join(' &nbsp;•&nbsp; ');

    var shareUrl = encodeURIComponent(location.href);
    var shareText = encodeURIComponent(titleRaw + " - Read more on FactZone:\n");

    // Dynamic Article Content with safe inline container placeholder inside the body
    var contentWithAd = (function() {
      var paragraphs = content.split('</p>');
      if (paragraphs.length > 1) {
        // Hamein yahan inline string me script block nahi likhna chahiye tha, isliye ab placeholder div banaya hai
        var inlineAdPlaceholder = '<div style="margin: 1.5rem 0; text-align: center;">' +
                                  '<div id="inline-container-7ff4b1b57bf01a56609549fe3598888b"></div>' +
                                  '</div>';
        paragraphs.splice(1, 0, inlineAdPlaceholder);
        return paragraphs.join('</p>');
      }
      return content;
    })();

    $("post-content").innerHTML =
      '<div class="hero-wrap"><img class="hero" src="' + escapeHtml(image) + '" alt="' + title + '" loading="eager" width="300" height="169"></div>' +
      '<h1 itemprop="headline">' + title + '</h1>' +
      '<p class="meta-line">' + metaLine + '</p>' +
      '<div class="content" itemprop="articleBody">' + contentWithAd + '</div>' +
      '<div class="share-container">' +
        '<div class="share-title">Share this Fact:</div>' +
        '<div class="share-buttons">' +
          '<a href="https://api.whatsapp.com/send?text=' + shareText + shareUrl + '" target="_blank" rel="noopener" class="share-btn btn-wa">WhatsApp</a>' +
          '<a href="https://www.facebook.com/sharer/sharer.php?u=' + shareUrl + '" target="_blank" rel="noopener" class="share-btn btn-fb">Facebook</a>' +
          '<a href="https://twitter.com/intent/tweet?text=' + shareText + '&url=' + shareUrl + '" target="_blank" rel="noopener" class="share-btn btn-tw">X / Twitter</a>' +
          '<button onclick="window.copyArticleLink(this)" class="share-btn btn-cp">Copy Link</button>' +
        '</div>' +
      '</div>' +
      '<div class="author-box">Written by <a href="author.html" itemprop="author">Awaneesh</a></div>';

      // HTML Render hone ke baad ads script ko load aur assign karne ka dynamic tarika execute karein
      injectAdNetworkScripts();
  }

  function renderRelated(items) {
    if (!items || !items.length) {
      $("relatedSection").style.display = "none";
      return;
    }
    $("relatedGrid").innerHTML = items.map(function(item){
      var img   = escapeHtml(item.image || "https://factzone.online/logo.png");
      var ttl   = escapeHtml(item.title || "");
      var pid   = encodeURIComponent(item._id || "");
      return '<a href="detail.html?id=' + pid + '" class="rc" aria-label="Read: ' + ttl + '">' +
             '<img src="' + img + '" loading="lazy" width="68" height="68" alt="' + ttl + '">' +
             '<h3>' + ttl + '</h3></a>';
    }).join("");
  }

  function fetchPost() {
    if (!id) {
      $("post-content").innerHTML = '<div class="err"><h2>No article ID</h2><p>Go back and pick an article.</p></div>';
      return;
    }

    var cached = lsGet("fz_post_" + id);
    if (cached) {
      try { renderPost(JSON.parse(cached)); } catch(e){}
    }

    var url = FS_BASE + "posts/" + id + "?key=" + API_KEY;
    fetch(url)
      .then(function(r){ return r.json(); })
      .then(function(data){
        if (!data.fields) {
          if (!cached) $("post-content").innerHTML = '<div class="err"><h2>Post Not Found</h2><p>This article may have been removed.</p></div>';
          return;
        }
        var post = parseDoc(data.fields);
        post._id = id;
        lsSet("fz_post_" + id, JSON.stringify(post));
        renderPost(post);
      })
      .catch(function(err){
        console.error("Post fetch error:", err);
        if (!cached) $("post-content").innerHTML = '<div class="err"><h2>Failed to load</h2><p>Check your connection and refresh.</p></div>';
      });
  }

  function fetchRelated() {
    var cached = lsGet("fz_related_v3");
    if (cached) { try { renderRelated(JSON.parse(cached)); } catch(e){} }

    var url = FS_BASE + "posts?key=" + API_KEY + "&pageSize=8";
    fetch(url)
      .then(function(r){ return r.json(); })
      .then(function(data){
        var docs = data.documents || [];
        var items = [];
        docs.forEach(function(d){
          var pid = (d.name || "").split("/").pop();
          if (pid === id || items.length >= 6) return;
          var post = parseDoc(d.fields);
          post._id = pid;
          items.push(post);
        });
        lsSet("fz_related_v3", JSON.stringify(items));
        renderRelated(items);
      })
      .catch(function(e){ console.error("Related fetch error:", e); });
  }

  fetchPost();
  fetchRelated();

})();
</script>
</body>
