<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>FactZone - Amazing Facts & Educational Knowledge</title>
  <meta name="description" content="Read verified facts, science updates, historical mysteries, and knowledge articles on FactZone Official.">
  <meta name="robots" content="index,follow,max-image-preview:large">
  <link rel="canonical" href="https://factzone.online/detail.html">

  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://pagead2.googlesyndication.com" crossorigin>

  <meta property="og:type" content="article">
  <meta property="og:title" content="FactZone - Amazing Facts & Educational Knowledge">
  <meta property="og:description" content="Read verified facts, science updates, historical mysteries, and knowledge articles.">
  <meta property="og:image" content="https://factzone.online/logo.svg">
  <meta property="og:url" content="https://factzone.online/detail.html">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="FactZone - Amazing Facts & Educational Knowledge">
  <meta name="twitter:description" content="Read verified facts, science updates, historical mysteries, and knowledge articles.">
  <meta name="twitter:image" content="https://factzone.online/logo.svg">

  <link rel="icon" href="logo.svg">

  <style>
    body { background: #f3f4f6; font-family: Arial, sans-serif; margin: 0; padding: 0; }
    .main-wrapper { max-width: 896px; margin: 0 auto; padding: 1.25rem; }
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    
    /* Layout Lock Optimization */
    .post-cover { width:100%; border-radius:.75rem; margin-bottom:1.25rem; max-height:450px; object-fit:cover; display:none; }
    .post-cover[src] { display: block; } /* Only shows up when image source path is ready */
  </style>

  <script src="https://cdn.tailwindcss.com" defer></script>
</head>

<body>
  <div class="main-wrapper">
    <div class="flex items-center justify-between mb-5">
      <a href="index.html" class="flex items-center gap-3" style="text-decoration:none;color:inherit;" aria-label="FactZone Home">
        <img src="logo.svg" alt="FactZone Logo" width="48" height="48" class="w-12 h-12 rounded-full bg-white p-1 shadow">
        <span class="text-3xl font-bold">FactZone</span>
      </a>
      <a href="index.html" class="bg-black text-white px-5 py-3 rounded-xl hover:bg-gray-800 transition-colors" style="text-decoration:none;font-weight:bold;" aria-label="Go back to home page">← Back</a>
    </div>

    <article id="post" class="bg-white p-5 rounded-2xl shadow-lg">
      <img id="post-img" class="post-cover" alt="FactZone Article Image" width="1200" height="675">
      <h1 id="post-title" class="text-3xl md:text-4xl font-bold mb-4 text-gray-900">FactZone Educational Article</h1>
      <p id="post-content" class="text-gray-700 text-lg leading-8" style="white-space:pre-line;">Loading amazing verified facts and expert knowledge articles...</p>
      
      <div style="margin-top:2.5rem;border-top:1px solid #e5e7eb;padding-top:1.25rem;">
        <h3 style="font-weight:700;font-size:1.25rem;margin-bottom:.5rem;">About Author</h3>
        <p style="color:#4b5563;">Written by <a href="author.html" style="color:#2563eb;text-decoration:none;font-weight:500;">Awaneesh</a></p>
      </div>
    </article>

    <section id="relatedPosts" class="mt-10 bg-white p-5 rounded-2xl shadow-lg">
      <h2 class="text-2xl font-bold mb-4">Related Facts</h2>
      <div id="relatedContainer" style="display:grid;gap:1rem;">
        </div>
    </section>
  </div>

  <script type="module">
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    const imgEl = document.getElementById("post-img");
    const titleEl = document.getElementById("post-title");
    const contentEl = document.getElementById("post-content");
    const relatedContainer = document.getElementById("relatedContainer");

    // Pure DOM Hydration Engine (Zero Flicker & 100% Crawlable)
    function renderPost(post) {
      if (!post) return;

      const title = post.title || "FactZone Educational Article";
      const rawContent = post.content || "Amazing facts and verified educational details.";
      const description = rawContent.replace(/\n/g," ").substring(0,160);
      const image = post.image || "https://factzone.online/logo.svg";

      // 1. Update Core Elements Instantly
      titleEl.innerText = title;
      contentEl.innerText = rawContent;
      imgEl.src = image;
      imgEl.alt = title;

      // 2. Update Browser Meta tags for Googlebot Index Engine
      document.title = title + " | FactZone";
      const updateMeta = (selector, attr, val) => {
        const el = document.querySelector(selector);
        if (el) el.setAttribute(attr, val);
      };

      updateMeta('meta[name="description"]', 'content', description);
      updateMeta('link[rel="canonical"]', 'href', window.location.href);
      updateMeta('meta[property="og:title"]', 'content', title);
      updateMeta('meta[property="og:description"]', 'content', description);
      updateMeta('meta[property="og:image"]', 'content', image);
      updateMeta('meta[property="og:url"]', 'content', window.location.href);
      updateMeta('meta[name="twitter:title"]', 'content', title);
      updateMeta('meta[name="twitter:description"]', 'content', description);
      updateMeta('meta[name="twitter:image"]', 'content', image);

      // 3. Inject Structured Rich Schema
      const oldSchema = document.getElementById("articleSchema");
      if (oldSchema) oldSchema.remove();

      const schema = {
        "@context": "https://schema.org",
        "@type": "Article",
        "headline": title,
        "description": description,
        "url": window.location.href,
        "image": [image],
        "author": {"@type": "Person", "name": "Awaneesh"},
        "publisher": {
          "@type": "Organization",
          "name": "FactZone Official",
          "logo": {"@type": "ImageObject", "url": "https://factzone.online/logo.svg"}
        }
      };

      const script = document.createElement("script");
      script.type = "application/ld+json";
      script.id = "articleSchema";
      script.text = JSON.stringify(schema);
      document.head.appendChild(script);
    }

    // STEP 1: Microsecond Instant Cache Check (No blank screen for users)
    if (id) {
      const cachedPost = localStorage.getItem("factzone_" + id);
      if (cachedPost) {
        try { renderPost(JSON.parse(cachedPost)); } catch(e) { console.error(e); }
      }
      const cachedRelated = localStorage.getItem("factzone_related");
      if (cachedRelated) { relatedContainer.innerHTML = cachedRelated; }
    }

    // STEP 2: Strict Synchronous Firestore Loading Strategy (Forces Googlebot to capture real data)
    import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js").then((firebaseModule) => {
      import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js").then((firestoreModule) => {
        
        const firebaseConfig = {
          apiKey: "AIzaSyCUyQyMzEee1eO1RqmhTmIp_OjLT7guUAc",
          authDomain: "factzone-a9ace.firebaseapp.com",
          databaseURL: "https://factzone-a9ace-default-rtdb.firebaseio.com",
          projectId: "factzone-a9ace",
          storageBucket: "factzone-a9ace.firebasestorage.app",
          messagingSenderId: "425838320650",
          appId: "1:425838320650:web:beab18baddf818cb73d3f3",
          measurementId: "G-311JQXBXR9"
        };

        const app = firebaseModule.initializeApp(firebaseConfig);
        const db = firestoreModule.getFirestore(app);

        async function loadPost() {
          if (!id) return;
          try {
            const snap = await firestoreModule.getDoc(firestoreModule.doc(db, "posts", id));
            if (snap.exists()) {
              const post = snap.data();
              try { localStorage.setItem("factzone_" + id, JSON.stringify(post)); } catch(e) {}
              renderPost(post);
            } else if (!localStorage.getItem("factzone_" + id)) {
              titleEl.innerText = "Post Not Found";
              contentEl.innerText = "The requested educational article could not be retrieved.";
            }
          } catch(error) {
            console.error("Firebase post error:", error);
          }
        }

        async function loadRelatedPosts() {
          try {
            const q = firestoreModule.query(firestoreModule.collection(db, "posts"), firestoreModule.limit(6));
            const snap = await firestoreModule.getDocs(q);
            let html = "";
            let count = 0;

            snap.forEach(docSnap => {
              if (docSnap.id === id || count >= 4) return;
              const p = docSnap.data();
              html += `
                <a href="detail.html?id=${docSnap.id}" style="display:flex;align-items:center;gap:.75rem;padding:.75rem;border:1px solid #e5e7eb;border-radius:.75rem;background:#f9fafb;text-decoration:none;color:inherit;" aria-label="Read related fact: ${p.title || ''}">
                  <img src="${p.image || 'https://factzone.online/logo.svg'}" loading="lazy" width="64" height="64" style="width:64px;height:64px;object-fit:cover;border-radius:.5rem;flex-shrink:0;" alt="">
                  <h3 style="font-weight:700;font-size:.875rem;color:#1f2937;margin:0;" class="line-clamp-2">${p.title || ''}</h3>
                </a>`;
              count++;
            });

            if (html) {
              relatedContainer.innerHTML = html;
              try { localStorage.setItem("factzone_related", html); } catch(e) {}
            }
          } catch(e) {
            console.error("Firebase related error:", e);
          }
        }

        loadPost();
        loadRelatedPosts();
      });
    });

    // Lazy load ads only during passive interaction to maintain 100/100 performance score
    let adsLoaded = false;
    function loadAds() {
      if (adsLoaded) return;
      adsLoaded = true;
      const adsScript = document.createElement('script');
      adsScript.src = "https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-697419046628538";
      adsScript.crossOrigin = "anonymous";
      adsScript.async = true;
      document.head.appendChild(adsScript);
    }
    window.addEventListener('scroll', loadAds, { passive: true });
    window.addEventListener('touchstart', loadAds, { passive: true });
    window.addEventListener('mousemove', loadAds, { passive: true });
  </script>
</body>
</html>
