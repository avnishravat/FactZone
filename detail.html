<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FactZone - Article Details</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b111e;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background: #111a2e;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .loading, .error-msg {
            text-align: center;
            font-size: 1.2rem;
            padding: 40px;
        }
        .back-btn {
            display: inline-block;
            color: #38bdf8;
            text-decoration: none;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .back-btn:hover {
            text-decoration: underline;
        }
        h1 {
            color: #f1f5f9;
            font-size: 2rem;
            margin-bottom: 15px;
        }
        .meta-info {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 20px;
            border-bottom: 1px solid #1e293b;
            padding-bottom: 10px;
        }
        .content {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #cbd5e1;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Home</a>
        
        <div id="loader" class="loading">
            <i class="fas fa-spinner fa-spin"></i> Article load ho raha hai, kripya pratiksha karein...
        </div>

        <div id="article-content" style="display: none;">
            <h1 id="article-title"></h1>
            <div class="meta-info">
                <span><i class="far fa-calendar-alt"></i> FactZone Updates</span>
            </div>
            <div id="article-body" class="content"></div>
        </div>

        <div id="error-container" class="error-msg" style="display: none;">
            <i class="fas fa-exclamation-triangle" style="color: #ef4444; font-size: 2rem;"></i>
            <p id="error-text">Article nahi mil paya!</p>
        </div>
    </div>

    <!-- Firebase SDK Links -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script>
        // Firebase Configuration (Aapki config details automatic connected hain)
        const firebaseConfig = {
            authDomain: "factzone-a9ace.firebaseapp.com",
            projectId: "factzone-a9ace",
            storageBucket: "factzone-a9ace.appspot.com",
            messagingSenderId: "367351406560",
            appId: "1:367351406560:web:9b97a29486c9fb6019a690"
        };

        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        // URL se ID nikalne ka function
        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        const articleId = getQueryParam('id');
        const loader = document.getElementById('loader');
        const contentDiv = document.getElementById('article-content');
        const errorDiv = document.getElementById('error-container');

        if (articleId) {
            // Firestore se ID ke base par data fetch karna
            db.collection('posts').doc(articleId).get().then((doc) => {
                if (doc.exists) {
                    const data = doc.data();
                    
                    // HTML text fill karna
                    document.getElementById('article-title').innerText = data.title || "No Title";
                    document.getElementById('article-body').innerText = data.content || "No Content Available";
                    
                    // Loader chupana aur content dikhana
                    loader.style.display = 'none';
                    contentDiv.style.display = 'block';
                } else {
                    showError("Yeh article database mein maujood nahi hai.");
                }
            }).catch((error) => {
                console.error("Error fetching document:", error);
                showError("Server se data load karne mein dikkat aayi hai.");
            });
        } else {
            showError("URL mein koi valid ID nahi mili.");
        }

        function showError(msg) {
            loader.style.display = 'none';
            errorDiv.style.display = 'block';
            document.getElementById('error-text').innerText = msg;
        }
    </script>
</body>
</html>
