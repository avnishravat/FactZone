<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
doc,
getDoc,
collection,
getDocs,
query,
limit
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* =========================
   FIREBASE CONFIG
========================= */

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "factzone-a9ace.firebaseapp.com",
  projectId: "factzone-a9ace",
  storageBucket: "factzone-a9ace.appspot.com",
  messagingSenderId: "425838320650",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* =========================
   ELEMENTS
========================= */

const postDiv = document.getElementById("post");
const relatedContainer =
document.getElementById("relatedContainer");

const params = new URLSearchParams(location.search);
const id = params.get("id");

/* =========================
   LOAD POST
========================= */

async function loadPost() {

if(!id){
postDiv.innerHTML = `
<h2 class="text-3xl text-center text-red-500">
Invalid Post URL
</h2>`;
return;
}

try{

const snap = await getDoc(
doc(db,"posts",id)
);

if(!snap.exists()){

postDiv.innerHTML = `
<h2 class="text-3xl text-center">
Post Not Found
</h2>`;
return;
}

const post = snap.data();

const title =
post.title || "FactZone Article";

const description =
(post.content || "")
.replace(/\n/g," ")
.substring(0,160);

const image =
post.image ||
"https://factzone.online/logo.svg";

/* =========================
   SEO UPDATE
========================= */

document.title =
title + " | FactZone";

document
.querySelector('meta[name="description"]')
.setAttribute("content",description);

document
.querySelector('link[rel="canonical"]')
.setAttribute("href",location.href);

document
.querySelector('meta[property="og:title"]')
.setAttribute("content",title);

document
.querySelector('meta[property="og:description"]')
.setAttribute("content",description);

document
.querySelector('meta[property="og:image"]')
.setAttribute("content",image);

document
.querySelector('meta[property="og:url"]')
.setAttribute("content",location.href);

document
.querySelector('meta[name="twitter:title"]')
.setAttribute("content",title);

document
.querySelector('meta[name="twitter:description"]')
.setAttribute("content",description);

document
.querySelector('meta[name="twitter:image"]')
.setAttribute("content",image);

/* =========================
   ARTICLE SCHEMA
========================= */

const schema = {
"@context":"https://schema.org",
"@type":"Article",
"headline":title,
"description":description,
"url":location.href,
"mainEntityOfPage":{
 "@type":"WebPage",
 "@id":location.href
},
"image":[image],
"author":{
 "@type":"Person",
 "name":"Avnish Ravat"
},
"publisher":{
 "@type":"Organization",
 "name":"FactZone Official",
 "logo":{
   "@type":"ImageObject",
   "url":"https://factzone.online/logo.svg"
 }
}
};

const oldSchema =
document.getElementById("articleSchema");

if(oldSchema){
oldSchema.remove();
}

const script =
document.createElement("script");

script.type = "application/ld+json";
script.id = "articleSchema";
script.text =
JSON.stringify(schema);

document.head.appendChild(script);

/* =========================
   POST HTML
========================= */

postDiv.innerHTML = `

<img
src="${image}"
alt="${title}"
loading="eager"
class="w-full rounded-xl mb-5">

<h1 class="text-4xl font-bold mb-4">
${title}
</h1>

<h2 class="sr-only">
Amazing Facts, Science Facts,
Technology Facts, Mystery Facts
</h2>

<p class="text-gray-700 text-lg leading-8 whitespace-pre-line">
${post.content || ""}
</p>

<div class="mt-10 border-t pt-5">

<h3 class="font-bold text-xl mb-2">
About Author
</h3>

<p class="text-gray-600">
Written by
<a href="author.html"
class="text-blue-600">
Avnish Ravat
</a>
</p>

</div>
`;

}
catch(error){

console.error(error);

postDiv.innerHTML = `
<h2 class="text-3xl text-center text-red-500">
Error Loading Post
</h2>`;
}

}

/* =========================
   RELATED POSTS
========================= */

async function loadRelatedPosts(){

try{

const q = query(
collection(db,"posts"),
limit(6)
);

const snap = await getDocs(q);

let html = "";
let count = 0;

snap.forEach(docSnap=>{

if(docSnap.id === id) return;
if(count >= 4) return;

const p = docSnap.data();

html += `

<a
href="detail.html?id=${docSnap.id}"
class="flex items-center gap-3 p-2 border rounded-xl hover:bg-gray-50">

<img
src="${p.image || 'https://factzone.online/logo.svg'}"
alt="${p.title || ''}"
loading="lazy"
class="w-16 h-16 object-cover rounded-lg">

<h3 class="font-bold text-sm">
${p.title || ''}
</h3>

</a>

`;

count++;

});

if(count===0){

document.getElementById(
"relatedPosts"
).style.display = "none";

return;
}

relatedContainer.innerHTML = html;

}
catch(error){

console.error(error);

relatedContainer.innerHTML =
"Failed to load related posts.";

}

}

/* =========================
   FAST LOAD
========================= */

Promise.all([
loadPost(),
loadRelatedPosts()
]);

</script>
