<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>FactZone - Amazing Facts & Educational Knowledge</title>
  <meta name="description" content="Read verified facts, science updates, historical mysteries, and knowledge articles on FactZone Official.">
  <meta name="robots" content="index,follow,max-image-preview:large">
  <link rel="canonical" id="meta-canonical" href="https://factzone.online/detail.html">

  <meta property="og:type"        content="article">
  <meta property="og:title"       content="FactZone - Amazing Facts & Educational Knowledge">
  <meta property="og:description" content="Read verified facts, science updates, historical mysteries, and knowledge articles.">
  <meta property="og:image"       content="https://factzone.online/logo.svg">
  <meta property="og:url"         content="https://factzone.online/detail.html">
  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       content="FactZone - Amazing Facts & Educational Knowledge">
  <meta name="twitter:description" content="Read verified facts, science updates, historical mysteries, and knowledge articles.">
  <meta name="twitter:image"       content="https://factzone.online/logo.svg">

  <script type="application/ld+json" id="articleSchema">{"@context":"https://schema.org","@type":"Article","headline":"FactZone Educational Article","author":{"@type":"Person","name":"Awaneesh"},"publisher":{"@type":"Organization","name":"FactZone Official","logo":{"@type":"ImageObject","url":"https://factzone.online/logo.svg"}}}</script>

  <link rel="icon" href="logo.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-697419046628538" crossorigin="anonymous"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #f5f4f0;
      --surface:  #ffffff;
      --ink:      #1a1a18;
      --muted:    #5a5a55;
      --accent:   #c0392b;
      --border:   #e2e0d8;
      --r:        1rem;
    }
    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--ink);
    }
    .wrap { max-width: 860px; margin: 0 auto; padding: 1.5rem 1.25rem 3rem; }

    /* Header */
    .site-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 2rem; padding-bottom: 1.25rem;
      border-bottom: 2px solid var(--ink);
    }
    .logo-link { display: flex; align-items: center; gap: .75rem; text-decoration: none; color: inherit; }
    .logo-link img { width: 44px; height: 44px; border-radius: 50%; background: #fff; padding: 3px; box-shadow: 0 2px 8px rgba(0,0,0,.12); }
    .logo-link span { font-family: 'Merriweather', serif; font-size: 1.6rem; font-weight: 700; letter-spacing: -.02em; }
    .back-btn { background: var(--ink); color: #fff; text-decoration: none; font-weight: 700; font-size: .875rem; padding: .55rem 1.1rem; border-radius: .5rem; transition: background .18s; }
    .back-btn:hover { background: #333; }

    /* Article */
    #post { background: var(--surface); border-radius: var(--r); padding: 1.75rem 2rem; box-shadow: 0 2px 16px rgba(0,0,0,.07); }
    .hero-wrap { display: flex; justify-content: center; margin-bottom: 1.5rem; }
    #post img.hero { width: 100%; max-width: 360px; aspect-ratio: 16/9; border-radius: .6rem; object-fit: cover; display: block; box-shadow: 0 4px 18px rgba(0,0,0,.18); }
    #post h1 { font-family: 'Merriweather', serif; font-size: clamp(1.4rem, 4vw, 2.1rem); line-height: 1.3; font-weight: 700; margin-bottom: 1.25rem; }
    #post .content { font-size: 1.05rem; line-height: 1.85; color: #2d2d2b; white-space: pre-line; }
    .author-box { margin-top: 2rem; padding-top: 1.25rem; border-top: 1px solid var(--border); font-size: .95rem; color: var(--muted); }
    .author-box a { color: var(--accent); text-decoration: none; font-weight: 600; }

    /* Share Buttons CSS */
    .share-container { margin-top: 1.5rem; padding-top: 1.25rem; border-top: 1px dashed var(--border); }
    .share-title { font-size: 0.95rem; font-weight: 700; color: var(--ink); margin-bottom: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .share-buttons { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .share-btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.5rem 0.85rem; border-radius: 0.375rem; font-size: 0.85rem; font-weight: 700; text-decoration: none; color: #fff; transition: opacity 0.15s, transform 0.1s; cursor: pointer; border: none; }
    .share-btn:hover { opacity: 0.9; }
    .share-btn:active { transform: scale(0.97); }
    .btn-wa { background-color: #25D366; }
    .btn-fb { background-color: #1877F2; }
    .btn-tw { background-color: #000000; }
    .btn-cp { background-color: var(--muted); }

    /* Skeleton */
    .sk { background: linear-gradient(90deg,#eee 25%,#f8f8f8 50%,#eee 75%); background-size: 400% 100%; animation: sh 1.4s infinite; border-radius: .5rem; }
    @keyframes sh { to { background-position: -400% 0; } }
    .sk-img   { width: 100%; height: 320px; border-radius: .75rem; margin-bottom: 1.5rem; }
    .sk-h      { height: 2rem;   width: 75%; margin-bottom: 1rem; }
    .sk-p      { height: 1rem;   width: 100%; margin-bottom: .65rem; }
    .sk-p.s   { width: 55%; }

    /* Error */
    .err { text-align: center; padding: 3rem 1rem; color: var(--muted); }
    .err h2 { font-family: 'Merriweather', serif; color: var(--ink); margin-bottom: .5rem; }

    /* Related */
    #relatedSection { margin-top: 2rem; background: var(--surface); border-radius: var(--r); padding: 1.75rem 2rem; box-shadow: 0 2px 16px rgba(0,0,0,.07); }
    #relatedSection h2 { font-family: 'Merriweather', serif; font-size: 1.25rem; font-weight: 700; margin-bottom: 1.25rem; padding-bottom: .75rem; border-bottom: 2px solid var(--ink); }
    #relatedGrid { display: grid; gap: .85rem; }
    .rc { display: flex; align-items: center; gap: .9rem; padding: .85rem; border: 1px solid var(--border); border-radius: .75rem; background: var(--bg); text-decoration: none; color: inherit; transition: box-shadow .18s, transform .18s; }
    .rc:hover { box-shadow: 0 4px 18px rgba(0,0,0,.1); transform: translateY(-2px); }
    .rc img { width: 68px; height: 68px; object-fit: cover; border-radius: .5rem; flex-shrink: 0; }
    .rc h3  { font-size: .9rem; font-weight: 700; margin: 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

    @media(max-width:600px) { #post,#relatedSection { padding: 1.25rem 1rem; } }
  </style>
</head>

<body>
<div class="wrap">

  <header class="site-header">
    <a href="index.html" class="logo-link" aria-label="FactZone Home">
      <img src="logo.svg" alt="FactZone Logo" width="44" height="44">
      <span>FactZone</span>
    </a>
    <a href="index.html" class="back-btn">← Back</a>
  </header>

  <article id="post" itemscope itemtype="https://schema.org/Article">
    <div id="skeleton">
      <div class="sk sk-img"></div>
      <div class="sk sk-h"></div>
      <div class="sk sk-p"></div>
      <div class="sk sk-p"></div>
      <div class="sk sk-p s"></div>
    </div>
    <noscript>
      <p>Please enable JavaScript to read this article on FactZone.</p>
    </noscript>
  </article>

  <section id="relatedSection" aria-label="Related Facts">
    <h2>Related Facts</h2>
    <div id="relatedGrid"></div>
  </section>

</div>

<script>
(function () {
  /* ─────────────────────────────────────────────
      CONFIG
  ───────────────────────────────────────────── */
  var PROJECT_ID = "factzone-a9ace";
  var API_KEY    = "AIzaSyCUyQyMzEee1eO1RqmhTmIp_OjLT7guUAc";

  /* Firestore REST base — NO SDK, no module import, instant */
  var FS_BASE = "https://firestore.googleapis.com/v1/projects/"
              + PROJECT_ID + "/databases/(default)/documents/";

  /* ─────────────────────────────────────────────
      HELPERS
  ───────────────────────────────────────────── */
  var params = new URLSearchParams(location.search);
  var id     = params.get("id") || "";

  function $(q) { return document.getElementById(q); }

  /* Parse Firestore REST field value */
  function parseField(val) {
    if (!val) return "";
    if (val.stringValue  !== undefined) return val.stringValue;
    if (val.integerValue  !== undefined) return val.integerValue;
    if (val.booleanValue  !== undefined) return val.booleanValue;
    if (val.arrayValue    !== undefined) {
      return (val.arrayValue.values || []).map(parseField);
    }
    if (val.mapValue      !== undefined) return parseDoc(val.mapValue.fields || {});
    return "";
  }

  /* Convert Firestore REST fields object → plain JS object */
  function parseDoc(fields) {
    var obj = {};
    Object.keys(fields || {}).forEach(function(k){ obj[k] = parseField(fields[k]); });
    return obj;
  }

  /* Simple localStorage wrapper */
  function lsGet(k) { try { return localStorage.getItem(k); } catch(e){ return null; } }
  function lsSet(k, v) { try { localStorage.setItem(k, v); } catch(e){} }

  /* ─────────────────────────────────────────────
      SEO UPDATER  (runs as soon as data is ready)
  ───────────────────────────────────────────── */
  function updateSEO(title, desc, image) {
    var url = location.href;
    document.title = title + " | FactZone";

    function setMeta(sel, attr, val) {
      var el = document.querySelector(sel);
      if (el) el.setAttribute(attr, val);
    }

    setMeta('meta[name="description"]',         "content", desc);
    setMeta('meta[property="og:title"]',        "content", title);
    setMeta('meta[property="og:description"]',  "content", desc);
    setMeta('meta[property="og:image"]',        "content", image);
    setMeta('meta[property="og:url"]',          "content", url);
    setMeta('meta[name="twitter:title"]',       "content", title);
    setMeta('meta[name="twitter:description"]', "content", desc);
    setMeta('meta[name="twitter:image"]',       "content", image);

    var can = document.getElementById("meta-canonical");
    if (can) can.href = url;

    /* ── Article JSON-LD (structured data for enhancements) ── */
    var schema = {
      "@context":   "https://schema.org",
      "@type":      "Article",
      "headline":   title,
      "description": desc,
      "url":         url,
      "image":      [image],
      "datePublished": new Date().toISOString(),
      "author":    { "@type": "Person",       "name": "Awaneesh" },
      "publisher": {
        "@type": "Organization",
        "name":  "FactZone Official",
        "logo":  { "@type": "ImageObject", "url": "https://factzone.online/logo.svg" }
      }
    };
    var el = document.getElementById("articleSchema");
    if (el) el.textContent = JSON.stringify(schema);
  }

  /* Global function for copy link handler */
  window.copyArticleLink = function(btn) {
    var currentUrl = location.href;
    navigator.clipboard.writeText(currentUrl).then(function() {
      var oldText = btn.innerHTML;
      btn.innerHTML = '✓ Copied!';
      setTimeout(function() { btn.innerHTML = oldText; }, 2000);
    }).catch(function() {
      alert("Link copied: " + currentUrl);
    });
  };

  /* ─────────────────────────────────────────────
      RENDER POST
  ───────────────────────────────────────────── */
  function renderPost(post) {
    var title   = post.title   || "FactZone Educational Article";
    var content = post.content || "Amazing facts and verified educational details.";
    var image   = post.image   || "https://factzone.online/logo.svg";
    var desc    = content.replace(/\n/g," ").substring(0, 160);

    updateSEO(title, desc, image);

    var shareUrl = encodeURIComponent(location.href);
    var shareText = encodeURIComponent(title + " - Read more on FactZone:\n");

    $("post").innerHTML =
      '<div class="hero-wrap"><img class="hero" src="' + image + '" alt="' + title.replace(/"/g,'&quot;') + '" loading="eager" width="360" height="202"></div>' +
      '<h1 itemprop="headline">' + title + '</h1>' +
      '<div class="content" itemprop="articleBody">' + content + '</div>' +
      
      '' +
      '<div class="share-container">' +
        '<div class="share-title">Share this Fact:</div>' +
        '<div class="share-buttons">' +
          '<a href="https://api.whatsapp.com/send?text=' + shareText + shareUrl + '" target="_blank" rel="noopener" class="share-btn btn-wa">WhatsApp</a>' +
          '<a href="https://www.facebook.com/sharer/sharer.php?u=' + shareUrl + '" target="_blank" rel="noopener" class="share-btn btn-fb">Facebook</a>' +
          '<a href="https://twitter.com/intent/tweet?text=' + shareText + '&url=' + shareUrl + '" target="_blank" rel="noopener" class="share-btn btn-tw">X / Twitter</a>' +
          '<button onclick="window.copyArticleLink(this)" class="share-btn btn-cp">Copy Link</button>' +
        '</div>' +
      '</div>' +

      '<div class="author-box">Written by <a href="author.html" itemprop="author">Awaneesh</a></div>';
  }

  /* ─────────────────────────────────────────────
      RENDER RELATED
  ───────────────────────────────────────────── */
  function renderRelated(items) {
    if (!items || !items.length) {
      $("relatedSection").style.display = "none";
      return;
    }
    $("relatedGrid").innerHTML = items.map(function(item){
      var img   = item.image || "https://factzone.online/logo.svg";
      var ttl   = item.title || "";
      var pid   = item._id  || "";
      return '<a href="detail.html?id=' + pid + '" class="rc" aria-label="Read: ' + ttl.replace(/"/g,'&quot;') + '">' +
             '<img src="' + img + '" loading="lazy" width="68" height="68" alt="">' +
             '<h3>' + ttl + '</h3></a>';
    }).join("");
  }

  /* ─────────────────────────────────────────────
      FETCH via Firestore REST  (no SDK = fast!)
  ───────────────────────────────────────────── */
  function fetchPost() {
    if (!id) {
      $("post").innerHTML = '<div class="err"><h2>No article ID</h2><p>Go back and pick an article.</p></div>';
      return;
    }

    /* Show cached version instantly */
    var cached = lsGet("fz_post_" + id);
    if (cached) {
      try { renderPost(JSON.parse(cached)); } catch(e){}
    }

    /* Fetch fresh — REST API, no heavy SDK */
    var url = FS_BASE + "posts/" + id + "?key=" + API_KEY;
    fetch(url)
      .then(function(r){ return r.json(); })
      .then(function(data){
        if (!data.fields) {
          if (!cached) $("post").innerHTML = '<div class="err"><h2>Post Not Found</h2><p>This article may have been removed.</p></div>';
          return;
        }
        var post = parseDoc(data.fields);
        lsSet("fz_post_" + id, JSON.stringify(post));
        renderPost(post);
      })
      .catch(function(err){
        console.error("Post fetch error:", err);
        if (!cached) $("post").innerHTML = '<div class="err"><h2>Failed to load</h2><p>Check your connection and refresh.</p></div>';
      });
  }

  function fetchRelated() {
    /* Show cached instantly */
    var cached = lsGet("fz_related_v3");
    if (cached) { try { renderRelated(JSON.parse(cached)); } catch(e){} }

    /* Fetch 6 docs, filter out current */
    var url = FS_BASE + "posts?key=" + API_KEY + "&pageSize=6";
    fetch(url)
      .then(function(r){ return r.json(); })
      .then(function(data){
        var docs = data.documents || [];
        var items = [];
        docs.forEach(function(d){
          var pid = (d.name || "").split("/").pop();
          if (pid === id || items.length >= 4) return;
          var post = parseDoc(d.fields);
          post._id = pid;
          items.push(post);
        });
        lsSet("fz_related_v3", JSON.stringify(items));
        renderRelated(items);
      })
      .catch(function(e){ console.error("Related fetch error:", e); });
  }

  /* ─────────────────────────────────────────────
      BOOT — run immediately, no waiting
  ───────────────────────────────────────────── */
  fetchPost();
  fetchRelated();

})();
</script>
</body>
</html>
