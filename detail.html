<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Post</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>

<body class="p-6 bg-white">

<button onclick="history.back()" class="bg-black text-white px-3 py-1 mb-4">⬅ Back</button>

<img id="img" class="w-full h-72 object-cover mb-3">

<h1 id="title"></h1>
<p id="content"></p>

<p id="views"></p>
<p id="likes"></p>

<button id="likeBtn">❤️ Like</button>

<script>
const firebaseConfig={
apiKey:"AIzaSyCUyQyMzEee1eO1RqmhTmIp_OjLT7guUAc",
authDomain:"factzone-a9ace.firebaseapp.com",
projectId:"factzone-a9ace"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

const id=new URLSearchParams(location.search).get("id");

async function load(){

if(!id){
document.body.innerHTML="<h2>No Post ID</h2>";
return;
}

let ref=db.collection("posts").doc(id);

// VIEW
if(!localStorage.getItem("view_"+id)){
try{
await ref.update({
views:firebase.firestore.FieldValue.increment(1)
});
}catch(e){}
localStorage.setItem("view_"+id,true);
}

let doc=await ref.get();

if(!doc.exists){
document.body.innerHTML="<h2>Post Not Found</h2>";
return;
}

let p=doc.data();

title.innerText=p.title||"";
content.innerText=p.content||"";
views.innerText="👁 "+(p.views||0);
likes.innerText="❤️ "+(p.likes||0);

if(p.image){
img.src=p.image;
}else{
img.style.display="none";
}

likeBtn.onclick=async ()=>{
await ref.update({
likes:firebase.firestore.FieldValue.increment(1)
});
load();
};

}

load();
</script>

</body>
</html>
