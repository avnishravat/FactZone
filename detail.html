<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
FactZone Post
</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>

body{
background:#f3f4f6;
font-family:Arial,sans-serif;
}

</style>

</head>

<body>

<div
id="post"
class="max-w-4xl mx-auto bg-white mt-10 rounded-2xl overflow-hidden shadow-lg">

<div class="p-10 text-center">
Loading...
</div>

</div>

<script>

const firebaseConfig = {

apiKey:"YOUR_API_KEY",

authDomain:"YOUR_AUTH_DOMAIN",

projectId:"YOUR_PROJECT_ID"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

const id =
new URLSearchParams(location.search)
.get("id");

async function loadPost(){

try{

const doc =
await db.collection("posts")
.doc(id)
.get();

if(!doc.exists){

document.getElementById("post")
.innerHTML = `

<div class="p-10 text-center">

<h1 class="text-3xl font-bold mb-4">
Post Not Found
</h1>

<a
href="index.html"
class="bg-black text-white px-6 py-3 rounded-xl">
Go Home
</a>

</div>

`;

return;

}

const p = doc.data();

document.title = p.title;

document.getElementById("post")
.innerHTML = `

<img
src="${p.image}"
class="w-full h-[450px] object-cover">

<div class="p-6">

<h1 class="text-4xl font-bold mb-5">
${p.title}
</h1>

<p class="text-lg leading-9 whitespace-pre-line">
${p.content}
</p>

<a
href="index.html"
class="inline-block mt-8 bg-black text-white px-6 py-3 rounded-xl">

← Back Home

</a>

</div>

`;

}catch(err){

document.getElementById("post")
.innerHTML = `

<div class="p-10 text-center text-red-500">

Error Loading Post

</div>

`;

}

}

loadPost();

</script>

</body>
</html>
