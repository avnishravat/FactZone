<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
FactZone Post
</title>

<link rel="icon"
href="logo.svg">

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background:#f3f4f6;
font-family:Arial;
}

</style>
  
<meta charset="UTF-8">
<title>FactZone</title>
  
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-697419046628538" crossorigin="anonymous"></script>
<script type="application/ld+json">
{
 "@context":"https://schema.org",
 "@type":"BreadcrumbList",
 "itemListElement":[
 {
 "@type":"ListItem",
 "position":1,
 "name":"Home",
 "item":"https://factzone.online"
 },
 {
 "@type":"ListItem",
 "position":2,
 "name":"Article"
 }
 ]
}
</script>
</head>

<body>

<div
class="max-w-4xl mx-auto p-5">

<!-- HEADER -->

<div
class="flex items-center justify-between mb-5">

<a href="index.html"
class="flex items-center gap-3">

<img
src="logo.svg"
class="w-12 h-12 rounded-full bg-white p-1 shadow">

<h1
class="text-3xl font-bold">
FactZone
</h1>

</a>

<a href="index.html"
class="bg-black text-white px-5 py-3 rounded-xl">
← Back
</a>

</div>

<!-- POST -->

<div
id="post"
class="bg-white p-5 rounded-2xl shadow-lg">

Loading...

</div>
<section
id="relatedPosts"
class="mt-10 bg-white p-5 rounded-2xl shadow">

<h2 class="text-2xl font-bold mb-4">
Related Facts
</h2>

Loading...

</section>
</div>

<script type="module">

// 1. सबसे ऊपर सभी फ़ायरबेस फ़ंक्शंस को एक साथ इम्पोर्ट किया गया है
import { initializeApp }
from "https://gstatic.com";

import {
getFirestore,
doc,
getDoc,
collection,
getDocs,
limit,
query
}
from "https://gstatic.com";

const firebaseConfig = {
apiKey: "AIzaSyCUyQyMzEee1eO1RqmhTmIp_OjLT7guUAc",
authDomain: "://firebaseapp.com",
databaseURL: "https://firebaseio.com",
projectId: "factzone-a9ace",
storageBucket: "factzone-a9ace.firebasestorage.app",
messagingSenderId: "425838320650",
appId: "1:425838320650:web:beab18baddf818cb73d3f3",
measurementId: "G-311JQXBXR9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(location.search);
const id = params.get("id");
const postDiv = document.getElementById("post");

// 2. मुख्य पोस्ट लोड करने का फ़ंक्शन
async function loadPost(){
try{
const docRef = doc(db,"posts",id);
const snap = await getDoc(docRef);

if(snap.exists()){
const post = snap.data();
document.title = post.title || "FactZone";

const articleSchema = {
"@context":"https://schema.org",
"@type":"Article",
"headline":post.title,
"description":(post.content || "").substring(0,160),
"image":[post.image || 'https://placeholder.com'],
"author":{
"@type":"Person",
"name":"Avnish Ravat"
},
"publisher":{
"@type":"Organization",
"name":"FactZone Official",
"logo":{
"@type":"ImageObject",
"url":"https://factzone.online"
}
}
};

const schemaScript = document.createElement("script");
schemaScript.type = "application/ld+json";
schemaScript.text = JSON.stringify(articleSchema);
document.head.appendChild(schemaScript);

postDiv.innerHTML = `
<img src="${post.image || 'https://placeholder.com'}" class="w-full rounded-xl mb-5">
<h1 class="text-4xl font-bold mb-4">${post.title || ''}</h1>
<p class="text-gray-700 text-lg leading-8 whitespace-pre-line">${post.content || ''}</p>
`;

}else{
postDiv.innerHTML = `<h2 class="text-3xl text-center">Post Not Found</h2>`;
}
}catch(error){
postDiv.innerHTML = `<h2 class="text-3xl text-center text-red-500">Error Loading Post</h2>`;
}
}

// 3. रिलेटेड पोस्ट्स लोड करने का सुधरा हुआ सही फ़ंक्शन
async function loadRelatedPosts() {
  const relatedContainer = document.getElementById("relatedPosts");
  
  try {
    const q = query(collection(db, "posts"), limit(5));
    const querySnapshot = await getDocs(q);
    
    let htmlContent = `<h2 class="text-2xl font-bold mb-4">🔥 Related Facts</h2>`;
    htmlContent += `<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">`;
    
    let count = 0;
    querySnapshot.forEach((docSnap) => {
      if (docSnap.id !== id && count < 4) {
        const postData = docSnap.data();
        
        htmlContent += `
          <a href="detail.html?id=${docSnap.id}" class="flex items-center gap-3 p-2 rounded-xl hover:bg-gray-50 transition border border-gray-100">
            <img src="${postData.image || 'https://placeholder.com'}" class="w-16 h-16 object-cover rounded-lg bg-gray-200 shrink-0">
            <div>
              <h3 class="font-bold text-sm text-gray-900 line-clamp-2">${postData.title || ''}</h3>
            </div>
          </a>
        `;
        count++;
      }
    });
    
    htmlContent += `</div>`;
    
    if (count === 0) {
      relatedContainer.style.display = "none";
    } else {
      relatedContainer.innerHTML = htmlContent;
    }
    
  } catch (error) {
    console.error("Error:", error);
    relatedContainer.innerHTML = `<p class="text-gray-500 text-sm">Failed to load related facts.</p>`;
  }
}

// दोनों को कॉल करें
loadPost();
loadRelatedPosts();

</script>

</body>
</html>
