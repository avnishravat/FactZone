<!-- admin.html -->

<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
FactZone Admin
</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<div
class="max-w-5xl mx-auto p-5">

<h1 class="text-4xl font-bold mb-5">
Admin Panel
</h1>

<div
class="bg-white p-5 rounded-2xl shadow-lg">

<input
id="title"
placeholder="Post Title"
class="w-full border p-3 rounded-lg mb-3">

<input
id="desc"
placeholder="Short Description"
class="w-full border p-3 rounded-lg mb-3">

<input
id="image"
placeholder="Image URL"
class="w-full border p-3 rounded-lg mb-3">

<textarea
id="content"
placeholder="Post Content"
class="w-full border p-3 rounded-lg mb-3 h-40"></textarea>

<button
id="publishBtn"
class="bg-black text-white px-6 py-3 rounded-xl">
Publish Post
</button>

</div>

<h2 class="text-3xl font-bold mt-10 mb-5">
All Posts
</h2>

<div id="allPosts"></div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc,
updateDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyCUyQyMzEee1eO1RqmhTmIp_OjLT7guUAc",

authDomain: "factzone-a9ace.firebaseapp.com",

databaseURL: "https://factzone-a9ace-default-rtdb.firebaseio.com",

projectId: "factzone-a9ace",

storageBucket: "factzone-a9ace.firebasestorage.app",

messagingSenderId: "425838320650",

appId: "1:425838320650:web:beab18baddf818cb73d3f3",

measurementId: "G-311JQXBXR9"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const allPosts =
document.getElementById("allPosts");

async function loadPosts(){

allPosts.innerHTML="";

const querySnapshot =
await getDocs(collection(db,"posts"));

querySnapshot.forEach((d)=>{

const post = d.data();

allPosts.innerHTML += `

<div class="bg-white p-5 rounded-2xl shadow-lg mb-5">

<img
src="${post.image}"
class="w-full h-60 object-cover rounded-xl mb-4">

<h2 class="text-2xl font-bold mb-2">
${post.title}
</h2>

<p class="mb-4">
${post.desc}
</p>

<div class="flex gap-3">

<button
onclick="editPost('${d.id}','${post.title}','${post.desc}','${post.image}','${post.content}')"
class="bg-blue-500 text-white px-5 py-2 rounded-lg">
Edit
</button>

<button
onclick="deletePost('${d.id}')"
class="bg-red-500 text-white px-5 py-2 rounded-lg">
Delete
</button>

</div>

</div>

`;

});

}

window.deletePost = async(id)=>{

await deleteDoc(doc(db,"posts",id));

loadPosts();

};

window.editPost = async(id,title,desc,image,content)=>{

const newTitle =
prompt("Edit Title",title);

const newDesc =
prompt("Edit Desc",desc);

const newImage =
prompt("Edit Image",image);

const newContent =
prompt("Edit Content",content);

await updateDoc(doc(db,"posts",id),{

title:newTitle,

desc:newDesc,

image:newImage,

content:newContent

});

loadPosts();

};

document.getElementById("publishBtn")
.onclick = async()=>{

const title =
document.getElementById("title").value;

const desc =
document.getElementById("desc").value;

const image =
document.getElementById("image").value;

const content =
document.getElementById("content").value;

await addDoc(collection(db,"posts"),{

title,

desc,

image,

content

});

alert("Post Published");

loadPosts();

};

loadPosts();

</script>

</body>
</html>
