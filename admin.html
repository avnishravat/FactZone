<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FactZone Admin</title>
<link class="user-asset" rel="icon" href="logo.png">
<meta name="robots" content="noindex,nofollow">
<!-- Quill CSS (For Rich Text Editor) -->
<link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}

/* ── Light theme ── */
[data-theme="light"]{
  --bg:#f0f0f7;
  --surface:#ffffff;
  --surface2:#f3f3fb;
  --border:#e2e2f0;
  --accent:#7c6dfa;
  --accent2:#6366f1;
  --green:#16a34a;
  --red:#dc2626;
  --blue:#2563eb;
  --text:#1a1a2e;
  --muted:#7070a0;
  --radius:14px;
  --shadow:0 2px 12px rgba(0,0,0,.08);
}
/* ── Dark theme ── */
[data-theme="dark"]{
  --bg:#0a0a0f;
  --surface:#13131a;
  --surface2:#1c1c26;
  --border:#2a2a3a;
  --accent:#7c6dfa;
  --accent2:#a78bfa;
  --green:#22c55e;
  --red:#ef4444;
  --blue:#3b82f6;
  --text:#f1f0ff;
  --muted:#6b6b8a;
  --radius:14px;
  --shadow:0 2px 12px rgba(0,0,0,.4);
}

body{background:var(--bg);color:var(--text);font-family:'Segoe UI',Arial,sans-serif;min-height:100vh;transition:background .3s,color .3s}

/* ── Theme toggle button ── */
.theme-toggle{background:var(--surface2);border:1px solid var(--border);color:var(--text);width:38px;height:38px;border-radius:10px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:.2s;flex-shrink:0}
.theme-toggle:hover{border-color:var(--accent);transform:scale(1.05)}

/* ── Login Box Custom CSS ── */
.login-container { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: var(--bg); }
.login-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 32px; width: 100%; max-width: 400px; box-shadow: var(--shadow); text-align: center; }

/* ── Sidebar ── */
.sidebar{position:fixed;left:0;top:0;bottom:0;width:240px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100;transition:background .3s,border-color .3s}
.logo{padding:24px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border)}
.logo img{width:36px;height:36px;border-radius:10px;border:2px solid var(--accent)}
.logo-text{font-size:18px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav{padding:16px 12px;flex:1}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;font-size:14px;color:var(--muted);transition:.2s;margin-bottom:4px;border:1px solid transparent;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:rgba(124,109,250,.12);color:var(--accent2);border-color:rgba(124,109,250,.2)}
.nav-icon{font-size:18px;width:22px;text-align:center}
.sidebar-footer{padding:16px;border-top:1px solid var(--border); display: flex; flex-direction: column; gap: 8px;}
.sync-badge{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);padding:10px 12px;border-radius:10px;background:var(--surface2)}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:.3s}
.sync-dot.connected{background:var(--green);box-shadow:0 0 6px var(--green)}
.sync-dot.syncing{background:#facc15;box-shadow:0 0 6px #facc15;animation:pulse 1s infinite}
.sync-dot.error{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── Main ── */
.main{margin-left:240px;min-height:100vh}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 32px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;transition:background .3s,border-color .3s}
.page-title{font-size:20px;font-weight:600}
.topbar-right{display:flex;align-items:center;gap:10px}
.stats-row{grid-template-columns:repeat(2,1fr);gap:16px;padding:24px 32px;display:grid}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;position:relative;overflow:hidden;box-shadow:var(--shadow);transition:background .3s,border-color .3s}
.stat-label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.stat-value{font-size:32px;font-weight:700}
.stat-card.purple .stat-value{color:var(--accent2)}
.stat-card.green .stat-value{color:var(--green)}

/* ── Content ── */
.content{padding:0 32px 32px}
.upload-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px;margin-bottom:28px;box-shadow:var(--shadow);transition:background .3s,border-color .3s}
.section-header{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.section-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;background:rgba(124,109,250,.12);border:1px solid rgba(124,109,250,.2)}
.section-title{font-size:16px;font-weight:600}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group.full{grid-column:1/-1}
.form-label{font-size:12px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.4px}
.form-input{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:12px 14px;font-size:14px;outline:none;transition:.2s;width:100%;font-family:inherit;resize:vertical}
.form-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,109,250,.12)}
.form-input::placeholder{color:var(--muted)}
.btn{border:none;border-radius:10px;padding:12px 20px;font-size:14px;font-weight:600;cursor:pointer;transition:.2s;display:inline-flex;align-items:center;gap:8px}
.btn:hover{transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn-primary{background:linear-gradient(135deg,var(--accent),#6366f1);color:white;width:100%;justify-content:center;font-size:15px;padding:14px;margin-top:10px;}
.btn-primary:hover{box-shadow:0 8px 24px rgba(124,109,250,.3)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-danger{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.2);padding:7px 12px;font-size:12px;border-radius:8px}
.btn-danger:hover{background:rgba(239,68,68,.2)}
.btn-edit{background:rgba(124,109,250,.1);color:var(--accent2);border:1px solid rgba(124,109,250,.2);padding:7px 12px;font-size:12px;border-radius:8px}
.btn-edit:hover{background:rgba(124,109,250,.2)}
.btn-logout{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.2);width:100%;justify-content:center;font-size:13px;padding:10px;border-radius:10px}
.btn-logout:hover{background:var(--red);color:white}

/* ── Posts grid ── */
.posts-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.search-box{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-size:14px;color:var(--text);outline:none;width:240px;transition:.2s}
.search-box:focus{border-color:var(--accent);width:280px}
.search-box::placeholder{color:var(--muted)}
.posts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.post-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:.2s;position:relative;box-shadow:var(--shadow)}
.post-card:hover{border-color:rgba(124,109,250,.4);transform:translateY(-3px);box-shadow:0 12px 32px rgba(0,0,0,.15)}
.post-thumb{width:100%;height:175px;object-fit:cover;display:block;background:var(--surface2)}
.post-body{padding:14px}
.post-title{font-size:15px;font-weight:600;line-height:1.4;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.post-desc{font-size:13px;color:var(--muted);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:12px;line-height:1.5}
.post-actions{display:flex;gap:8px}
.post-meta{position:absolute;top:10px;left:10px;background:rgba(0,0,0,.55);border-radius:20px;padding:3px 9px;font-size:11px;color:rgba(255,255,255,.85);backdrop-filter:blur(4px)}
.post-num{position:absolute;top:10px;right:10px;background:rgba(124,109,250,.7);border-radius:20px;padding:3px 9px;font-size:11px;color:white;backdrop-filter:blur(4px);font-weight:600}

/* ── Toast ── */
.toast{position:fixed;bottom:28px;right:28px;padding:14px 20px;border-radius:12px;font-size:14px;font-weight:600;z-index:1000;display:none;align-items:center;gap:10px;max-width:340px;border:1px solid transparent;box-shadow:0 8px 32px rgba(0,0,0,.3)}
.toast.show{display:flex;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.toast.syncing{background:var(--surface);border-color:var(--accent);color:var(--accent2)}
.toast.success{background:var(--surface);border-color:var(--green);color:var(--green)}
.toast.error{background:var(--surface);border-color:var(--red);color:var(--red)}

/* ── Empty/skeleton ── */
.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-size:48px;margin-bottom:16px}
.empty-text{font-size:16px;font-weight:500;margin-bottom:8px;color:var(--text)}
.empty-sub{font-size:14px}
.skeleton{background:linear-gradient(90deg,var(--surface2) 25%,var(--surface) 50%,var(--surface2) 75%);background-size:400% 100%;animation:shimmer 1.4s infinite linear;border-radius:8px}
@keyframes shimmer{0%{background-position:100% 0}100%{background-position:-100% 0}}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:28px;width:90%;max-width:640px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.4)}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.modal-title{font-size:18px;font-weight:700}
.modal-close{background:var(--surface2);border:1px solid var(--border);color:var(--muted);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:.2s}
.modal-close:hover{color:var(--text);border-color:var(--text)}
.modal-actions{display:flex;gap:10px;margin-top:20px}
.btn-secondary{background:var(--surface2);border:1px solid var(--border);color:var(--muted);border-radius:10px;padding:12px 20px;font-size:14px;font-weight:600;cursor:pointer;flex:1;transition:.2s}
.btn-secondary:hover{color:var(--text);border-color:var(--text)}
.btn-save{background:linear-gradient(135deg,var(--accent),#6366f1);color:white;border:none;border-radius:10px;padding:12px 20px;font-size:14px;font-weight:600;cursor:pointer;flex:1;transition:.2s}
.btn-save:hover{box-shadow:0 6px 20px rgba(124,109,250,.3)}
.btn-save:disabled{opacity:.5;cursor:not-allowed}

/* ── Preview image in modal ── */
.img-preview{width:100%;height:140px;object-fit:cover;border-radius:10px;margin-top:8px;border:1px solid var(--border);display:none}
.img-preview.show{display:block}

/* ── Hide Content Before Auth ── */
#auth-view { display: none; }
#login-view { display: flex; }
.page{display:none}
.page.active{display:block}

/* ── Quill Styles Modifications for Dark/Light ── */
.editor-container {
  background: var(--surface2);
  border: 1px solid var(--border) !important;
  border-radius: 0 0 10px 10px;
  color: var(--text);
  font-family: inherit;
  font-size: 15px;
  min-height: 220px;
}
.ql-toolbar {
  background: var(--surface);
  border: 1px solid var(--border) !important;
  border-radius: 10px 10px 0 0;
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}
.ql-stroke { stroke: var(--text) !important; }
.ql-fill { fill: var(--text) !important; }
.ql-picker { color: var(--text) !important; }
.ql-picker-options { background-color: var(--surface) !important; border-color: var(--border) !important; z-index: 1000; }

/* Fullscreen implementation */
.ql-fullscreen {
  position: fixed !important;
  inset: 0 !important;
  z-index: 9999 !important;
  width: 100vw !important;
  height: 100vh !important;
  margin: 0 !important;
  background: var(--bg) !important;
  display: flex;
  flex-direction: column;
}
.ql-fullscreen .ql-toolbar { border-radius: 0 !important; border-width: 0 0 1px 0 !important; }
.ql-fullscreen .editor-container { flex: 1; border-radius: 0 !important; border-width: 0 !important; height: auto !important; }

@media(max-width:768px){
  .sidebar{width:60px}
  .logo-text,.nav-item span,.sidebar-footer{display:none}
  .logo{padding:16px;justify-content:center}
  .nav-item{justify-content:center;padding:12px}
  .main{margin-left:60px}
  .stats-row{grid-template-columns:1fr;padding:16px}
  .content{padding:0 16px 24px}
  .form-grid{grid-template-columns:1fr}
  .topbar{padding:0 16px}
}
</style>
</head>
<body>

<!-- ── 1. LOGIN INTERFACE ── -->
<div id="login-view" class="login-container">
  <div class="login-card">
    <div class="logo" style="justify-content:center; border:none; padding-bottom:10px;">
      <img class="user-asset" src="logo.png" alt="FactZone">
      <span class="logo-text" style="font-size:24px;">FactZone Admin</span>
    </div>
    <p style="color:var(--muted); font-size:14px; margin-bottom:20px;">Sign in with your admin account</p>
    <div class="form-group" style="margin-bottom:14px;">
      <input type="email" id="adminEmail" class="form-input" placeholder="Email address" autocomplete="username" required>
    </div>
    <div class="form-group" style="margin-bottom:20px;">
      <input type="password" id="adminPassword" class="form-input" placeholder="Password" autocomplete="current-password" required>
    </div>
    <button class="btn btn-primary" id="loginSubmitBtn">🔐 Authenticate</button>
  </div>
</div>

<!-- ── 2. ACTUAL DASHBOARD CONTENT ── -->
<div id="auth-view">
  <aside class="sidebar">
    <div class="logo">
      <img class="user-asset" src="logo.png" alt="FactZone">
      <span class="logo-text">FactZone</span>
    </div>
    <nav class="nav">
      <button id="nav-dashboard" class="nav-item active" onclick="switchPage('dashboard',this)">
        <span class="nav-icon">📊</span><span>Dashboard</span>
      </button>
      <button id="nav-upload" class="nav-item" onclick="switchPage('upload',this)">
        <span class="nav-icon">✏️</span><span>New Post</span>
      </button>
      <button id="nav-posts" class="nav-item" onclick="switchPage('posts',this)">
        <span class="nav-icon">📰</span><span>All Posts</span>
      </button>
    </nav>
    <div class="sidebar-footer">
      <div class="sync-badge">
        <div class="sync-dot" id="syncDot"></div>
        <span id="syncText">Database Connected</span>
      </div>
      <button class="btn btn-logout" id="logoutBtn">🚪 Logout</button>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div class="page-title" id="pageTitle">Dashboard</div>
      <div class="topbar-right">
        <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()" title="Toggle dark/light mode">🌙</button>
        <a href="https://factzone.online/" target="_blank" style="background:var(--surface2);border:1px solid var(--border);color:var(--muted);padding:9px 14px;border-radius:10px;font-size:13px;font-weight:600;text-decoration:none;transition:.2s;white-space:nowrap" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--muted)'">↗ View Site</a>
      </div>
    </div>

    <div id="page-dashboard" class="page active">
      <div class="stats-row">
        <div class="stat-card purple">
          <div class="stat-label">Total Posts</div>
          <div class="stat-value" id="statTotal">—</div>
        </div>
        <div class="stat-card green">
          <div class="stat-label">Last Updated</div>
          <div class="stat-value" id="statSync" style="font-size:20px;padding-top:6px">—</div>
        </div>
      </div>
      <div class="content">
        <div class="upload-card">
          <div class="section-header">
            <div class="section-icon">⚡</div>
            <div class="section-title">Quick Post</div>
          </div>
          <div class="form-grid">
            <div class="form-group">
              <label class="form-label">Title *</label>
              <input class="form-input" id="q-title" placeholder="Post title...">
            </div>
            <div class="form-group">
              <label class="form-label">Image URL</label>
              <input class="form-input" id="q-image" placeholder="https://..." oninput="previewImg('q')">
            </div>
            <div class="form-group full">
              <label class="form-label">Description *</label>
              <input class="form-input" id="q-desc" placeholder="Write a brief 2-3 line summary...">
            </div>
            <div class="form-group full">
              <label class="form-label">Content *</label>
              <textarea class="form-input" id="q-content" rows="5" placeholder="Write the full content here..."></textarea>
            </div>
          </div>
          <button class="btn btn-primary" id="quickUploadBtn" onclick="uploadPost('q')">
            <span>🚀</span> Publish Post
          </button>
        </div>

        <div class="upload-card" style="padding-bottom:8px">
          <div class="posts-header" style="margin-bottom:16px">
            <div class="section-header" style="margin-bottom:0">
              <div class="section-icon">📰</div>
              <div class="section-title">Recent Posts</div>
            </div>
            <input class="search-box" id="dashSearch" placeholder="🔍 Search..." oninput="filterDash()">
          </div>
          <div id="dash-grid" class="posts-grid" style="margin-bottom:16px"></div>
        </div>
      </div>
    </div>

    <div id="page-upload" class="page">
      <div class="content" style="padding-top:24px">
        <div id="u-wrapper" class="upload-card">
          <div class="section-header">
            <div class="section-icon">✏️</div>
            <div class="section-title">New Post</div>
          </div>
          <div class="form-grid">
            <div class="form-group">
              <label class="form-label">Title *</label>
              <input class="form-input" id="u-title" placeholder="Post title...">
            </div>
            <div class="form-group">
              <label class="form-label">Image URL</label>
              <input class="form-input" id="u-image" placeholder="https://..." oninput="previewImg('u')">
            </div>
            <div class="form-group full">
              <label class="form-label">Description *</label>
              <input class="form-input" id="u-desc" placeholder="Short description...">
            </div>
            <div class="form-group full">
              <img id="u-preview" class="img-preview" alt="Preview">
            </div>
            <div class="form-group full">
              <label class="form-label">Content *</label>
              <div id="u-editor-wrapper">
                <div id="u-toolbar">
                  <span class="ql-formats">
                    <select class="ql-size">
                      <option value="small">Small</option>
                      <option selected>Normal</option>
                      <option value="large">Large</option>
                      <option value="huge">Huge</option>
                    </select>
                  </span>
                  <span class="ql-formats">
                    <button class="ql-bold"></button>
                    <button class="ql-italic"></button>
                    <button class="ql-underline"></button>
                  </span>
                  <span class="ql-formats">
                    <button class="ql-list" value="ordered"></button>
                    <button class="ql-list" value="bullet"></button>
                  </span>
                  <span class="ql-formats">
                    <button id="custom-fullscreen" type="button" title="Full Screen" style="width:auto; font-size:13px; font-weight:bold; padding:0 6px;">Fullscreen</button>
                  </span>
                </div>
                <div id="u-content" class="editor-container"></div>
              </div>
            </div>
          </div>
          <button class="btn btn-primary" id="uploadBtn" onclick="uploadPost('u')">
            <span>🚀</span> Publish Post
          </button>
        </div>
      </div>
    </div>

    <div id="page-posts" class="page">
      <div class="content" style="padding-top:24px">
        <div class="posts-header">
          <div class="section-header" style="margin-bottom:0">
            <div class="section-icon">📰</div>
            <div class="section-title" id="postsCount">All Posts</div>
          </div>
          <input class="search-box" id="searchBox" placeholder="🔍 Search posts..." oninput="filterPosts()">
        </div>
        <div id="posts-grid" class="posts-grid"></div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">✏️ Edit Post</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="form-group" style="margin-bottom:14px">
      <label class="form-label">Title</label>
      <input class="form-input" id="e-title">
    </div>
    <div class="form-group" style="margin-bottom:14px">
      <label class="form-label">Description</label>
      <input class="form-input" id="e-desc">
    </div>
    <div class="form-group" style="margin-bottom:14px">
      <label class="form-label">Image URL</label>
      <input class="form-input" id="e-image" oninput="previewImg('e')">
      <img id="e-preview" class="img-preview" alt="Preview">
    </div>
    <div class="form-group" style="margin-bottom:14px">
      <label class="form-label">Content</label>
      <!-- Rich Text Editor for Edit Modal -->
      <div id="e-editor-wrapper">
        <div id="e-toolbar">
          <span class="ql-formats">
            <select class="ql-size">
              <option value="small">Small</option>
              <option selected>Normal</option>
              <option value="large">Large</option>
              <option value="huge">Huge</option>
            </select>
          </span>
          <span class="ql-formats">
            <button class="ql-bold"></button>
            <button class="ql-italic"></button>
            <button class="ql-underline"></button>
          </span>
          <span class="ql-formats">
            <button class="ql-list" value="ordered"></button>
            <button class="ql-list" value="bullet"></button>
          </span>
          <span class="ql-formats">
            <button id="edit-fullscreen" type="button" title="Full Screen" style="width:auto; font-size:13px; font-weight:bold; padding:0 6px;">Fullscreen</button>
          </span>
        </div>
        <div id="e-content" class="editor-container"></div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-save" id="saveEditBtn" onclick="saveEdit()">💾 Save Changes</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Quill Library JS -->
<script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCUyQyMzEee1eO1RqmhTmIp_OjLT7guUAc",
  authDomain: "factzone-a9ace.firebaseapp.com",
  projectId: "factzone-a9ace",
  storageBucket: "factzone-a9ace.firebasestorage.app",
  messagingSenderId: "425838320650",
  appId: "1:425838320650:web:beab18baddf818cb73d3f3"
};

const app  = initializeApp(firebaseConfig);
const db   = getFirestore(app);
const auth = getAuth(app);

let allPostsCache = [];
let currentEditId = null;
let quillEditor = null;     
let editQuillEditor = null; 

// Initialize Editors
function initQuill() {
  quillEditor = new Quill('#u-content', {
    modules: { toolbar: '#u-toolbar' },
    theme: 'snow',
    placeholder: 'Write your full content here...'
  });

  editQuillEditor = new Quill('#e-content', {
    modules: { toolbar: '#e-toolbar' },
    theme: 'snow',
    placeholder: 'Edit your content here...'
  });

  // Handle Fullscreen for New Post
  const fsBtn = document.getElementById('custom-fullscreen');
  const editorWrapper = document.getElementById('u-editor-wrapper');
  fsBtn.addEventListener('click', () => {
    if(editorWrapper.classList.contains('ql-fullscreen')) {
      editorWrapper.classList.remove('ql-fullscreen');
      fsBtn.textContent = "Fullscreen";
      fsBtn.style.color = "var(--text)";
    } else {
      editorWrapper.classList.add('ql-fullscreen');
      fsBtn.textContent = "✕ Exit Fullscreen";
      fsBtn.style.color = "var(--red)";
    }
  });

  // Handle Fullscreen for Edit Post
  const editFsBtn = document.getElementById('edit-fullscreen');
  const editWrapper = document.getElementById('e-editor-wrapper');
  editFsBtn.addEventListener('click', () => {
    if(editWrapper.classList.contains('ql-fullscreen')) {
      editWrapper.classList.remove('ql-fullscreen');
      editFsBtn.textContent = "Fullscreen";
      editFsBtn.style.color = "var(--text)";
    } else {
      editWrapper.classList.add('ql-fullscreen');
      editFsBtn.textContent = "✕ Exit Fullscreen";
      editFsBtn.style.color = "var(--red)";
    }
  });
}

// Initialize editors on load
window.addEventListener('DOMContentLoaded', () => {
  initQuill();
});

// ── React to auth state: show dashboard only for signed-in admins ──
onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById('login-view').style.display = 'none';
    document.getElementById('auth-view').style.display = 'block';
    setSyncStatus('connected', 'Database Online');
    loadPosts();
  } else {
    document.getElementById('auth-view').style.display = 'none';
    document.getElementById('login-view').style.display = 'flex';
    setSyncStatus('muted', 'Database Offline');
  }
});

// ── Login Submit Function (Firebase Authentication) ──
async function handleLogin() {
  const email    = document.getElementById('adminEmail').value.trim();
  const password = document.getElementById('adminPassword').value;

  if (!email || !password) {
    showToast('⚠️ Please enter your email and password!', 'error');
    return;
  }

  const btn = document.getElementById('loginSubmitBtn');
  btn.disabled = true;

  try {
    await signInWithEmailAndPassword(auth, email, password);
    document.getElementById('adminPassword').value = '';
    showToast('🔐 Login successful!', 'success');
    // onAuthStateChanged handles showing the dashboard
  } catch (e) {
    showToast('❌ Login failed: ' + (e.code || e.message), 'error');
  } finally {
    btn.disabled = false;
  }
}

document.getElementById('loginSubmitBtn').addEventListener('click', handleLogin);
document.getElementById('adminPassword').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') handleLogin();
});

// ── Logout Function ──
document.getElementById('logoutBtn').addEventListener('click', async () => {
  try {
    await signOut(auth);
    showToast('🚪 Successfully logged out', 'success');
    // onAuthStateChanged handles returning to the login view
  } catch (e) {
    showToast('❌ ' + e.message, 'error');
  }
});

// ── Theme ──
window.toggleTheme = function() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('themeBtn').textContent = isDark ? '🌙' : '☀️';
  localStorage.setItem('fz-admin-theme', isDark ? 'light' : 'dark');
};
(function initTheme() {
  const saved = localStorage.getItem('fz-admin-theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  document.getElementById('themeBtn').textContent = saved === 'dark' ? '☀️' : '🌙';
})();

// ── Image preview ──
window.previewImg = function(prefix) {
  const url = document.getElementById(`${prefix}-image`)?.value;
  const prev = document.getElementById(`${prefix}-preview`);
  if (!prev) return;
  if (url) { prev.src = url; prev.classList.add('show'); }
  else prev.classList.remove('show');
};

// ── Toast ──
function showToast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.innerHTML = msg;
  el.className = `toast show ${type}`;
  setTimeout(() => el.classList.remove('show'), 3500);
}

// ── Sync status ──
function setSyncStatus(state, text) {
  document.getElementById('syncDot').className = `sync-dot ${state}`;
  document.getElementById('syncText').textContent = text;
}

// ── Escape untrusted values before injecting into HTML ──
function escapeHtml(str) {
  return String(str == null ? "" : str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

// ── Build post card HTML ──
function buildCard(post, index) {
  const date = post.createdAt
    ? new Date(post.createdAt?.seconds ? post.createdAt.seconds*1000 : post.createdAt).toLocaleDateString('en-US')
    : '';
  const image = escapeHtml(post.image || 'https://placehold.co/400x175/1c1c26/6b6b8a?text=No+Image');
  const title = escapeHtml(post.title || 'Untitled');
  const desc  = escapeHtml(post.desc || 'No description');
  const id    = escapeHtml(post.id);
  return `
  <div class="post-card">
    <img class="post-thumb" src="${image}"
      onerror="this.src='https://placehold.co/400x175/1c1c26/6b6b8a?text=No+Image'" loading="lazy">
    ${date ? `<div class="post-meta">${escapeHtml(date)}</div>` : ''}
    <div class="post-num">#${index+1}</div>
    <div class="post-body">
      <div class="post-title">${title}</div>
      <div class="post-desc">${desc}</div>
      <div class="post-actions">
        <button class="btn btn-edit" onclick="openEditModal('${id}')">✏️ Edit</button>
        <button class="btn btn-danger" onclick="deletePost('${id}')">🗑 Delete</button>
      </div>
    </div>
  </div>`;
}

// ── Render grids ──
function renderGrid(containerId, posts) {
  const grid = document.getElementById(containerId);
  if (!posts.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <div class="empty-icon">📭</div>
      <div class="empty-text">No posts found</div>
      <div class="empty-sub">Publish your first post!</div>
    </div>`;
    return;
  }
  grid.innerHTML = posts.map((p,i) => buildCard(p,i)).join('');
}

// ── Load Posts ──
async function loadPosts() {
  const skeletons = [...Array(4)].map(() => `
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden">
      <div class="skeleton" style="height:175px"></div>
      <div style="padding:14px">
        <div class="skeleton" style="height:14px;margin-bottom:8px"></div>
        <div class="skeleton" style="height:12px;width:70%"></div>
      </div>
    </div>`).join('');
  document.getElementById('dash-grid').innerHTML = skeletons;
  document.getElementById('posts-grid').innerHTML = skeletons + skeletons;

  try {
    const snap = await getDocs(collection(db, "posts"));
    const seenIds = new Set();
    const posts = [];
    snap.forEach(d => {
      if (seenIds.has(d.id)) return;
      seenIds.add(d.id);
      posts.push({ id:d.id, ...d.data() });
    });
    posts.sort((a,b) => (b.createdAt?.seconds||b.createdAt||0) - (a.createdAt?.seconds||a.createdAt||0));
    allPostsCache = posts;

    document.getElementById('statTotal').textContent = posts.length;
    document.getElementById('statSync').textContent = new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
    renderGrid('dash-grid', posts);
    renderGrid('posts-grid', posts);
    setSyncStatus('connected', 'Database Online');
  } catch(e) {
    ['dash-grid','posts-grid'].forEach(id => {
      const el = document.getElementById(id);
      if(el) el.innerHTML = `<div style="color:var(--red);padding:20px;grid-column:1/-1">❌ Error: ${e.message}</div>`;
    });
    setSyncStatus('error', 'Firebase error');
  }
}

// ── Search ──
window.filterPosts = function() {
  const q = document.getElementById('searchBox').value.toLowerCase();
  renderGrid('posts-grid', q ? allPostsCache.filter(p => (p.title+p.desc).toLowerCase().includes(q)) : allPostsCache);
};
window.filterDash = function() {
  const q = document.getElementById('dashSearch').value.toLowerCase();
  renderGrid('dash-grid', q ? allPostsCache.filter(p => (p.title+p.desc).toLowerCase().includes(q)) : allPostsCache);
};

// ── Upload ──
window.uploadPost = async function(prefix) {
  const title   = document.getElementById(`${prefix}-title`).value.trim();
  const desc    = document.getElementById(`${prefix}-desc`).value.trim();
  const image   = document.getElementById(`${prefix}-image`).value.trim();
  
  let content = '';
  if (prefix === 'u' && quillEditor) {
    content = quillEditor.root.innerHTML.trim();
    if(quillEditor.root.textContent.trim() === '') content = '';
  } else {
    content = document.getElementById(`${prefix}-content`).value.trim();
  }

  if (!title || !desc || !content) { showToast('⚠️ Title, description, and content are required!', 'error'); return; }
  
  const btnId = prefix === 'q' ? 'quickUploadBtn' : 'uploadBtn';
  const btn = document.getElementById(btnId);
  btn.disabled = true; btn.innerHTML = '<span>⏳</span> Publishing...';
  
  try {
    await addDoc(collection(db,"posts"), { title, desc, image, content, createdAt: Date.now() });
    
    ['title','desc','image'].forEach(f => { 
      const inputEl = document.getElementById(`${prefix}-${f}`);
      if(inputEl) inputEl.value=''; 
    });
    
    if (prefix === 'u' && quillEditor) {
      quillEditor.setContents([]);
      document.getElementById('u-editor-wrapper').classList.remove('ql-fullscreen');
      document.getElementById('custom-fullscreen').textContent = "Fullscreen";
      document.getElementById('custom-fullscreen').style.color = "var(--text)";
    } else {
      document.getElementById(`${prefix}-content`).value = '';
    }
    
    const prev = document.getElementById(`${prefix}-preview`);
    if (prev) prev.classList.remove('show');
    
    btn.innerHTML = '<span>✅</span> Published!';
    showToast('🚀 Post published successfully!', 'success');
    
    setTimeout(() => { 
      btn.disabled = false; 
      btn.innerHTML = '<span>🚀</span> Publish Post'; 
      const dashBtn = document.getElementById('nav-dashboard');
      window.switchPage('dashboard', dashBtn);
    }, 1000);
    
    await loadPosts();
  } catch(e) {
    btn.disabled=false; btn.innerHTML='<span>🚀</span> Publish Post';
    showToast('❌ Upload failed: ' + e.message, 'error');
  }
};

// ── Delete ──
window.deletePost = async function(id) {
  if (!confirm('Are you sure you want to delete this post?')) return;
  try {
    await deleteDoc(doc(db,"posts",id));
    showToast('🗑 Post deleted successfully', 'success');
    await loadPosts();
  } catch(e) { showToast('❌ ' + e.message, 'error'); }
};

// ── Edit Modal ──
window.openEditModal = function(id) {
  const post = allPostsCache.find(p => p.id === id);
  if (!post) return;
  currentEditId = id;
  document.getElementById('e-title').value   = post.title   || '';
  document.getElementById('e-desc').value    = post.desc    || '';
  document.getElementById('e-image').value   = post.image   || '';
  
  if (editQuillEditor) {
    editQuillEditor.root.innerHTML = post.content || '';
  }
  
  const prev = document.getElementById('e-preview');
  if (post.image) { prev.src = post.image; prev.classList.add('show'); }
  else prev.classList.remove('show');
  document.getElementById('editModal').classList.add('show');
};

window.closeModal = function() {
  document.getElementById('editModal').classList.remove('show');
  document.getElementById('e-editor-wrapper').classList.remove('ql-fullscreen');
  document.getElementById('edit-fullscreen').textContent = "Fullscreen";
  document.getElementById('edit-fullscreen').style.color = "var(--text)";
  currentEditId = null;
};

window.saveEdit = async function() {
  if (!currentEditId) return;
  const btn = document.getElementById('saveEditBtn');
  btn.textContent = 'Saving...'; btn.disabled = true;
  
  let content = '';
  if (editQuillEditor) {
    content = editQuillEditor.root.innerHTML.trim();
  }

  try {
    await updateDoc(doc(db,"posts",currentEditId), {
      title:   document.getElementById('e-title').value,
      desc:    document.getElementById('e-desc').value,
      image:   document.getElementById('e-image').value,
      content: content
    });
    closeModal();
    showToast('✅ Post updated successfully!', 'success');
    await loadPosts();
  } catch(e) { showToast('❌ ' + e.message, 'error'); }
  btn.textContent = '💾 Save Changes'; btn.disabled = false;
};

// ── Page switch ──
window.switchPage = function(page, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  
  const targetPage = document.getElementById(`page-${page}`);
  if(targetPage) targetPage.classList.add('active');
  if(btn) btn.classList.add('active');
  
  const titles = {dashboard:'Dashboard', upload:'New Post', posts:'All Posts'};
  document.getElementById('pageTitle').textContent = titles[page] || 'Dashboard';
};
</script>
</body>
</html>
