<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
FactZone Admin Panel
</title>

<meta name="robots"
content="noindex,nofollow">

<link rel="icon"
href="logo.svg">

<!-- ADSENSE -->

<script async
src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-697419046628538"
crossorigin="anonymous">
</script>

<!-- TAILWIND -->

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background:#f3f4f6;
font-family:Arial,sans-serif;
margin:0;
padding:0;
}

/* CARD */

.card{
background:#fff;
border-radius:20px;
padding:20px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
}

/* INPUTS */

input,
textarea{
width:100%;
padding:14px;
border:2px solid #ddd;
border-radius:12px;
outline:none;
margin-top:10px;
font-size:16px;
}

input:focus,
textarea:focus{
border-color:black;
}

/* BUTTON */

button{
transition:.3s;
}

button:hover{
transform:scale(1.03);
}

/* POST CARD */

.post-card{
border:2px solid #e5e7eb;
border-radius:20px;
overflow:hidden;
background:#fff;
}

.post-card img{
width:100%;
height:220px;
object-fit:cover;
display:block;
background:#ddd;
}

/* SCROLLBAR */

::-webkit-scrollbar{
width:8px;
}

::-webkit-scrollbar-thumb{
background:#888;
border-radius:20px;
}

</style>

</head>

<body>

<!-- HEADER -->

<header
class="bg-black text-white p-4 shadow-lg sticky top-0 z-50">

<div
class="max-w-6xl mx-auto flex items-center gap-3">

<img
src="logo.svg"
class="w-12 h-12 rounded-full bg-white p-1">

<h1
class="text-3xl font-bold">
FactZone Admin
</h1>

</div>

</header>

<!-- ADSENSE -->

<div class="max-w-6xl mx-auto px-5 mt-5">

<ins class="adsbygoogle"
style="display:block"
data-ad-client="ca-pub-697419046628538"
data-ad-slot="1234567890"
data-ad-format="auto"
data-full-width-responsive="true">
</ins>

<script>
(adsbygoogle = window.adsbygoogle || []).push({});
</script>

</div>

<!-- MAIN -->

<div
class="max-w-6xl mx-auto p-5">

<!-- FORM -->

<div class="card mb-10">

<h2
class="text-2xl font-bold mb-5">
Upload New Post
</h2>

<input
type="text"
id="title"
placeholder="Post Title">

<input
type="text"
id="desc"
placeholder="Short Description">

<input
type="text"
id="image"
placeholder="Image URL">

<textarea
id="content"
rows="8"
placeholder="Full Post Content">
</textarea>

<button
id="uploadBtn"
class="bg-black text-white px-6 py-3 rounded-xl mt-5 w-full text-lg">

Upload Post

</button>

</div>

<!-- POSTS -->

<h2
class="text-3xl font-bold mb-5">
All Posts
</h2>

<div
id="posts"
class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">

</div>

</div>

<!-- FIREBASE -->

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc,
updateDoc,
query,
orderBy

}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyCUyQyMzEee1eO1RqmhTmIp_OjLT7guUAc",

authDomain: "factzone-a9ace.firebaseapp.com",

databaseURL: "https://factzone-a9ace-default-rtdb.firebaseio.com",

projectId: "factzone-a9ace",

storageBucket: "factzone-a9ace.firebasestorage.app",

messagingSenderId: "425838320650",

appId: "1:425838320650:web:beab18baddf818cb73d3f3",

measurementId: "G-311JQXBXR9"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

const postsDiv =
document.getElementById("posts");

/* LOAD POSTS */

async function loadPosts(){

postsDiv.innerHTML =
"<h2 class='text-2xl'>Loading...</h2>";

const q =
query(
collection(db,"posts"),
orderBy("createdAt","desc")
);

const querySnapshot =
await getDocs(q);

postsDiv.innerHTML = "";

if(querySnapshot.empty){

postsDiv.innerHTML =
"<h2>No Posts Found</h2>";

return;

}

querySnapshot.forEach((document)=>{

const post =
document.data();

postsDiv.innerHTML += `

<div class="post-card shadow-lg">

<img
src="${post.image || 'https://via.placeholder.com/500'}"
alt="${post.title || ''}">

<div class="p-4">

<h2 class="text-2xl font-bold mb-2">
${post.title || ''}
</h2>

<p class="text-gray-600 mb-4">
${post.desc || ''}
</p>

<div class="flex gap-3">

<button
onclick="editPost('${document.id}','${post.title}','${post.desc}','${post.image}','${post.content}')"
class="bg-blue-600 text-white px-4 py-2 rounded-lg w-full">

Edit

</button>

<button
onclick="deletePost('${document.id}')"
class="bg-red-600 text-white px-4 py-2 rounded-lg w-full">

Delete

</button>

</div>

</div>

</div>

`;

});

}

/* UPLOAD POST */

document.getElementById("uploadBtn")
.addEventListener("click",async()=>{

const title =
document.getElementById("title").value;

const desc =
document.getElementById("desc").value;

const image =
document.getElementById("image").value;

const content =
document.getElementById("content").value;

if(!title || !desc || !content){

alert("Please fill all fields");

return;

}

await addDoc(
collection(db,"posts"),
{

title:title,

desc:desc,

image:image,

content:content,

createdAt:Date.now()

}
);

alert("Post Uploaded Successfully");

document.getElementById("title").value="";
document.getElementById("desc").value="";
document.getElementById("image").value="";
document.getElementById("content").value="";

loadPosts();

});

/* DELETE POST */

window.deletePost =
async(id)=>{

if(confirm("Delete this post?")){

await deleteDoc(doc(db,"posts",id));

loadPosts();

}

};

/* EDIT POST */

window.editPost =
async(id,title,desc,image,content)=>{

const newTitle =
prompt("Edit Title",title);

const newDesc =
prompt("Edit Description",desc);

const newImage =
prompt("Edit Image URL",image);

const newContent =
prompt("Edit Content",content);

if(newTitle){

await updateDoc(
doc(db,"posts",id),
{

title:newTitle,
desc:newDesc,
image:newImage,
content:newContent

}
);

alert("Post Updated Successfully");

loadPosts();

}

};

loadPosts();

</script>

</body>
</html>
