<!-- ADMIN PANEL BUTTON -->

<button
onclick="openAdmin()"
class="fixed bottom-6 right-6 bg-black text-white w-14 h-14 rounded-full text-3xl shadow-2xl z-50">
+
</button>

<!-- ADMIN PANEL -->

<div
id="adminPanel"
class="hidden fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-5 overflow-auto">

<div
class="bg-white w-full max-w-2xl rounded-2xl p-6">

<h2 class="text-3xl font-bold mb-5">
Admin Panel
</h2>

<input
id="postTitleInput"
placeholder="Post Title"
class="w-full border-2 p-3 rounded-xl mb-3 outline-none">

<input
id="postImageInput"
placeholder="Image Name (example: walking-tree.png)"
class="w-full border-2 p-3 rounded-xl mb-3 outline-none">

<textarea
id="postDescInput"
placeholder="Post Description"
class="w-full border-2 p-3 rounded-xl mb-3 h-40 outline-none"></textarea>

<button
onclick="addPost()"
class="w-full bg-black text-white py-3 rounded-xl font-bold mb-3">
Upload Post
</button>

<div id="adminPosts"></div>

<button
onclick="closeAdmin()"
class="w-full bg-gray-200 py-3 rounded-xl mt-4">
Close
</button>

</div>

</div>

<script>

/* POSTS DATA */

let posts = JSON.parse(localStorage.getItem("factzonePosts")) || [

{
title:"Walking Tree Fact",
image:"walking-tree.png",
desc:"जानिए उस पेड़ के बारे में जो सच में चलता है।"
},

{
title:"Voynich Manuscript Mystery",
image:"voynich-manuscript.png",
desc:"दुनिया की सबसे रहस्यमयी किताब।"
}

];

/* RENDER POSTS */

function renderPosts(){

const container =
document.getElementById("posts");

container.innerHTML = "";

posts.forEach((post,index)=>{

container.innerHTML += `

<a href="
detail.html?
title=${encodeURIComponent(post.title)}
&image=${encodeURIComponent(post.image)}
&desc=${encodeURIComponent(post.desc)}
"

class="
card
bg-white
rounded-2xl
overflow-hidden
shadow-lg
">

<img
src="${post.image}"
class="w-full h-60 object-cover">

<div class="p-4">

<h2 class="font-bold text-xl mb-2 line2">
${post.title}
</h2>

<p class="text-gray-600 text-sm">
${post.desc}
</p>

</div>

</a>

`;

});

}

/* ADMIN POSTS */

function renderAdminPosts(){

const admin =
document.getElementById("adminPosts");

admin.innerHTML = "";

posts.forEach((post,index)=>{

admin.innerHTML += `

<div class="
border-2
rounded-2xl
p-4
mb-4
">

<h3 class="font-bold text-xl mb-2">
${post.title}
</h3>

<button
onclick="editPost(${index})"
class="
bg-blue-500
text-white
px-4
py-2
rounded-xl
mr-2
">
Edit
</button>

<button
onclick="deletePost(${index})"
class="
bg-red-500
text-white
px-4
py-2
rounded-xl
">
Delete
</button>

</div>

`;

});

}

/* ADD POST */

function addPost(){

const title =
document.getElementById("postTitleInput").value;

const image =
document.getElementById("postImageInput").value;

const desc =
document.getElementById("postDescInput").value;

if(!title || !image || !desc){

alert("Fill all fields");

return;

}

posts.unshift({

title,
image,
desc

});

localStorage.setItem(
"factzonePosts",
JSON.stringify(posts)
);

renderPosts();

renderAdminPosts();

alert("Post Uploaded ✅");

}

/* DELETE */

function deletePost(index){

posts.splice(index,1);

localStorage.setItem(
"factzonePosts",
JSON.stringify(posts)
);

renderPosts();

renderAdminPosts();

}

/* EDIT */

function editPost(index){

const post = posts[index];

const newTitle =
prompt("Edit Title",post.title);

const newImage =
prompt("Edit Image",post.image);

const newDesc =
prompt("Edit Description",post.desc);

posts[index] = {

title:newTitle,
image:newImage,
desc:newDesc

};

localStorage.setItem(
"factzonePosts",
JSON.stringify(posts)
);

renderPosts();

renderAdminPosts();

}

/* OPEN CLOSE */

function openAdmin(){

document
.getElementById("adminPanel")
.classList.remove("hidden");

renderAdminPosts();

}

function closeAdmin(){

document
.getElementById("adminPanel")
.classList.add("hidden");

}

/* START */

renderPosts();

</script>
